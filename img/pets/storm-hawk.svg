<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="hawkbody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8aabcc"/>
      <stop offset="50%" stop-color="#3a6a8a"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </radialGradient>
    <filter id="hawkglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Wind vortex trail -->
  <path d="M70,60 Q84,56 90,48 Q84,52 88,44 Q82,52 86,46" stroke="#aaccdd" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="3,3"/>
  <path d="M72,68 Q88,66 94,60" stroke="#8aaabb" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="3,3"/>
  <!-- Left wing - swept wide storm cloud wing -->
  <path d="M36,50 Q14,32 6,16 Q14,24 12,14 Q18,26 14,16 Q22,30 18,20 Q28,36 22,26 Q34,44 36,50Z" fill="#2a5a7a"/>
  <!-- Wing storm cloud texture -->
  <path d="M36,50 Q14,32 6,16" stroke="#6a9abb" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M32,46 Q18,34 14,22" stroke="#4a8aaa" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Lightning arc left wing -->
  <path d="M22,34 L26,40 L22,40 L28,50" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Right wing -->
  <path d="M64,50 Q86,32 94,16 Q86,24 88,14 Q82,26 86,16 Q78,30 82,20 Q72,36 78,26 Q66,44 64,50Z" fill="#2a5a7a"/>
  <path d="M64,50 Q86,32 94,16" stroke="#6a9abb" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Lightning arc right wing -->
  <path d="M78,34 L74,40 L78,40 L72,50" stroke="#aaddff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Wing glow from lightning -->
  <ellipse cx="50" cy="40" rx="40" ry="20" fill="#74b9ff" opacity="0.1" filter="url(#hawkglow)"/>
  <!-- Tail feathers - pointed lightning rod -->
  <path d="M44,72 Q40,84 36,94" stroke="#1a3a5a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M50,74 Q50,86 50,98" stroke="#2a4a6a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M56,72 Q60,84 64,94" stroke="#1a3a5a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Lightning at tail tips -->
  <circle cx="36" cy="94" r="2" fill="#74b9ff" opacity="0.7"/>
  <circle cx="50" cy="98" r="2.5" fill="#aaddff" opacity="0.7"/>
  <circle cx="64" cy="94" r="2" fill="#74b9ff" opacity="0.7"/>
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="18" ry="20" fill="url(#hawkbody)"/>
  <!-- Chest feather detail -->
  <path d="M38,56 Q44,50 50,54 Q44,60 38,56Z" fill="#4a8aaa" opacity="0.6"/>
  <path d="M50,54 Q56,50 62,56 Q56,60 50,54Z" fill="#3a7a9a" opacity="0.6"/>
  <path d="M36,64 Q42,58 48,62 Q42,68 36,64Z" fill="#2a6a8a" opacity="0.5"/>
  <!-- Talons -->
  <path d="M40,78 Q36,86 32,90" stroke="#1a2a3a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M32,90 Q28,94 26,98" stroke="#1a2a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M32,90 Q30,96 32,100" stroke="#1a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M32,90 Q36,96 36,100" stroke="#1a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M60,78 Q64,86 68,90" stroke="#1a2a3a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M68,90 Q72,94 74,98" stroke="#1a2a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M68,90 Q70,96 68,100" stroke="#1a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M68,90 Q64,96 64,100" stroke="#1a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Head - fierce angular raptor -->
  <path d="M34,44 Q34,30 50,26 Q62,28 62,40 Q62,54 50,56 Q36,56 34,44Z" fill="url(#hawkbody)"/>
  <!-- Crest feathers -->
  <path d="M44,26 Q40,16 44,10 Q48,18 46,12 Q50,20 50,26" fill="#2a5a7a" opacity="0.9"/>
  <!-- Eye - sharp golden predator -->
  <circle cx="42" cy="40" r="6" fill="#0a0a14"/>
  <circle cx="42" cy="40" r="5" fill="#cc8800"/>
  <circle cx="42" cy="40" r="3" fill="#ffcc00"/>
  <ellipse cx="42" cy="40" rx="1.5" ry="2.5" fill="#0a0000"/>
  <circle cx="40" cy="38" r="1.2" fill="#ffffff" opacity="0.5"/>
  <!-- Brow ridge fierce -->
  <path d="M36,36 Q40,32 46,34" stroke="#1a3a5a" stroke-width="2" fill="none"/>
  <!-- Hooked beak -->
  <path d="M56,38 Q66,36 68,42 Q64,46 56,44Z" fill="#cc8800"/>
  <line x1="56" y1="41" x2="66" y2="40" stroke="#aa6600" stroke-width="0.8" opacity="0.6"/>
</svg>
