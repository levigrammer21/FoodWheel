<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="dragonbody" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6aaa30"/>
      <stop offset="60%" stop-color="#3a7a18"/>
      <stop offset="100%" stop-color="#1a4a08"/>
    </radialGradient>
    <radialGradient id="dragoneye" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffee00"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </radialGradient>
  </defs>
  <!-- Tail - long curling -->
  <path d="M62,70 Q80,72 86,64 Q90,56 82,52 Q76,50 74,56" stroke="#3a7a18" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M62,70 Q80,72 86,64 Q90,56 82,52 Q76,50 74,56" stroke="#6aaa30" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Tail spike -->
  <polygon points="74,56 70,50 78,50" fill="#2a5a10"/>
  <!-- Wings - leathery membrane -->
  <path d="M32,44 Q14,28 10,14 Q18,22 20,14 Q24,24 22,16 Q30,28 28,20 Q36,36 32,44Z" fill="#2a5a10"/>
  <path d="M32,44 Q16,30 12,16" stroke="#4a8a20" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Wing veins -->
  <line x1="32" y1="44" x2="16" y2="20" stroke="#4a8a20" stroke-width="0.8" opacity="0.4"/>
  <line x1="30" y1="42" x2="18" y2="28" stroke="#4a8a20" stroke-width="0.8" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="18" ry="16" fill="url(#dragonbody)"/>
  <!-- Belly scales lighter -->
  <ellipse cx="50" cy="66" rx="10" ry="10" fill="#8acc50" opacity="0.4"/>
  <!-- Back spikes -->
  <polygon points="36,52 32,42 40,50" fill="#1a4a08"/>
  <polygon points="44,48 42,38 48,46" fill="#1a4a08"/>
  <polygon points="52,46 52,36 56,44" fill="#1a4a08"/>
  <polygon points="60,48 62,38 64,46" fill="#1a4a08"/>
  <!-- Head - big for baby -->
  <ellipse cx="34" cy="50" rx="16" ry="14" fill="url(#dragonbody)"/>
  <!-- Horn nubs -->
  <polygon points="28,37 24,28 32,36" fill="#2a5a10"/>
  <polygon points="36,35 34,26 40,34" fill="#2a5a10"/>
  <!-- Eye - big cute but fierce -->
  <circle cx="28" cy="50" r="7" fill="#0a1a04"/>
  <circle cx="28" cy="50" r="6" fill="url(#dragoneye)"/>
  <ellipse cx="28" cy="50" rx="2.5" ry="5" fill="#0a0a00"/>
  <circle cx="26" cy="48" r="1.5" fill="#ffffff" opacity="0.6"/>
  <!-- Snout -->
  <ellipse cx="20" cy="54" rx="6" ry="4" fill="#4a8a20"/>
  <!-- Nostrils -->
  <circle cx="18" cy="53" r="1" fill="#1a4a08"/>
  <circle cx="22" cy="53" r="1" fill="#1a4a08"/>
  <!-- Tiny flame breath! -->
  <path d="M14,54 Q6,50 4,46 Q8,48 8,44 Q10,50 12,46 Q12,52 14,54Z" fill="#ff6600" opacity="0.9"/>
  <path d="M14,54 Q8,52 6,48" stroke="#ffcc00" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- Flame tip -->
  <path d="M4,46 Q2,42 4,40 Q6,44 4,46Z" fill="#ffee88" opacity="0.7"/>
</svg>
