<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="wolfbody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c0e8ff"/>
      <stop offset="50%" stop-color="#6aabcc"/>
      <stop offset="100%" stop-color="#1a4a6a"/>
    </radialGradient>
    <filter id="frostglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Frost breath cloud -->
  <ellipse cx="18" cy="48" rx="14" ry="8" fill="#aaddff" opacity="0.25" filter="url(#frostglow)"/>
  <path d="M28,50 Q20,46 14,50 Q20,54 28,50Z" fill="#cceeff" opacity="0.4"/>
  <path d="M26,46 Q18,42 14,44" stroke="#aaddff" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Ice crystal particles floating -->
  <path d="M8,36 L10,40 L8,44 L6,40Z" fill="#aaddff" opacity="0.5"/>
  <path d="M6,38 L10,38" stroke="#aaddff" stroke-width="0.8" opacity="0.5"/>
  <path d="M4,54 L6,58 L4,62 L2,58Z" fill="#88ccff" opacity="0.4"/>
  <!-- Tail - spiked ice fur -->
  <path d="M72,64 Q88,58 92,50 Q88,56 90,48 Q86,56 88,48 Q84,56 86,50" stroke="#4a8aaa" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M72,64 Q88,58 92,50" stroke="#aaddff" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="54" cy="66" rx="26" ry="18" fill="url(#wolfbody)"/>
  <!-- Ice spike fur along back -->
  <polygon points="34,52 30,42 38,50" fill="#aaddff" opacity="0.8"/>
  <polygon points="42,48 40,38 46,46" fill="#88ccff" opacity="0.8"/>
  <polygon points="52,46 52,36 56,44" fill="#aaddff" opacity="0.8"/>
  <polygon points="62,48 64,38 66,46" fill="#88ccff" opacity="0.7"/>
  <polygon points="70,52 74,42 72,50" fill="#aaddff" opacity="0.7"/>
  <!-- Legs -->
  <rect x="32" y="78" width="10" height="16" rx="4" fill="#4a8aaa"/>
  <rect x="46" y="80" width="10" height="14" rx="4" fill="#5a9abb"/>
  <rect x="60" y="78" width="10" height="16" rx="4" fill="#4a8aaa"/>
  <rect x="74" y="76" width="9" height="14" rx="4" fill="#5a9abb"/>
  <!-- Paw ice claws -->
  <path d="M30,93 Q28,97 30,98" stroke="#aaddff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M36,94 Q36,98 38,98" stroke="#aaddff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M72,93 Q70,97 72,98" stroke="#aaddff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M78,94 Q80,98 78,98" stroke="#aaddff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Neck and head connection -->
  <ellipse cx="36" cy="58" rx="14" ry="12" fill="#6aabcc"/>
  <!-- Head - angular fierce wolf -->
  <path d="M14,46 Q14,28 30,24 Q44,22 46,36 Q46,52 30,56 Q14,58 14,46Z" fill="url(#wolfbody)"/>
  <!-- Ears - ice spike shaped -->
  <polygon points="18,30 14,16 26,26" fill="#4a8aaa"/>
  <polygon points="20,28 16,18 24,26" fill="#aaddff" opacity="0.5"/>
  <polygon points="34,26 32,12 40,24" fill="#4a8aaa"/>
  <polygon points="35,25 33,14 39,23" fill="#aaddff" opacity="0.5"/>
  <!-- Muzzle -->
  <ellipse cx="20" cy="50" rx="9" ry="6" fill="#5a9abb"/>
  <!-- Nose -->
  <ellipse cx="16" cy="48" rx="3" ry="2" fill="#1a3a5a"/>
  <ellipse cx="16" cy="48" rx="2" ry="1.2" fill="#2a5a8a" opacity="0.5"/>
  <!-- Eyes - piercing ice blue -->
  <ellipse cx="30" cy="38" rx="5" ry="5" fill="#0a1a2a"/>
  <ellipse cx="30" cy="38" rx="4" ry="4" fill="#aaddff"/>
  <ellipse cx="30" cy="38" rx="2" ry="3.5" fill="#0a0a1a"/>
  <circle cx="29" cy="36" r="1.2" fill="#ffffff" opacity="0.7"/>
  <!-- Snarl lines -->
  <path d="M18,46 Q22,44 26,46" stroke="#1a3a5a" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
