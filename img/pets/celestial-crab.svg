<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="crabshell" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a2a5e"/>
      <stop offset="60%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#050518"/>
    </radialGradient>
    <radialGradient id="clawglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="100%" stop-color="#0044aa"/>
    </radialGradient>
    <filter id="crabglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Constellation lines connecting stars on shell -->
  <!-- Back legs pairs -->
  <line x1="26" y1="64" x2="12" y2="56" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="68" x2="10" y2="68" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="72" x2="14" y2="80" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="74" y1="64" x2="88" y2="56" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="74" y1="68" x2="90" y2="68" stroke="#4488ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="74" y1="72" x2="86" y2="80" stroke="#4488ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Leg tips glow -->
  <circle cx="12" cy="56" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="10" cy="68" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="14" cy="80" r="2" fill="#88ccff" opacity="0.7"/>
  <circle cx="88" cy="56" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="90" cy="68" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="86" cy="80" r="2" fill="#88ccff" opacity="0.7"/>
  <!-- Claw arms -->
  <line x1="28" y1="56" x2="12" y2="42" stroke="#4488ff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="72" y1="56" x2="88" y2="42" stroke="#4488ff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Claws -->
  <path d="M12,42 Q4,36 6,28 Q10,36 14,34 Q14,40 12,42Z" fill="url(#clawglow)"/>
  <path d="M12,42 Q6,42 4,48 Q8,46 14,44 Q14,44 12,42Z" fill="url(#clawglow)" opacity="0.8"/>
  <path d="M88,42 Q96,36 94,28 Q90,36 86,34 Q86,40 88,42Z" fill="url(#clawglow)"/>
  <path d="M88,42 Q94,42 96,48 Q92,46 86,44 Q86,44 88,42Z" fill="url(#clawglow)" opacity="0.8"/>
  <!-- Claw glow -->
  <ellipse cx="10" cy="38" rx="8" ry="8" fill="#4488ff" opacity="0.2" filter="url(#crabglow)"/>
  <ellipse cx="90" cy="38" rx="8" ry="8" fill="#4488ff" opacity="0.2" filter="url(#crabglow)"/>
  <!-- Main shell body -->
  <ellipse cx="50" cy="66" rx="26" ry="20" fill="url(#crabshell)"/>
  <!-- Shell constellation pattern -->
  <line x1="36" y1="62" x2="44" y2="56" stroke="#4488ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="44" y1="56" x2="56" y2="58" stroke="#4488ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="56" y1="58" x2="62" y2="64" stroke="#4488ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="70" x2="50" y2="66" stroke="#4488ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="66" x2="60" y2="70" stroke="#4488ff" stroke-width="0.8" opacity="0.4"/>
  <!-- Stars on shell -->
  <circle cx="36" cy="62" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="44" cy="56" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="56" cy="58" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="62" cy="64" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="42" cy="70" r="1.5" fill="#88ccff" opacity="0.8"/>
  <circle cx="50" cy="66" r="2" fill="#88ccff" opacity="0.9"/>
  <circle cx="60" cy="70" r="1.5" fill="#88ccff" opacity="0.8"/>
  <circle cx="50" cy="76" r="1.5" fill="#ffffff" opacity="0.7"/>
  <!-- Eyes on stalks -->
  <line x1="42" y1="50" x2="38" y2="42" stroke="#4488ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="50" x2="62" y2="42" stroke="#4488ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="38" cy="40" r="5" fill="#0a0a2e"/>
  <circle cx="62" cy="40" r="5" fill="#0a0a2e"/>
  <circle cx="38" cy="40" r="3.5" fill="#4488ff" opacity="0.9"/>
  <circle cx="62" cy="40" r="3.5" fill="#4488ff" opacity="0.9"/>
  <circle cx="38" cy="40" r="2" fill="#88ccff"/>
  <circle cx="62" cy="40" r="2" fill="#88ccff"/>
  <circle cx="37" cy="39" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="61" cy="39" r="1" fill="#ffffff" opacity="0.7"/>
</svg>
