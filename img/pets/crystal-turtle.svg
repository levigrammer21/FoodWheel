<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="crystalface1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aaeeff"/>
      <stop offset="100%" stop-color="#4488cc"/>
    </linearGradient>
    <linearGradient id="crystalface2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#2266aa"/>
    </linearGradient>
    <linearGradient id="crystalface3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ccf0ff"/>
      <stop offset="100%" stop-color="#66aadd"/>
    </linearGradient>
    <filter id="crystalglow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Crystal refraction glow -->
  <ellipse cx="50" cy="56" rx="32" ry="24" fill="#88eeff" opacity="0.12" filter="url(#crystalglow)"/>
  <!-- Legs - stubby strong -->
  <ellipse cx="22" cy="72" rx="9" ry="6" fill="#5a8a6a" transform="rotate(-20,22,72)"/>
  <ellipse cx="78" cy="72" rx="9" ry="6" fill="#5a8a6a" transform="rotate(20,78,72)"/>
  <ellipse cx="28" cy="82" rx="9" ry="6" fill="#4a7a5a" transform="rotate(10,28,82)"/>
  <ellipse cx="72" cy="82" rx="9" ry="6" fill="#4a7a5a" transform="rotate(-10,72,82)"/>
  <!-- Tail -->
  <path d="M56,82 Q64,86 68,82 Q64,88 56,82Z" fill="#4a7a5a"/>
  <!-- Body/neck -->
  <ellipse cx="50" cy="76" rx="22" ry="14" fill="#5a8a6a"/>
  <!-- Crystal shell - geometric facets -->
  <!-- Base flat -->
  <ellipse cx="50" cy="62" rx="30" ry="22" fill="#4488cc" opacity="0.3"/>
  <!-- Main facets of crystal dome -->
  <polygon points="50,28 22,52 50,62" fill="url(#crystalface1)" opacity="0.9"/>
  <polygon points="50,28 78,52 50,62" fill="url(#crystalface2)" opacity="0.9"/>
  <polygon points="50,28 22,52 34,70" fill="url(#crystalface3)" opacity="0.8"/>
  <polygon points="50,28 78,52 66,70" fill="url(#crystalface1)" opacity="0.8"/>
  <polygon points="22,52 34,70 50,62" fill="url(#crystalface2)" opacity="0.7"/>
  <polygon points="78,52 66,70 50,62" fill="url(#crystalface3)" opacity="0.7"/>
  <polygon points="34,70 66,70 50,62" fill="#aaeeff" opacity="0.5"/>
  <!-- Edge lines (crystal facet borders) -->
  <line x1="50" y1="28" x2="22" y2="52" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="28" x2="78" y2="52" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="28" x2="34" y2="70" stroke="#aaddff" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="28" x2="66" y2="70" stroke="#aaddff" stroke-width="0.8" opacity="0.4"/>
  <line x1="22" y1="52" x2="50" y2="62" stroke="#88ccff" stroke-width="0.8" opacity="0.4"/>
  <line x1="78" y1="52" x2="50" y2="62" stroke="#88ccff" stroke-width="0.8" opacity="0.4"/>
  <!-- Crystal apex sparkle -->
  <circle cx="50" cy="28" r="3" fill="#ffffff" opacity="0.9"/>
  <line x1="50" y1="22" x2="50" y2="26" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="24" x2="48" y2="27" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="56" y1="24" x2="52" y2="27" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <!-- Head - old wise turtle -->
  <ellipse cx="50" cy="68" rx="11" ry="9" fill="#5a8a6a"/>
  <ellipse cx="50" cy="65" rx="9" ry="7" fill="#6a9a7a"/>
  <!-- Wise old eyes - small and knowing -->
  <circle cx="44" cy="64" r="3.5" fill="#1a2a1a"/>
  <circle cx="56" cy="64" r="3.5" fill="#1a2a1a"/>
  <circle cx="44" cy="64" r="2" fill="#4a6a3a"/>
  <circle cx="56" cy="64" r="2" fill="#4a6a3a"/>
  <circle cx="43" cy="63" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="63" r="0.8" fill="#ffffff" opacity="0.6"/>
  <!-- Smile wrinkles -->
  <path d="M44,68 Q50,71 56,68" stroke="#4a7a5a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
