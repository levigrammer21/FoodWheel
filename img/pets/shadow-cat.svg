<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="shadowcat" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="100%" stop-color="#050008"/>
    </radialGradient>
    <filter id="catglow"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="shadowblur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <!-- Shadow dissolving edges -->
  <ellipse cx="50" cy="72" rx="34" ry="14" fill="#1a0028" opacity="0.4" filter="url(#shadowblur)"/>
  <!-- Shadow tendrils dissolving from body -->
  <path d="M30,70 Q20,76 16,86" stroke="#2a0040" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M70,70 Q80,76 84,86" stroke="#2a0040" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M40,76 Q36,84 34,92" stroke="#1a0028" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M60,76 Q64,84 66,92" stroke="#1a0028" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Void aura -->
  <ellipse cx="50" cy="60" rx="30" ry="26" fill="#6600cc" opacity="0.1" filter="url(#catglow)"/>
  <!-- Tail - long flowing shadow -->
  <path d="M68,66 Q82,56 86,44 Q82,54 84,44 Q80,56 82,48 Q76,58 78,50 Q70,60 68,66Z" fill="#1a0028" opacity="0.9"/>
  <!-- Tail tip glow -->
  <circle cx="86" cy="44" r="3" fill="#9933ff" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="50" cy="68" rx="24" ry="18" fill="url(#shadowcat)"/>
  <!-- Shadow wisp patterns across body -->
  <path d="M32,64 Q40,58 48,62" stroke="#4400aa" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M52,62 Q60,56 68,62" stroke="#4400aa" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M34,72 Q44,66 56,70" stroke="#6600cc" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Legs semi-transparent -->
  <rect x="32" y="80" width="9" height="14" rx="4" fill="#1a0028" opacity="0.8"/>
  <rect x="46" y="82" width="9" height="12" rx="4" fill="#0d0014" opacity="0.9"/>
  <rect x="60" y="80" width="9" height="14" rx="4" fill="#1a0028" opacity="0.8"/>
  <!-- Claw shadows -->
  <path d="M30,93 Q28,97 30,99" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M36,94 Q38,98 36,99" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M60,93 Q58,97 60,99" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M66,94 Q68,98 66,99" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- Neck -->
  <ellipse cx="40" cy="60" rx="12" ry="10" fill="#0d0014"/>
  <!-- Head -->
  <ellipse cx="32" cy="48" rx="18" ry="16" fill="url(#shadowcat)"/>
  <!-- Ears - sharp shadow pointed -->
  <polygon points="18,38 14,22 28,36" fill="#1a0028"/>
  <polygon points="20,37 17,25 26,35" fill="#4400aa" opacity="0.3"/>
  <polygon points="36,34 36,20 44,34" fill="#1a0028"/>
  <polygon points="37,33 38,22 43,33" fill="#4400aa" opacity="0.3"/>
  <!-- Whiskers made of shadow threads -->
  <line x1="18" y1="52" x2="4" y2="48" stroke="#6600cc" stroke-width="0.8" opacity="0.6"/>
  <line x1="18" y1="54" x2="4" y2="54" stroke="#6600cc" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="56" x2="6" y2="60" stroke="#6600cc" stroke-width="0.8" opacity="0.5"/>
  <line x1="46" y1="52" x2="52" y2="48" stroke="#6600cc" stroke-width="0.8" opacity="0.4"/>
  <line x1="46" y1="54" x2="52" y2="56" stroke="#6600cc" stroke-width="0.8" opacity="0.4"/>
  <!-- Void eyes - the terrifying part -->
  <ellipse cx="26" cy="46" rx="7" ry="7" fill="#6600cc" opacity="0.9"/>
  <ellipse cx="38" cy="46" rx="7" ry="7" fill="#6600cc" opacity="0.9"/>
  <!-- Eye glow -->
  <ellipse cx="26" cy="46" rx="7" ry="7" fill="#9933ff" opacity="0.4" filter="url(#catglow)"/>
  <ellipse cx="38" cy="46" rx="7" ry="7" fill="#9933ff" opacity="0.4" filter="url(#catglow)"/>
  <ellipse cx="26" cy="46" rx="4" ry="5.5" fill="#cc44ff"/>
  <ellipse cx="38" cy="46" rx="4" ry="5.5" fill="#cc44ff"/>
  <ellipse cx="26" cy="46" rx="2" ry="4" fill="#000000"/>
  <ellipse cx="38" cy="46" rx="2" ry="4" fill="#000000"/>
  <circle cx="25" cy="44" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="37" cy="44" r="1.2" fill="#ffffff" opacity="0.5"/>
  <!-- Smug mouth -->
  <path d="M26,54 Q32,58 38,54" stroke="#4400aa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
