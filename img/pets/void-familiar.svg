<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <radialGradient id="vfam" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#e040fb"/><stop offset="100%" stop-color="#0d0020"/>
  </radialGradient>
</defs><g filter="url(#glow)">
  <ellipse cx="32" cy="36" rx="18" ry="20" fill="url(#vfam)"/>
  <ellipse cx="32" cy="30" rx="14" ry="14" fill="#1a0030"/>
  <ellipse cx="32" cy="28" rx="12" ry="12" fill="url(#vfam)" opacity="0.8"/>
