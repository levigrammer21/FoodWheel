  <ellipse cx="32" cy="26" rx="6" ry="7" fill="#0d0020"/>
  <ellipse cx="32" cy="25" rx="5" ry="6" fill="#e040fb" opacity="0.6"/>
  <ellipse cx="32" cy="24" rx="3" ry="4" fill="#0d0020"/>
