<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="voidfam" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a0044"/>
      <stop offset="60%" stop-color="#0d0022"/>
      <stop offset="100%" stop-color="#020008"/>
    </radialGradient>
    <radialGradient id="eyeball" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#cc44ff"/>
      <stop offset="70%" stop-color="#440088"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </radialGradient>
    <filter id="voidfamglow"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="eyeglow2"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Void distortion field -->
  <ellipse cx="50" cy="52" rx="34" ry="30" fill="#6600cc" opacity="0.1" filter="url(#voidfamglow)"/>
  <!-- Tentacles reaching out -->
  <path d="M28,60 Q16,56 10,44 Q14,52 10,52 Q14,58 10,62" stroke="#2a0044" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M28,60 Q16,56 10,44" stroke="#9933ff" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M30,68 Q18,72 12,84 Q16,76 12,78 Q18,80 16,86" stroke="#1a0030" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M72,60 Q84,56 90,44 Q86,52 90,52 Q86,58 90,62" stroke="#2a0044" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M72,60 Q84,56 90,44" stroke="#9933ff" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M70,68 Q82,72 88,84 Q84,76 88,78 Q82,80 84,86" stroke="#1a0030" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M44,76 Q40,88 36,96" stroke="#1a0030" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M56,76 Q60,88 64,96" stroke="#1a0030" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Tentacle sucker eyes (small eyes along tentacles) -->
  <circle cx="14" cy="52" r="3" fill="url(#eyeball)" opacity="0.8"/>
  <circle cx="14" cy="52" r="1.5" fill="#000000"/>
  <circle cx="86" cy="52" r="3" fill="url(#eyeball)" opacity="0.8"/>
  <circle cx="86" cy="52" r="1.5" fill="#000000"/>
  <circle cx="16" cy="80" r="2.5" fill="url(#eyeball)" opacity="0.7"/>
  <circle cx="16" cy="80" r="1.2" fill="#000000"/>
  <circle cx="84" cy="80" r="2.5" fill="url(#eyeball)" opacity="0.7"/>
  <circle cx="84" cy="80" r="1.2" fill="#000000"/>
  <!-- Main body - formless void blob -->
  <path d="M18,52 Q14,36 28,24 Q38,14 50,12 Q62,14 72,24 Q86,36 82,52 Q80,68 66,76 Q56,82 50,80 Q44,82 34,76 Q20,68 18,52Z" fill="url(#voidfam)"/>
  <!-- Body surface void ripples -->
  <path d="M26,44 Q36,38 50,36 Q64,38 74,44" stroke="#6600cc" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M22,54 Q34,48 50,46 Q66,48 78,54" stroke="#4400aa" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M24,64 Q36,58 50,56 Q64,58 76,64" stroke="#3300aa" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Floating orbiting eyes (detached, hovering) -->
  <circle cx="24" cy="32" r="7" fill="url(#eyeball)"/>
  <circle cx="24" cy="32" r="7" fill="#9933ff" opacity="0.3" filter="url(#eyeglow2)"/>
  <ellipse cx="24" cy="32" rx="3" ry="4.5" fill="#000000"/>
  <circle cx="22" cy="30" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="76" cy="32" r="6" fill="url(#eyeball)"/>
  <circle cx="76" cy="32" r="6" fill="#9933ff" opacity="0.3" filter="url(#eyeglow2)"/>
  <ellipse cx="76" cy="32" rx="2.5" ry="4" fill="#000000"/>
  <circle cx="74" cy="30" r="1.2" fill="#ffffff" opacity="0.5"/>
  <!-- Floating eye top -->
  <circle cx="50" cy="18" r="5" fill="url(#eyeball)"/>
  <circle cx="50" cy="18" r="5" fill="#cc44ff" opacity="0.3" filter="url(#eyeglow2)"/>
  <ellipse cx="50" cy="18" rx="2" ry="3.5" fill="#000000"/>
  <circle cx="48" cy="16" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- Main face eyes -->
  <ellipse cx="38" cy="50" rx="9" ry="10" fill="url(#eyeball)"/>
  <ellipse cx="38" cy="50" rx="9" ry="10" fill="#cc44ff" opacity="0.3" filter="url(#eyeglow2)"/>
  <ellipse cx="62" cy="50" rx="9" ry="10" fill="url(#eyeball)"/>
  <ellipse cx="62" cy="50" rx="9" ry="10" fill="#cc44ff" opacity="0.3" filter="url(#eyeglow2)"/>
  <!-- Pupils - vertical slit -->
  <ellipse cx="38" cy="50" rx="3.5" ry="7" fill="#000000"/>
  <ellipse cx="62" cy="50" rx="3.5" ry="7" fill="#000000"/>
  <!-- Mouth - just a void tear opening -->
  <path d="M38,64 Q50,72 62,64 Q58,70 50,72 Q42,70 38,64Z" fill="#000000" opacity="0.9"/>
  <path d="M40,64 Q50,70 60,64" stroke="#9933ff" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Star particles around body -->
  <circle cx="32" cy="22" r="1" fill="#cc44ff" opacity="0.6"/>
  <circle cx="68" cy="20" r="1.2" fill="#9933ff" opacity="0.6"/>
  <circle cx="20" cy="44" r="0.8" fill="#cc44ff" opacity="0.5"/>
  <circle cx="80" cy="44" r="0.8" fill="#cc44ff" opacity="0.5"/>
</svg>
