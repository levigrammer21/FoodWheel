<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="slimebody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#aaffaa"/>
      <stop offset="50%" stop-color="#44cc44"/>
      <stop offset="100%" stop-color="#1a8a1a"/>
    </radialGradient>
    <radialGradient id="slimecore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#44ff44" stop-opacity="0"/>
    </radialGradient>
    <filter id="slimeglow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <!-- Slime puddle base drip -->
  <ellipse cx="50" cy="82" rx="28" ry="8" fill="#1a8a1a" opacity="0.4"/>
  <!-- Drip tendrils hanging down -->
  <path d="M34,76 Q32,84 34,90 Q36,84 34,76Z" fill="#44cc44" opacity="0.7"/>
  <path d="M50,78 Q50,88 52,94 Q54,88 50,78Z" fill="#44cc44" opacity="0.7"/>
  <path d="M66,76 Q68,86 66,92 Q64,86 66,76Z" fill="#44cc44" opacity="0.7"/>
  <!-- Glow aura -->
  <ellipse cx="50" cy="58" rx="32" ry="28" fill="#44ff44" opacity="0.15" filter="url(#slimeglow)"/>
  <!-- Main slime body - wobbly blob -->
  <path d="M20,66 Q16,50 22,38 Q28,24 50,20 Q72,24 78,38 Q84,50 80,66 Q72,78 50,80 Q28,78 20,66Z" fill="url(#slimebody)"/>
  <!-- Inner glow core -->
  <ellipse cx="48" cy="52" rx="20" ry="18" fill="url(#slimecore)"/>
  <!-- Translucent bubbles inside -->
  <circle cx="38" cy="48" r="5" fill="#aaffaa" opacity="0.3"/>
  <circle cx="60" cy="44" r="4" fill="#aaffaa" opacity="0.3"/>
  <circle cx="44" cy="62" r="3.5" fill="#aaffaa" opacity="0.25"/>
  <circle cx="62" cy="60" r="3" fill="#aaffaa" opacity="0.25"/>
  <!-- Absorbed item inside slime (tiny skull - it ate something) -->
  <ellipse cx="56" cy="58" rx="5" ry="4" fill="#ccffcc" opacity="0.2"/>
  <circle cx="54" cy="57" r="1" fill="#44cc44" opacity="0.4"/>
  <circle cx="57" cy="57" r="1" fill="#44cc44" opacity="0.4"/>
  <!-- Mischievous face -->
  <!-- Eyes - one raised eyebrow vibe -->
  <ellipse cx="40" cy="46" rx="6" ry="7" fill="#0a1a0a" opacity="0.9"/>
  <ellipse cx="60" cy="46" rx="6" ry="7" fill="#0a1a0a" opacity="0.9"/>
  <circle cx="40" cy="46" r="4" fill="#44ff44" opacity="0.8"/>
  <circle cx="60" cy="46" r="4" fill="#44ff44" opacity="0.8"/>
  <circle cx="40" cy="46" r="2" fill="#0a0a0a"/>
  <circle cx="60" cy="46" r="2" fill="#0a0a0a"/>
  <circle cx="38" cy="44" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="58" cy="44" r="1.2" fill="#ffffff" opacity="0.7"/>
  <!-- Raised eyebrow left - mischief -->
  <path d="M34,40 Q40,37 46,40" stroke="#1a8a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Smirk mouth -->
  <path d="M38,58 Q44,54 52,56 Q58,58 62,56" stroke="#1a8a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Little tongue flick -->
  <path d="M52,56 Q54,62 52,64 Q50,62 52,56Z" fill="#ff6688" opacity="0.8"/>
  <!-- Top wobble bumps -->
  <path d="M36,22 Q40,14 44,20" stroke="#44cc44" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M50,20 Q54,10 58,18" stroke="#44cc44" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
