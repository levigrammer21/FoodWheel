<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="spritebody" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#aad860"/>
      <stop offset="60%" stop-color="#5aaa20"/>
      <stop offset="100%" stop-color="#2a6a08"/>
    </radialGradient>
    <filter id="spriteaura"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Nature magic floating particles -->
  <circle cx="20" cy="30" r="1.5" fill="#88ff44" opacity="0.6"/>
  <circle cx="80" cy="28" r="1" fill="#aaffaa" opacity="0.5"/>
  <circle cx="16" cy="55" r="1.2" fill="#44ff88" opacity="0.5"/>
  <circle cx="84" cy="52" r="1.5" fill="#88ff44" opacity="0.6"/>
  <circle cx="25" cy="80" r="1" fill="#aaffaa" opacity="0.4"/>
  <circle cx="75" cy="82" r="1.2" fill="#44ff88" opacity="0.5"/>
  <!-- Leaf wings - big translucent -->
  <path d="M34,44 Q14,30 10,14 Q20,24 18,14 Q24,28 20,18 Q28,32 24,22 Q32,38 34,44Z" fill="#44aa20" opacity="0.8"/>
  <!-- Wing veins -->
  <line x1="34" y1="44" x2="10" y2="14" stroke="#88dd44" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="40" x2="16" y2="22" stroke="#88dd44" stroke-width="0.6" opacity="0.4"/>
  <line x1="30" y1="36" x2="20" y2="26" stroke="#88dd44" stroke-width="0.6" opacity="0.4"/>
  <path d="M66,44 Q86,30 90,14 Q80,24 82,14 Q76,28 80,18 Q72,32 76,22 Q68,38 66,44Z" fill="#44aa20" opacity="0.8"/>
