  <!-- Glow aura -->
  <ellipse cx="50" cy="60" rx="20" ry="28" fill="#88ff44" opacity="0.15" filter="url(#spriteaura)"/>
  <!-- Body - living wood -->
  <ellipse cx="50" cy="64" rx="12" ry="16" fill="#7a5020"/>
  <!-- Bark texture lines -->
  <path d="M44,52 Q46,58 44,64 Q46,72 44,78" stroke="#5a3a10" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M56,52 Q54,58 56,64 Q54,72 56,78" stroke="#5a3a10" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Leaf chest covering -->
  <path d="M40,58 Q46,52 52,56 Q46,62 40,58Z" fill="#5aaa20" opacity="0.8"/>
  <path d="M48,56 Q54,50 60,54 Q54,60 48,56Z" fill="#44aa20" opacity="0.8"/>
  <path d="M38,66 Q44,60 50,64 Q44,70 38,66Z" fill="#6acc30" opacity="0.7"/>
  <path d="M50,64 Q56,58 62,62 Q56,68 50,64Z" fill="#5aaa20" opacity="0.7"/>
  <!-- Twig arms -->
  <path d="M38,60 Q26,54 20,46" stroke="#7a5020" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M20,46 Q16,40 12,36" stroke="#7a5020" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M20,46 Q18,40 22,36" stroke="#7a5020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Leaf hands -->
  <path d="M12,36 Q8,30 12,26 Q14,32 12,36Z" fill="#5aaa20"/>
  <path d="M22,36 Q18,30 22,26 Q24,32 22,36Z" fill="#44aa20"/>
  <path d="M62,60 Q74,54 80,46" stroke="#7a5020" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M80,46 Q84,40 88,36" stroke="#7a5020" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M80,46 Q82,40 78,36" stroke="#7a5020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M88,36 Q92,30 88,26 Q86,32 88,36Z" fill="#5aaa20"/>
  <path d="M78,36 Q82,30 78,26 Q76,32 78,36Z" fill="#44aa20"/>
  <!-- Legs - twig -->
  <path d="M44,80 Q40,90 38,96" stroke="#7a5020" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M56,80 Q60,90 62,96" stroke="#7a5020" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="50" cy="44" rx="15" ry="14" fill="url(#spritebody)"/>
  <!-- Leaf crown -->
  <path d="M38,36 Q36,26 40,20 Q42,28 44,24 Q46,30 50,26 Q54,30 56,24 Q58,28 60,20 Q64,26 62,36" fill="#44aa20" opacity="0.9"/>
  <!-- Acorn cap detail -->
  <ellipse cx="50" cy="28" rx="8" ry="4" fill="#8b5e2c"/>
  <!-- Eyes - bright mischievous -->
  <ellipse cx="43" cy="44" rx="5" ry="6" fill="#0a1a04"/>
  <ellipse cx="57" cy="44" rx="5" ry="6" fill="#0a1a04"/>
  <circle cx="43" cy="44" r="4" fill="#88ff44" opacity="0.9"/>
  <circle cx="57" cy="44" r="4" fill="#88ff44" opacity="0.9"/>
  <circle cx="43" cy="44" r="2" fill="#0a0a00"/>
  <circle cx="57" cy="44" r="2" fill="#0a0a00"/>
  <circle cx="41" cy="42" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="55" cy="42" r="1.2" fill="#ffffff" opacity="0.7"/>
  <!-- Mischievous grin showing tiny fang -->
  <path d="M42,52 Q50,58 58,52" stroke="#2a6a08" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="50,52 48,56 52,56" fill="#ffffff" opacity="0.7"/>
</svg>
