<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="lavabody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="50%" stop-color="#cc3300"/>
      <stop offset="100%" stop-color="#4a0a00"/>
    </radialGradient>
    <filter id="lavaglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Heat shimmer glow -->
  <ellipse cx="50" cy="55" rx="36" ry="30" fill="#ff4400" opacity="0.1" filter="url(#lavaglow)"/>
  <!-- Tail - wagging fire! -->
  <path d="M72,60 Q84,48 88,36 Q84,44 86,36 Q80,46 82,38 Q78,48 80,42 Q74,52 72,60Z" fill="#ff6600" opacity="0.9"/>
  <path d="M72,60 Q84,48 88,36" stroke="#ffcc00" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Flame tail tip -->
  <path d="M88,36 Q92,28 88,22 Q86,30 88,36Z" fill="#ffee88" opacity="0.8"/>
  <!-- Body - molten rock -->
  <ellipse cx="52" cy="68" rx="24" ry="18" fill="#2a0a00"/>
  <!-- Lava crack glow across body -->
  <path d="M36,64 Q44,60 52,64 Q60,68 68,64" stroke="#ff6600" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M40,72 Q50,68 60,72" stroke="#ff4400" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M38,58 Q46,54 50,58" stroke="#ff8800" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M56,60 Q62,56 68,60" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Lava glow patches on body -->
  <ellipse cx="42" cy="65" rx="5" ry="4" fill="#ff6600" opacity="0.4"/>
  <ellipse cx="58" cy="70" rx="4" ry="3" fill="#ff4400" opacity="0.4"/>
  <ellipse cx="52" cy="60" rx="3" ry="2.5" fill="#ff8800" opacity="0.5"/>
  <!-- Legs - stubby rock -->
  <rect x="32" y="80" width="10" height="14" rx="4" fill="#1a0a00"/>
  <rect x="46" y="82" width="10" height="12" rx="4" fill="#2a0a00"/>
  <rect x="58" y="80" width="10" height="14" rx="4" fill="#1a0a00"/>
  <!-- Lava seeping through leg cracks -->
  <line x1="37" y1="82" x2="37" y2="92" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <line x1="63" y1="82" x2="63" y2="92" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <!-- Neck -->
  <ellipse cx="38" cy="62" rx="12" ry="10" fill="#1a0a00"/>
  <path d="M30,60 Q38,56 46,60" stroke="#ff6600" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Head - excited puppy shape -->
  <ellipse cx="28" cy="52" rx="18" ry="16" fill="#2a0a00"/>
  <!-- Head lava cracks -->
  <path d="M18,48 Q24,44 32,48" stroke="#ff8800" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M20,54 Q28,50 36,54" stroke="#ff6600" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Ears - floppy but made of rock with glow edges -->
  <ellipse cx="14" cy="40" rx="8" ry="10" fill="#1a0a00" transform="rotate(-20,14,40)"/>
  <path d="M10,34 Q12,40 10,46" stroke="#ff4400" stroke-width="1" fill="none" opacity="0.5"/>
  <ellipse cx="34" cy="36" rx="7" ry="9" fill="#1a0a00" transform="rotate(10,34,36)"/>
  <path d="M32,30 Q34,36 32,42" stroke="#ff4400" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Eyes - excited bright lava orange -->
  <circle cx="22" cy="50" r="6" fill="#0a0000"/>
  <circle cx="22" cy="50" r="5" fill="#ff6600" opacity="0.9"/>
  <circle cx="22" cy="50" r="3" fill="#ffcc00"/>
  <circle cx="22" cy="50" r="1.5" fill="#0a0000"/>
  <circle cx="20" cy="48" r="1.2" fill="#ffffff" opacity="0.5"/>
  <!-- Big happy panting tongue -->
  <path d="M22,58 Q28,56 34,60 Q32,66 28,68 Q24,66 22,62 Q20,60 22,58Z" fill="#ff4466"/>
  <line x1="28" y1="62" x2="28" y2="68" stroke="#cc2244" stroke-width="1" opacity="0.5"/>
  <!-- Drool drop of lava -->
  <path d="M24,68 Q24,74 26,76 Q28,74 24,68Z" fill="#ff6600" opacity="0.6"/>
  <!-- Snout -->
  <ellipse cx="14" cy="54" rx="5" ry="4" fill="#1a0a00"/>
  <ellipse cx="12" cy="53" rx="2" ry="1.5" fill="#ff4400" opacity="0.6"/>
  <ellipse cx="16" cy="53" rx="2" ry="1.5" fill="#ff4400" opacity="0.6"/>
</svg>
