  <path d="M22,20 L16,14" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M42,20 L48,14" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="48,10 44,14 50,16 52,10" fill="#90caf9"/>
</g>
</svg>