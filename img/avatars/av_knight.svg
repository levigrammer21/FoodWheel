<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2332"/><stop offset="100%" stop-color="#0a0f1a"/></linearGradient>
  <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#90caf9"/><stop offset="100%" stop-color="#1565c0"/></linearGradient>
</defs>
<circle cx="32" cy="32" r="30" fill="url(#bg)"/>
<g filter="url(#glow)">
  <path d="M16,48 C16,48 14,28 32,20 C50,28 48,48 48,48 Z" fill="url(#armor)"/>
  <rect x="14" y="46" width="36" height="8" rx="3" fill="#1565c0"/>
  <rect x="22" y="36" width="20" height="8" rx="1" fill="#0a0f1a"/>
