<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#0d0028"/><stop offset="100%" stop-color="#000005"/></radialGradient>
  <radialGradient id="vportal" cx="50%" cy="50%"><stop offset="0%" stop-color="#e040fb"/><stop offset="40%" stop-color="#6a1b9a"/><stop offset="100%" stop-color="#0d0020" stop-opacity="0"/></radialGradient>
</defs>
<circle cx="32" cy="32" r="30" fill="url(#bg)"/>
<circle cx="32" cy="32" r="24" fill="url(#vportal)" opacity="0.3"/>
<g filter="url(#glow)">
  <ellipse cx="32" cy="38" rx="18" ry="22" fill="#0d0020"/>
  <ellipse cx="32" cy="26" rx="14" ry="14" fill="#1a0030"/>
  <ellipse cx="32" cy="24" rx="14" ry="14" fill="url(#vportal)" opacity="0.8"/>
  <ellipse cx="26" cy="22" rx="5.5" ry="6.5" fill="#0d0020"/>
  <ellipse cx="38" cy="22" rx="5.5" ry="6.5" fill="#0d0020"/>
  <ellipse cx="26" cy="21" rx="3.5" ry="4.5" fill="#ab47bc" opacity="0.9"/>
  <ellipse cx="38" cy="21" rx="3.5" ry="4.5" fill="#ab47bc" opacity="0.9"/>
  <path d="M26,30 Q32,34 38,30" stroke="#ab47bc" stroke-width="1.5" fill="none"/>
  <path d="M10,16 Q6,8 8,4 Q10,12 14,16" fill="#6a1b9a" opacity="0.9"/>
  <path d="M54,16 Q58,8 56,4 Q54,12 50,16" fill="#6a1b9a" opacity="0.9"/>
  <circle cx="32" cy="8" r="7" fill="#ab47bc" opacity="0.5"/>
  <circle cx="32" cy="8" r="4" fill="white" opacity="0.2"/>
