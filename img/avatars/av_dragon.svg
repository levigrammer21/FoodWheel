  <ellipse cx="28" cy="27" rx="2" ry="3.5" fill="#000"/>
  <ellipse cx="36" cy="27" rx="2" ry="3.5" fill="#000"/>
  <path d="M27,34 Q32,38 37,34" stroke="#bf360c" stroke-width="2" fill="none"/>
  <path d="M36,26 Q44,20 50,22 Q46,28 42,32" fill="url(#scales)" opacity="0.7"/>
