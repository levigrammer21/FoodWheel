<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2d0a00"/><stop offset="100%" stop-color="#0d0300"/></radialGradient>
  <linearGradient id="scales" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd54f"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
</defs>
<circle cx="32" cy="32" r="30" fill="url(#bg)"/>
<g filter="url(#glow)">
  <ellipse cx="32" cy="42" rx="18" ry="18" fill="#bf360c"/>
  <ellipse cx="32" cy="28" rx="14" ry="14" fill="url(#scales)"/>
  <path d="M18,16 Q20,8 26,14" fill="#bf360c" stroke="#e65100" stroke-width="0.5"/>
  <path d="M46,16 Q44,8 38,14" fill="#bf360c" stroke="#e65100" stroke-width="0.5"/>
  <ellipse cx="18" cy="18" rx="7" ry="8" fill="url(#scales)"/>
