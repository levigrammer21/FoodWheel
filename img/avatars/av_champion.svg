<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ffd54f" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2d1800"/><stop offset="100%" stop-color="#080400"/></radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="white"/><stop offset="30%" stop-color="#ffd54f"/><stop offset="100%" stop-color="#e65100"/></linearGradient>
</defs>
<circle cx="32" cy="32" r="30" fill="url(#bg)"/>
<circle cx="32" cy="32" r="27" fill="none" stroke="#ffd54f" stroke-width="1" opacity="0.4"/>
<circle cx="32" cy="32" r="24" fill="none" stroke="#ffd54f" stroke-width="0.5" opacity="0.2"/>
<g filter="url(#glow)">
  <path d="M14,48 L14,30 L20,38 L32,16 L44,38 L50,30 L50,48 Z" fill="url(#gold)"/>
