<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="stormeye" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#88ccff"/>
      <stop offset="50%" stop-color="#2244aa"/>
      <stop offset="100%" stop-color="#001030"/>
    </radialGradient>
  </defs>
  <!-- Storm chain -->
  <path d="M50,10 Q36,12 28,20 Q20,32 20,48 Q22,60 32,70" stroke="#4a6a8a" stroke-width="2" fill="none"/>
  <path d="M50,10 Q64,12 72,20 Q80,32 80,48 Q78,60 68,70" stroke="#4a6a8a" stroke-width="2" fill="none"/>
  <!-- Chain lightning -->
  <path d="M36,30 L40,36 L36,36 L42,44" stroke="#aaddff" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Storm Eye pendant - large oval -->
  <ellipse cx="50" cy="76" rx="22" ry="18" fill="#1a2a4a"/>
  <!-- Eye shape -->
  <path d="M28,76 Q38,62 50,62 Q62,62 72,76 Q62,90 50,90 Q38,90 28,76Z" fill="url(#stormeye)"/>
  <!-- Iris storm swirl -->
  <circle cx="50" cy="76" r="12" fill="#1a2a4a" opacity="0.6"/>
  <circle cx="50" cy="76" r="8" fill="#002a5a" opacity="0.8"/>
  <!-- Lightning inside eye -->
  <path d="M46,70 L50,76 L47,76 L52,83" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.9"/>
  <path d="M54,70 L52,76 L55,76 L51,82" stroke="#aaddff" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="50" cy="76" r="3" fill="#000010"/>
  <!-- Eye white highlight -->
  <ellipse cx="42" cy="70" rx="5" ry="4" fill="#ffffff" opacity="0.25"/>
  <!-- Storm clouds framing eye -->
  <ellipse cx="30" cy="76" rx="8" ry="5" fill="#2a4a7a" opacity="0.5"/>
  <ellipse cx="70" cy="76" rx="8" ry="5" fill="#2a4a7a" opacity="0.5"/>
  <!-- Frame -->
  <ellipse cx="50" cy="76" rx="22" ry="18" fill="none" stroke="#4a6a8a" stroke-width="2.5"/>
</svg>
