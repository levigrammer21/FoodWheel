<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
        <g filter="url(#glow)">
          <ellipse cx="32" cy="28" rx="16" ry="18" fill="#42a5f5"/>
          <ellipse cx="32" cy="28" rx="16" ry="18" fill="none" stroke="#1565c0" stroke-width="1.5"/>
          <ellipse cx="26" cy="30" rx="5" ry="6" fill="#1565c0"/>
          <ellipse cx="38" cy="30" rx="5" ry="6" fill="#1565c0"/>
          <rect x="24" y="42" width="5" height="6" rx="1" fill="#1565c0"/>
          <rect x="30" y="42" width="4" height="6" rx="1" fill="#42a5f5"/>
          <rect x="35" y="42" width="5" height="6" rx="1" fill="#1565c0"/>
          <ellipse cx="26" cy="30" rx="3" ry="4" fill="#1a1a2e" opacity="0.8"/>
          <ellipse cx="38" cy="30" rx="3" ry="4" fill="#1a1a2e" opacity="0.8"/>
        </g>
</svg>