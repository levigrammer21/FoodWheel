<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fallengrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3a20"/>
      <stop offset="40%" stop-color="#c8a840"/>
      <stop offset="100%" stop-color="#3a2a10"/>
    </linearGradient>
  </defs>
  <!-- Shadow of former glory -->
  <ellipse cx="50" cy="55" rx="36" ry="12" fill="#8a6a20" opacity="0.1"/>
  <!-- Crown band - tarnished gold -->
  <rect x="12" y="52" width="76" height="14" rx="4" fill="url(#fallengrad)"/>
  <rect x="12" y="52" width="76" height="4" rx="2" fill="#e8c860" opacity="0.3"/>
  <!-- Crown points - varying heights, some broken -->
  <polygon points="18,52 22,28 26,52" fill="url(#fallengrad)"/>
  <!-- Broken point - snapped off -->
  <polygon points="30,52 34,38 38,52" fill="url(#fallengrad)"/>
  <line x1="34" y1="38" x2="36" y2="32" stroke="#c8a840" stroke-width="2" opacity="0.6"/>
  <!-- Jagged break mark -->
  <path d="M34,38 L32,34 L35,30" stroke="#8a6a20" stroke-width="1.5" fill="none"/>
  <polygon points="42,52 46,24 50,52" fill="url(#fallengrad)"/>
  <!-- Large crack through tallest point and band -->
  <path d="M46,24 L48,36 L44,48 L46,60 L48,66" stroke="#1a0a00" stroke-width="2" fill="none"/>
  <polygon points="54,52 58,32 62,52" fill="url(#fallengrad)"/>
  <polygon points="66,52 70,42 74,52" fill="url(#fallengrad)"/>
  <!-- Broken corner of band -->
  <path d="M78,52 Q84,52 86,58 Q80,60 76,58Z" fill="url(#fallengrad)" opacity="0.6"/>
  <!-- Gems - some missing, some cracked -->
  <ellipse cx="22" cy="45" rx="4" ry="4" fill="#2a1a00" opacity="0.8"/>
  <!-- Cracked gem -->
  <ellipse cx="46" cy="36" rx="5" ry="5" fill="#c8a840" opacity="0.6"/>
  <line x1="44" y1="34" x2="48" y2="38" stroke="#4a3a00" stroke-width="1.2"/>
  <!-- Empty gem socket -->
  <ellipse cx="70" cy="46" rx="4" ry="4" fill="#1a0a00" opacity="0.7"/>
  <ellipse cx="70" cy="46" rx="2" ry="2" fill="#2a1a00" opacity="0.8"/>
  <!-- Faded engravings on band -->
  <path d="M28,59 Q32,55 36,59" stroke="#e8c860" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M56,59 Q60,55 64,59" stroke="#e8c860" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
