  <path d="M14,22 L14,68 Q14,76 22,78 L40,78 Q48,74 50,68 L36,66 Q26,64 24,58 L22,22Z" fill="none" stroke="#aa44ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M50,68 Q52,74 60,78 L80,78 Q86,76 86,68 L86,22 L78,22 L76,58 Q74,64 64,66 Q56,66 50,68Z" fill="none" stroke="#aa44ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Stars leaking from rift holes -->
  <circle cx="30" cy="36" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="26" cy="40" r="0.6" fill="#cc88ff" opacity="0.7"/>
  <circle cx="72" cy="42" r="0.8" fill="#ffffff" opacity="0.8"/>
