      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#aa44ff"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <!-- Void rift footprints below boots -->
  <ellipse cx="28" cy="90" rx="14" ry="5" fill="url(#rifthole)" opacity="0.4"/>
