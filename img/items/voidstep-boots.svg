  <path d="M50,68 Q52,74 60,78 L80,78 Q86,76 86,68 L86,22 L78,22 L76,58 Q74,64 64,66 Q56,66 50,68Z" fill="#0a0015"/>
  <!-- Rifts right -->
  <ellipse cx="72" cy="40" rx="6" ry="4" fill="url(#rifthole)" opacity="0.7"/>
  <ellipse cx="66" cy="58" rx="5" ry="3" fill="url(#rifthole)" opacity="0.6"/>
