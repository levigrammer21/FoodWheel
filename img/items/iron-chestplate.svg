<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ironplate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a6a74"/>
      <stop offset="40%" stop-color="#8a9ba8"/>
      <stop offset="100%" stop-color="#4a5a64"/>
    </linearGradient>
  </defs>
  <!-- Breastplate body -->
  <path d="M18,32 Q18,18 50,12 Q82,18 82,32 L78,86 Q50,92 22,86Z" fill="url(#ironplate)"/>
  <!-- Chest ridge down center -->
  <path d="M50,14 Q52,40 50,86" stroke="#9ab0bc" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Left and right chest panel definition -->
  <path d="M32,22 Q42,28 50,26" stroke="#4a5a64" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M68,22 Q58,28 50,26" stroke="#4a5a64" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Pauldron rim top -->
  <path d="M18,32 Q22,24 34,20" stroke="#8a9ba8" stroke-width="2.5" fill="none"/>
  <path d="M82,32 Q78,24 66,20" stroke="#8a9ba8" stroke-width="2.5" fill="none"/>
  <!-- Rivets grid -->
  <circle cx="28" cy="40" r="2.5" fill="#4a5a64"/>
  <circle cx="28" cy="56" r="2.5" fill="#4a5a64"/>
  <circle cx="28" cy="72" r="2.5" fill="#4a5a64"/>
  <circle cx="72" cy="40" r="2.5" fill="#4a5a64"/>
  <circle cx="72" cy="56" r="2.5" fill="#4a5a64"/>
  <circle cx="72" cy="72" r="2.5" fill="#4a5a64"/>
  <!-- Fauld (lower skirt guard) -->
  <rect x="22" y="82" width="56" height="8" rx="2" fill="#5a6a74"/>
  <line x1="30" y1="82" x2="30" y2="90" stroke="#4a5a64" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="82" x2="42" y2="90" stroke="#4a5a64" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="82" x2="58" y2="90" stroke="#4a5a64" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="82" x2="70" y2="90" stroke="#4a5a64" stroke-width="1" opacity="0.5"/>
</svg>
