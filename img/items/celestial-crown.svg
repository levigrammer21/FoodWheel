<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="celglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#aaddff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Celestial ring orbiting -->
  <ellipse cx="50" cy="42" rx="38" ry="12" fill="none" stroke="#88bbff" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Orbital stars on ring -->
  <circle cx="12" cy="42" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="88" cy="42" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="50" cy="30" r="1.5" fill="#aaddff" opacity="0.6"/>
  <circle cx="50" cy="54" r="1.5" fill="#aaddff" opacity="0.6"/>
  <!-- Crown base band -->
  <rect x="16" y="58" width="68" height="10" rx="4" fill="#1a1a3e"/>
  <rect x="16" y="58" width="68" height="3" rx="2" fill="#88aaff" opacity="0.4"/>
  <!-- Crown points - 5 -->
  <polygon points="22,58 26,36 30,58" fill="#1a1a3e"/>
  <polygon points="34,58 38,28 42,58" fill="#1a1a3e"/>
  <polygon points="46,58 50,24 54,58" fill="#1a1a3e"/>
  <polygon points="58,58 62,28 66,58" fill="#1a1a3e"/>
  <polygon points="70,58 74,36 78,58" fill="#1a1a3e"/>
  <!-- Gem on tallest point (center) -->
  <ellipse cx="50" cy="27" rx="5" ry="6" fill="#88ccff"/>
  <ellipse cx="50" cy="25" rx="3" ry="3" fill="#ffffff" opacity="0.6"/>
  <!-- Smaller gems on other points -->
  <circle cx="38" cy="30" r="4" fill="#aaddff" opacity="0.8"/>
  <circle cx="62" cy="30" r="4" fill="#aaddff" opacity="0.8"/>
  <circle cx="26" cy="38" r="3" fill="#88aaff" opacity="0.7"/>
  <circle cx="74" cy="38" r="3" fill="#88aaff" opacity="0.7"/>
  <!-- Band gems -->
  <circle cx="32" cy="63" r="3" fill="#4488ff" opacity="0.7"/>
  <circle cx="50" cy="63" r="3" fill="#88ccff" opacity="0.8"/>
  <circle cx="68" cy="63" r="3" fill="#4488ff" opacity="0.7"/>
  <!-- Celestial glow center -->
  <ellipse cx="50" cy="45" rx="30" ry="20" fill="url(#celglow)"/>
</svg>
