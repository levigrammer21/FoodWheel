<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ce93d8"/>
            <stop offset="100%" stop-color="#6a1b9a"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <path d="M14,48 L14,30 L20,38 L32,18 L44,38 L50,30 L50,48 Z" fill="url(#crown)"/>
          <rect x="14" y="46" width="36" height="6" rx="3" fill="#6a1b9a"/>
          <circle cx="32" cy="18" r="4" fill="#e1bee7"/>
          <circle cx="14" cy="30" r="3" fill="#e1bee7"/>
          <circle cx="50" cy="30" r="3" fill="#e1bee7"/>
          <circle cx="20" cy="38" r="2.5" fill="#ab47bc" opacity="0.8"/>
          <circle cx="44" cy="38" r="2.5" fill="#ab47bc" opacity="0.8"/>
        </g>
</svg>