<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="steelhelm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a5a64"/>
      <stop offset="35%" stop-color="#9ab0bc"/>
      <stop offset="65%" stop-color="#7a8a94"/>
      <stop offset="100%" stop-color="#3a4a54"/>
    </linearGradient>
  </defs>
  <!-- Full helm dome -->
  <path d="M18,70 Q18,24 50,16 Q82,24 82,70Z" fill="url(#steelhelm)"/>
  <!-- Highlight -->
  <ellipse cx="38" cy="32" rx="12" ry="10" fill="#b8ccd8" opacity="0.2"/>
  <!-- Visor face plate -->
  <path d="M28,48 Q28,38 50,36 Q72,38 72,48 L70,72 Q50,76 30,72Z" fill="#5a6a74"/>
  <path d="M28,48 Q28,40 50,38 Q72,40 72,48" stroke="#8a9ba8" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- T-slit visor -->
  <rect x="47" y="42" width="6" height="16" rx="1" fill="#1a2a34" opacity="0.9"/>
  <rect x="32" y="53" width="36" height="5" rx="1" fill="#1a2a34" opacity="0.9"/>
  <!-- Brow ridge -->
  <path d="M28,48 Q50,44 72,48" stroke="#8a9ba8" stroke-width="2.5" fill="none"/>
  <!-- Neck guard -->
  <rect x="20" y="68" width="60" height="8" rx="3" fill="#4a5a64"/>
  <!-- Rivets on rim -->
  <circle cx="26" cy="72" r="2" fill="#3a4a54"/>
  <circle cx="38" cy="74" r="2" fill="#3a4a54"/>
  <circle cx="50" cy="74" r="2" fill="#3a4a54"/>
  <circle cx="62" cy="74" r="2" fill="#3a4a54"/>
  <circle cx="74" cy="72" r="2" fill="#3a4a54"/>
</svg>
