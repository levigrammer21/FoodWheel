<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="helm" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ab47bc"/>
            <stop offset="100%" stop-color="#6a1b9a"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <path d="M16,46 C16,46 14,28 32,20 C50,28 48,46 48,46 Z" fill="url(#helm)"/>
          <rect x="16" y="44" width="32" height="8" rx="2" fill="#6a1b9a"/>
          <rect x="22" y="36" width="20" height="6" rx="1" fill="#0a0010" opacity="0.9"/>
          <ellipse cx="27" cy="39" rx="3" ry="2.5" fill="#ab47bc" opacity="0.8"/>
          <ellipse cx="37" cy="39" rx="3" ry="2.5" fill="#ab47bc" opacity="0.8"/>
          <path d="M28,28 L32,24 L36,28" stroke="#ce93d8" stroke-width="1.5" fill="none"/>
        </g>
</svg>