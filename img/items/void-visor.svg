<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="voidvisor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9933ff"/>
      <stop offset="40%" stop-color="#220066"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="vvisglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Void aura leaking from visor -->
  <ellipse cx="50" cy="50" rx="28" ry="22" fill="#6600cc" opacity="0.15" filter="url(#vvisglow)"/>
  <!-- Sleek helm body -->
  <path d="M16,65 Q16,22 50,14 Q84,22 84,65Z" fill="#0d0020"/>
  <!-- Metallic edge highlight -->
  <path d="M16,65 Q16,22 50,14" stroke="#6600cc" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M84,65 Q84,22 50,14" stroke="#6600cc" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Visor panel - void rift -->
  <path d="M24,44 Q24,36 50,32 Q76,36 76,44 L74,66 Q50,72 26,66Z" fill="url(#voidvisor)"/>
  <!-- Void stars -->
  <circle cx="36" cy="48" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="52" cy="44" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="66" cy="50" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="42" cy="58" r="0.8" fill="#cc88ff" opacity="0.6"/>
  <circle cx="60" cy="60" r="0.8" fill="#cc88ff" opacity="0.5"/>
  <!-- Void energy slit horizon line -->
  <line x1="26" y1="52" x2="74" y2="52" stroke="#9933ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Helmet ridge -->
  <rect x="46" y="14" width="8" height="50" rx="1" fill="#0d0020" opacity="0.5"/>
  <!-- Bottom neck guard -->
  <rect x="18" y="63" width="64" height="8" rx="3" fill="#0d0020"/>
  <rect x="18" y="63" width="64" height="2" rx="1" fill="#6600cc" opacity="0.5"/>
</svg>
