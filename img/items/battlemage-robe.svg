<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Flowing robe underneath -->
  <path d="M24,40 L16,92 L84,92 L76,40Z" fill="#4a3a6a"/>
  <!-- Robe fold lines -->
  <line x1="34" y1="46" x2="28" y2="92" stroke="#3a2a5a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="46" x2="50" y2="92" stroke="#3a2a5a" stroke-width="1" opacity="0.5"/>
  <line x1="66" y1="46" x2="72" y2="92" stroke="#3a2a5a" stroke-width="1" opacity="0.5"/>
  <!-- Metal breastplate over robe -->
  <path d="M26,18 Q26,10 50,6 Q74,10 74,18 L72,50 Q50,56 28,50Z" fill="#7a8a94"/>
  <!-- Plate highlight -->
  <ellipse cx="37" cy="24" rx="10" ry="8" fill="#aabbc8" opacity="0.25"/>
  <!-- Plate center line -->
  <line x1="50" y1="8" x2="50" y2="52" stroke="#b8ccd8" stroke-width="2" opacity="0.35"/>
  <!-- Arcane rune on breastplate -->
  <circle cx="50" cy="30" r="8" fill="none" stroke="#aa66ff" stroke-width="1.2" opacity="0.6"/>
  <line x1="50" y1="22" x2="50" y2="38" stroke="#aa66ff" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="30" x2="58" y2="30" stroke="#aa66ff" stroke-width="1" opacity="0.5"/>
  <!-- Pauldrons -->
  <ellipse cx="26" cy="22" rx="10" ry="7" fill="#6a7a84"/>
  <ellipse cx="74" cy="22" rx="10" ry="7" fill="#6a7a84"/>
  <!-- Robe belt with arcane clasp -->
  <rect x="28" y="50" width="44" height="6" rx="2" fill="#3a2a5a"/>
  <rect x="44" y="49" width="12" height="8" rx="2" fill="#aa66ff" opacity="0.6"/>
  <!-- Sleeve wide mage -->
  <path d="M26,18 L10,38 L16,42 L30,28Z" fill="#4a3a6a"/>
  <path d="M74,18 L90,38 L84,42 L70,28Z" fill="#4a3a6a"/>
</svg>
