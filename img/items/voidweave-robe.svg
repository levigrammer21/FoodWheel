  <circle cx="40" cy="36" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="44" cy="44" r="0.7" fill="#aaddff" opacity="0.8"/>
  <circle cx="36" cy="50" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="42" cy="52" r="0.6" fill="#cc88ff" opacity="0.8"/>
  <circle cx="58" cy="52" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="66" cy="58" r="1" fill="#ffffff" opacity="0.7"/>
