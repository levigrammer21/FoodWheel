<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ce93d8"/>
            <stop offset="60%" stop-color="#4a148c"/>
            <stop offset="100%" stop-color="#1a0030"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <polygon points="32,6 29,46 32,52 35,46" fill="url(#blade)"/>
          <polygon points="32,6 32,20 33,20" fill="#e1bee7" opacity="0.5"/>
          <rect x="19" y="45" width="26" height="5" rx="1.5" fill="#4a148c"/>
          <rect x="30" y="50" width="4" height="10" rx="2" fill="#2d1b4e"/>
          <ellipse cx="32" cy="60" rx="3" ry="2" fill="#7b1fa2"/>
          <circle cx="32" cy="30" r="2" fill="#ce93d8" opacity="0.6"/>
        </g>
</svg>