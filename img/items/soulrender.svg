<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="soulblade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="40%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <radialGradient id="soulglow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a0080" stop-opacity="0"/>
    </radialGradient>
    <filter id="soulblur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <!-- Outer soul glow -->
  <ellipse cx="50" cy="35" rx="28" ry="38" fill="url(#soulglow)" filter="url(#soulblur)"/>
  <!-- Soul energy arcs -->
  <path d="M42,18 Q30,28 38,40 Q26,32 36,22Z" fill="#9b59b6" opacity="0.5"/>
  <path d="M58,22 Q70,32 62,44 Q74,36 64,24Z" fill="#8e44ad" opacity="0.45"/>
  <path d="M40,38 Q28,50 36,58 Q25,48 34,40Z" fill="#6c3483" opacity="0.4"/>
  <!-- Wide intimidating blade -->
  <polygon points="50,4 40,60 60,60" fill="url(#soulblade)"/>
  <!-- Blade edge glints -->
  <line x1="50" y1="4" x2="40" y2="60" stroke="#cc88ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="4" x2="60" y2="60" stroke="#cc88ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Rune down center of blade -->
  <line x1="50" y1="10" x2="50" y2="56" stroke="#cc66ff" stroke-width="1" opacity="0.6"/>
  <line x1="46" y1="25" x2="54" y2="25" stroke="#cc66ff" stroke-width="1" opacity="0.5"/>
  <line x1="47" y1="38" x2="53" y2="38" stroke="#cc66ff" stroke-width="1" opacity="0.4"/>
  <!-- Skull crossguard -->
  <rect x="33" y="59" width="34" height="7" rx="2" fill="#1a0a2e"/>
  <!-- Skull shape in guard -->
  <ellipse cx="50" cy="62" rx="8" ry="5" fill="#2d1450"/>
  <circle cx="47" cy="61" r="1.5" fill="#9b59b6" opacity="0.8"/>
  <circle cx="53" cy="61" r="1.5" fill="#9b59b6" opacity="0.8"/>
  <path d="M46,64 Q50,66 54,64" stroke="#9b59b6" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Grip with soul tendrils -->
  <rect x="46" y="66" width="8" height="20" rx="2" fill="#0d0020"/>
  <path d="M44,70 Q42,75 44,78" stroke="#9b59b6" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M56,72 Q58,77 56,80" stroke="#9b59b6" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Pommel - glowing orb -->
  <circle cx="50" cy="89" r="7" fill="#1a0a2e"/>
  <circle cx="50" cy="89" r="5" fill="#4a0080" opacity="0.8"/>
  <circle cx="50" cy="89" r="3" fill="#cc66ff" opacity="0.6"/>
  <circle cx="48" cy="87" r="1.2" fill="#ffffff" opacity="0.4"/>
</svg>
