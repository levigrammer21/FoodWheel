<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="lastwordblade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a7040"/>
      <stop offset="30%" stop-color="#f0e0a0"/>
      <stop offset="60%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8a7040"/>
    </linearGradient>
    <radialGradient id="lastwordglow" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Elegant rapier-style blade -->
  <polygon points="50,5 48,60 52,60" fill="url(#lastwordblade)"/>
  <!-- Mirror sheen -->
  <line x1="49" y1="7" x2="49" y2="58" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
  <!-- Engraved word down blade (tiny) -->
  <line x1="51" y1="15" x2="51" y2="55" stroke="#8a7040" stroke-width="0.6" opacity="0.4" stroke-dasharray="2,3"/>
  <!-- Complex swept-hilt guard -->
  <path d="M28,59 Q36,54 44,57 Q50,55 56,57 Q64,54 72,59" stroke="#8a7040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Hilt loops -->
  <ellipse cx="36" cy="61" rx="6" ry="5" fill="none" stroke="#b89a50" stroke-width="2.5"/>
  <ellipse cx="64" cy="61" rx="6" ry="5" fill="none" stroke="#b89a50" stroke-width="2.5"/>
  <!-- Grip - polished wood with gold wire -->
  <rect x="46" y="59" width="8" height="24" rx="3" fill="#5a3010"/>
  <path d="M45,62 Q50,60 55,62 Q50,64 45,62Z" fill="#ffd700" opacity="0.5"/>
  <path d="M45,67 Q50,65 55,67 Q50,69 45,67Z" fill="#ffd700" opacity="0.5"/>
  <path d="M45,72 Q50,70 55,72 Q50,74 45,72Z" fill="#ffd700" opacity="0.5"/>
  <path d="M45,77 Q50,75 55,77 Q50,79 45,77Z" fill="#ffd700" opacity="0.5"/>
  <!-- Pommel - ornamented medallion -->
  <circle cx="50" cy="86" r="8" fill="#8a7040"/>
  <circle cx="50" cy="86" r="6" fill="#ffd700" opacity="0.7"/>
  <circle cx="50" cy="86" r="4" fill="#8a7040"/>
  <circle cx="50" cy="86" r="2" fill="#ffd700" opacity="0.8"/>
  <!-- Glow under hilt -->
  <ellipse cx="50" cy="72" rx="20" ry="18" fill="url(#lastwordglow)"/>
</svg>
