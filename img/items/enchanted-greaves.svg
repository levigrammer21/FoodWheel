<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left leg plate -->
  <path d="M16,10 Q28,6 36,10 L40,78 Q26,84 16,78Z" fill="#4a5a7a"/>
  <!-- Right leg plate -->
  <path d="M64,10 Q74,6 84,10 L84,78 Q72,84 60,78Z" fill="#4a5a7a"/>
  <!-- Enchantment glow on left -->
  <path d="M16,10 Q28,6 36,10 L40,78 Q26,84 16,78Z" fill="#4a9eff" opacity="0.08"/>
