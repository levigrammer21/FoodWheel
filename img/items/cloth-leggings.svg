<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left leg -->
  <path d="M22,10 L34,10 L40,72 L24,72Z" fill="#7a8a9a" rx="3"/>
  <!-- Right leg -->
  <path d="M66,10 L78,10 L76,72 L60,72Z" fill="#7a8a9a"/>
