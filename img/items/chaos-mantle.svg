  <path d="M52,30 Q62,24 68,34 Q60,42 52,30Z" fill="#00ffcc" opacity="0.3"/>
  <path d="M28,60 Q36,52 44,62 Q36,70 28,60Z" fill="#ff8800" opacity="0.4"/>
