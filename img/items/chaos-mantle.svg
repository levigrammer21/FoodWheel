  <circle cx="68" cy="44" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="44" cy="66" r="2" fill="#ffff00" opacity="0.5"/>
  <circle cx="60" cy="72" r="1.5" fill="#00ffff" opacity="0.5"/>
  <circle cx="26" cy="56" r="1.5" fill="#ff88ff" opacity="0.5"/>
