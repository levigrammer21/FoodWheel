<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="stormhelmgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a5a7a"/>
      <stop offset="40%" stop-color="#7aaac8"/>
      <stop offset="100%" stop-color="#2a4a6a"/>
    </linearGradient>
  </defs>
  <!-- Storm cloud wisps at sides -->
  <ellipse cx="18" cy="48" rx="10" ry="6" fill="#6a8aa8" opacity="0.3"/>
  <ellipse cx="82" cy="48" rx="10" ry="6" fill="#6a8aa8" opacity="0.3"/>
  <!-- Dome -->
  <path d="M18,66 Q18,26 50,16 Q82,26 82,66Z" fill="url(#stormhelmgrad)"/>
  <!-- Metal sheen -->
  <ellipse cx="36" cy="32" rx="14" ry="10" fill="#aacce0" opacity="0.2"/>
  <!-- Wings on sides -->
  <path d="M18,48 Q8,38 6,28 Q12,34 14,26 Q16,36 20,42Z" fill="#d0d8e0"/>
  <path d="M82,48 Q92,38 94,28 Q88,34 86,26 Q84,36 80,42Z" fill="#d0d8e0"/>
  <path d="M18,48 Q8,40 8,30" stroke="#b0b8c0" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M82,48 Q92,40 92,30" stroke="#b0b8c0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Lightning bolt crest on top -->
  <path d="M50,16 L46,6 L50,10 L48,2 L54,10 L50,7 L54,16Z" fill="#ffee44"/>
  <path d="M50,16 L46,6 L50,10 L48,2 L54,10 L50,7 L54,16Z" fill="#ffee44" opacity="0.4" filter="url(#stormglow)"/>
  <!-- Brow band -->
  <rect x="16" y="60" width="68" height="7" rx="2" fill="#2a4a6a"/>
  <rect x="16" y="60" width="68" height="2" rx="1" fill="#7aaac8" opacity="0.4"/>
  <!-- Nasal -->
  <rect x="47" y="60" width="6" height="18" rx="2" fill="#2a4a6a"/>
</svg>
