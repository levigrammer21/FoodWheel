<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="abyssblade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a2e"/>
      <stop offset="50%" stop-color="#0d3a5a"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <filter id="abyssglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Deep ocean glow -->
  <ellipse cx="40" cy="38" rx="28" ry="30" fill="#0055aa" opacity="0.12" filter="url(#abyssglow)"/>
  <!-- Handle -->
  <rect x="47" y="55" width="7" height="38" rx="3" fill="#0a1a2e"/>
  <line x1="50" y1="57" x2="50" y2="91" stroke="#0d3a5a" stroke-width="1.5" opacity="0.5"/>
  <!-- Chain links on handle -->
  <ellipse cx="50" cy="65" rx="4" ry="2.5" fill="none" stroke="#0055aa" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="50" cy="75" rx="4" ry="2.5" fill="none" stroke="#0055aa" stroke-width="1.5" opacity="0.7"/>
  <!-- Massive cleaver head -->
  <path d="M47,55 L14,20 L68,8 L68,55Z" fill="url(#abyssblade)"/>
  <!-- Cleaver edge bottom -->
  <line x1="14" y1="20" x2="47" y2="55" stroke="#00aaff" stroke-width="1.5" opacity="0.5"/>
  <!-- Cleaver top spine -->
  <line x1="14" y1="20" x2="68" y2="8" stroke="#0d3a5a" stroke-width="2.5"/>
  <!-- Void holes in blade (abyss tears) -->
  <ellipse cx="35" cy="30" rx="4" ry="5" fill="#000000" opacity="0.8"/>
  <ellipse cx="52" cy="22" rx="3" ry="4" fill="#000000" opacity="0.7"/>
  <ellipse cx="42" cy="42" rx="3" ry="3.5" fill="#000000" opacity="0.7"/>
  <!-- Glowing abyss light from holes -->
  <ellipse cx="35" cy="30" rx="2.5" ry="3" fill="#00ffff" opacity="0.2"/>
  <ellipse cx="52" cy="22" rx="2" ry="2.5" fill="#00ffff" opacity="0.2"/>
  <!-- Barnacle/coral texture on spine -->
  <circle cx="22" cy="18" r="1.5" fill="#0d3a5a"/>
  <circle cx="30" cy="15" r="1.2" fill="#0d3a5a"/>
  <circle cx="40" cy="12" r="1.5" fill="#0d3a5a"/>
  <!-- Pommel anchor shape -->
  <path d="M44,90 Q50,88 56,90 L54,95 Q50,93 46,95Z" fill="#0a1a2e"/>
  <line x1="50" y1="90" x2="50" y2="95" stroke="#0055aa" stroke-width="1.5" opacity="0.6"/>
</svg>
