<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="silverblade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0c0d0"/>
      <stop offset="40%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#8090a0"/>
    </linearGradient>
  </defs>
  <!-- Slender elegant blade -->
  <polygon points="50,6 47,56 53,56" fill="url(#silverblade)"/>
  <!-- Blade center mirror line -->
  <line x1="50" y1="8" x2="50" y2="54" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
  <!-- Silver sheen diagonal -->
  <line x1="48" y1="12" x2="52" y2="50" stroke="#c8d8e8" stroke-width="1.5" opacity="0.3"/>
  <!-- Ornate ricasso notch -->
  <rect x="47" y="50" width="6" height="6" rx="1" fill="#d0d8e0"/>
  <!-- Crossguard - thin elegant silver bar -->
  <rect x="34" y="56" width="32" height="5" rx="2" fill="#c0c8d0"/>
  <!-- Guard decorative dots -->
  <circle cx="38" cy="58" r="1.5" fill="#e8f0f8"/>
  <circle cx="50" cy="58" r="1.5" fill="#e8f0f8"/>
  <circle cx="62" cy="58" r="1.5" fill="#e8f0f8"/>
  <!-- Grip - crosshatched silver wire -->
  <rect x="46" y="61" width="8" height="20" rx="2.5" fill="#8090a0"/>
  <line x1="45" y1="64" x2="55" y2="68" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <line x1="45" y1="68" x2="55" y2="72" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <line x1="45" y1="72" x2="55" y2="76" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="64" x2="45" y2="68" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="68" x2="45" y2="72" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="72" x2="45" y2="76" stroke="#c0c8d0" stroke-width="0.8" opacity="0.6"/>
  <!-- Pommel - teardrop silver -->
  <ellipse cx="50" cy="84" rx="5" ry="6" fill="#c0c8d0"/>
  <ellipse cx="48" cy="82" rx="2" ry="2.5" fill="#e8f0f8" opacity="0.5"/>
</svg>
