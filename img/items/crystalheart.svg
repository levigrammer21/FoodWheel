<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
    <g filter="url(#glow)">
      <path d="M32,10 Q20,10 16,22" stroke="#42a5f5" stroke-width="2" fill="none"/>
      <path d="M32,10 Q44,10 48,22" stroke="#42a5f5" stroke-width="2" fill="none"/>
      <path d="M16,22 Q14,30 22,36" stroke="#42a5f5" stroke-width="1.5" fill="none"/>
      <path d="M48,22 Q50,30 42,36" stroke="#42a5f5" stroke-width="1.5" fill="none"/>
      <polygon points="32,26 38,36 36,48 28,48 26,36" fill="#42a5f5" opacity="0.85"/>
          <polygon points="32,26 38,36 32,34" fill="#90caf9" opacity="0.5"/>
          <polygon points="32,26 26,36 32,34" fill="#1565c0" opacity="0.4"/>
    </g>
</svg>