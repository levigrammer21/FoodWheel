<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Recurve bow - tall elegant limbs -->
  <path d="M38,8 Q16,30 22,50 Q16,70 38,92" stroke="#7a5020" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Limb highlight grain -->
  <path d="M38,8 Q18,30 24,50 Q18,70 38,92" stroke="#a07040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Recurve tips curl -->
  <path d="M38,8 Q44,4 42,10" stroke="#7a5020" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M38,92 Q44,96 42,90" stroke="#7a5020" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Carved tip caps -->
  <circle cx="42" cy="8" r="3.5" fill="#5c3a10"/>
  <circle cx="42" cy="92" r="3.5" fill="#5c3a10"/>
  <!-- Bowstring -->
  <line x1="42" y1="8" x2="42" y2="92" stroke="#e8d8b0" stroke-width="1.4"/>
  <!-- Grip wrap center -->
  <rect x="35" y="43" width="8" height="14" rx="3" fill="#4a2a0a"/>
  <line x1="34" y1="46" x2="44" y2="46" stroke="#6a4020" stroke-width="1.5" opacity="0.6"/>
  <line x1="34" y1="50" x2="44" y2="50" stroke="#6a4020" stroke-width="1.5" opacity="0.6"/>
  <line x1="34" y1="54" x2="44" y2="54" stroke="#6a4020" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrow nocked -->
  <line x1="42" y1="50" x2="82" y2="50" stroke="#a07040" stroke-width="2"/>
  <polygon points="42,50 50,46 49,50 50,54" fill="#8a6030"/>
  <!-- Fletching -->
  <polygon points="82,50 72,44 74,50 72,56" fill="#2980b9" opacity="0.8"/>
</svg>
