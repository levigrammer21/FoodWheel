<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="towersh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a5a64"/>
      <stop offset="45%" stop-color="#7a8a94"/>
      <stop offset="100%" stop-color="#3a4a54"/>
    </linearGradient>
  </defs>
  <!-- Massive tall body -->
  <rect x="16" y="8" width="68" height="84" rx="4" fill="url(#towersh)"/>
  <!-- Horizontal bracing strips -->
  <rect x="16" y="28" width="68" height="5" rx="1" fill="#3a4a54" opacity="0.6"/>
  <rect x="16" y="52" width="68" height="5" rx="1" fill="#3a4a54" opacity="0.6"/>
  <rect x="16" y="72" width="68" height="5" rx="1" fill="#3a4a54" opacity="0.6"/>
  <!-- Vertical center spine -->
  <rect x="47" y="8" width="6" height="84" rx="2" fill="#3a4a54" opacity="0.5"/>
  <!-- Rivet lines -->
  <circle cx="20" cy="18" r="2.5" fill="#4a5a64"/>
  <circle cx="80" cy="18" r="2.5" fill="#4a5a64"/>
  <circle cx="20" cy="40" r="2.5" fill="#4a5a64"/>
  <circle cx="80" cy="40" r="2.5" fill="#4a5a64"/>
  <circle cx="20" cy="62" r="2.5" fill="#4a5a64"/>
  <circle cx="80" cy="62" r="2.5" fill="#4a5a64"/>
  <circle cx="20" cy="84" r="2.5" fill="#4a5a64"/>
  <circle cx="80" cy="84" r="2.5" fill="#4a5a64"/>
  <!-- Shield face highlight -->
  <ellipse cx="38" cy="28" rx="14" ry="16" fill="#9ab0bc" opacity="0.15"/>
  <!-- Thick iron rim -->
  <rect x="16" y="8" width="68" height="84" rx="4" fill="none" stroke="#3a4a54" stroke-width="5"/>
  <!-- Boss center -->
  <circle cx="50" cy="50" r="9" fill="#5a6a74"/>
  <circle cx="50" cy="50" r="6" fill="#7a8a94"/>
  <circle cx="48" cy="48" r="2.5" fill="#9ab0bc" opacity="0.4"/>
</svg>
