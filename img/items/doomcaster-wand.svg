<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
      <radialGradient id="tip">
        <stop offset="0%" stop-color="white"/>
        <stop offset="100%" stop-color="#ab47bc"/>
      </radialGradient>
    </defs>
    <g filter="url(#glow)">
      <rect x="30" y="20" width="4" height="38" rx="2" fill="#6a1b9a"/>
      <rect x="30.5" y="20" width="1.5" height="38" rx="1" fill="#ce93d8" opacity="0.4"/>
      <circle cx="32" cy="16" r="7" fill="url(#tip)"/>
      <circle cx="32" cy="16" r="4" fill="#ce93d8" opacity="0.5"/>
      <circle cx="30" cy="14" r="2" fill="white" opacity="0.6"/>
      <line x1="32" y1="9" x2="32" y2="8" stroke="#ce93d8" stroke-width="1.5" opacity="0.7"/>
      <line x1="39" y1="16" x2="40" y2="16" stroke="#ce93d8" stroke-width="1.5" opacity="0.7"/>
    </g>
</svg>