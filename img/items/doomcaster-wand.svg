<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="doomglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#880000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#330000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Wand shaft - twisted bone -->
  <path d="M50,30 Q56,45 50,60 Q56,72 52,88" stroke="#d4c4a0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M50,30 Q54,45 50,60 Q54,72 52,88" stroke="#f0e8d0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Bone knuckle rings on shaft -->
  <ellipse cx="52" cy="42" rx="5" ry="3" fill="#c8b890"/>
  <ellipse cx="50" cy="60" rx="5" ry="3" fill="#c8b890"/>
  <ellipse cx="51" cy="75" rx="4.5" ry="2.5" fill="#c8b890"/>
  <!-- Skull tip -->
  <ellipse cx="50" cy="20" rx="12" ry="11" fill="#d4c4a0"/>
  <!-- Skull crack -->
  <path d="M46,14 L50,20 L54,14" stroke="#2a1a0a" stroke-width="1.2" fill="none"/>
  <!-- Eye sockets -->
  <ellipse cx="45" cy="20" rx="3" ry="3.5" fill="#1a0a00"/>
  <ellipse cx="55" cy="20" rx="3" ry="3.5" fill="#1a0a00"/>
  <!-- Glowing eyes -->
  <ellipse cx="45" cy="20" rx="2" ry="2.5" fill="#ff4400" opacity="0.7"/>
  <ellipse cx="55" cy="20" rx="2" ry="2.5" fill="#ff4400" opacity="0.7"/>
  <!-- Nasal cavity -->
  <path d="M48,24 L50,27 L52,24" stroke="#2a1a0a" stroke-width="1" fill="none"/>
  <!-- Skull glow -->
  <ellipse cx="50" cy="20" rx="14" ry="13" fill="url(#doomglow)" opacity="0.6"/>
  <!-- Dark magic leaking from crack -->
  <path d="M48,12 Q44,8 46,4" stroke="#ff4400" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M50,11 Q50,6 50,2" stroke="#ff2200" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M52,12 Q56,8 54,4" stroke="#ff4400" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Base cap -->
  <ellipse cx="52" cy="88" rx="4" ry="3" fill="#c8b890"/>
</svg>
