<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
      <radialGradient id="orb" cx="50%" cy="40%">
        <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
        <stop offset="60%" stop-color="#ab47bc"/>
        <stop offset="100%" stop-color="#6a1b9a"/>
      </radialGradient>
    </defs>
    <g filter="url(#glow)">
      <rect x="30" y="18" width="4" height="46" rx="2" fill="#6a1b9a"/>
      <rect x="30" y="18" width="2" height="46" rx="1" fill="#ce93d8" opacity="0.3"/>
      <circle cx="32" cy="14" r="10" fill="url(#orb)"/>
      <circle cx="32" cy="14" r="10" stroke="#ab47bc" stroke-width="1.5" fill="none" opacity="0.6"/>
      <circle cx="29" cy="11" r="3" fill="white" opacity="0.4"/>
    </g>
</svg>