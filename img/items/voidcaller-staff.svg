<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="voidrift" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#cc44ff"/>
      <stop offset="70%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#0a0015" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="voidglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Outer void aura -->
  <ellipse cx="50" cy="20" rx="24" ry="24" fill="#4400aa" opacity="0.15" filter="url(#voidglow)"/>
  <!-- Staff - dark crystalline -->
  <rect x="47" y="30" width="6" height="65" rx="2.5" fill="#1a0030"/>
  <!-- Crystal facets on staff -->
  <line x1="47" y1="35" x2="53" y2="40" stroke="#6600cc" stroke-width="0.8" opacity="0.5"/>
  <line x1="53" y1="50" x2="47" y2="55" stroke="#6600cc" stroke-width="0.8" opacity="0.5"/>
  <line x1="47" y1="65" x2="53" y2="70" stroke="#6600cc" stroke-width="0.8" opacity="0.5"/>
  <!-- Void rift - tear in reality -->
  <ellipse cx="50" cy="18" rx="16" ry="18" fill="url(#voidrift)"/>
  <!-- Rift cracks extending out -->
  <path d="M34,12 Q28,8 30,4" stroke="#cc44ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M66,12 Q72,8 70,4" stroke="#cc44ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M36,28 Q28,32 26,28" stroke="#cc44ff" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M64,28 Q72,32 74,28" stroke="#cc44ff" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Stars/particles sucked into void -->
  <circle cx="30" cy="14" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="70" cy="10" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="38" cy="6" r="0.8" fill="#cc88ff" opacity="0.6"/>
  <circle cx="62" cy="24" r="1" fill="#cc88ff" opacity="0.5"/>
  <!-- Staff base cap -->
  <ellipse cx="50" cy="92" rx="5" ry="3" fill="#1a0030"/>
  <ellipse cx="50" cy="91" rx="3" ry="1.5" fill="#6600cc" opacity="0.4"/>
</svg>
