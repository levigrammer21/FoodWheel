<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="fallenamu" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#3a1a3a"/>
      <stop offset="100%" stop-color="#0a000a"/>
    </radialGradient>
    <filter id="fallenglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Soul energy leaking upward -->
  <path d="M44,28 Q38,20 40,12" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M50,24 Q50,16 50,10" stroke="#7700cc" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M56,28 Q62,20 60,12" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- Dark chain - broken link visible -->
  <path d="M30,22 Q50,14 70,22" stroke="#2a1a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Broken chain link -->
  <circle cx="30" cy="22" r="3" fill="none" stroke="#4a2a4a" stroke-width="1.5"/>
  <circle cx="70" cy="22" r="3" fill="none" stroke="#4a2a4a" stroke-width="1.5"/>
  <line x1="28" y1="21" x2="30" y2="24" stroke="#4a2a4a" stroke-width="1.5"/>
  <!-- Pendant bail -->
  <rect x="47" y="20" width="6" height="8" rx="2" fill="#1a0a1a"/>
  <!-- Skull pendant - obsidian -->
  <ellipse cx="50" cy="50" rx="18" ry="16" fill="url(#fallenamu)"/>
  <!-- Skull glow aura -->
  <ellipse cx="50" cy="50" rx="20" ry="18" fill="#6600aa" opacity="0.12" filter="url(#fallenglow)"/>
  <!-- Crack through skull -->
  <path d="M46,36 L50,46 L54,36" stroke="#9933ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Eye sockets -->
  <ellipse cx="43" cy="50" rx="5" ry="5.5" fill="#0a000a"/>
  <ellipse cx="57" cy="50" rx="5" ry="5.5" fill="#0a000a"/>
  <!-- Glowing eyes -->
  <ellipse cx="43" cy="50" rx="3" ry="3.5" fill="#9933ff" opacity="0.8"/>
  <ellipse cx="57" cy="50" rx="3" ry="3.5" fill="#9933ff" opacity="0.8"/>
  <ellipse cx="43" cy="50" rx="1.5" ry="2" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="57" cy="50" rx="1.5" ry="2" fill="#ffffff" opacity="0.4"/>
  <!-- Nasal -->
  <path d="M48,56 L50,59 L52,56" stroke="#2a0a2a" stroke-width="1" fill="none"/>
  <!-- Teeth -->
  <rect x="43" y="62" width="3" height="4" rx="0.5" fill="#1a0a1a"/>
  <rect x="47" y="62" width="3" height="5" rx="0.5" fill="#1a0a1a"/>
  <rect x="51" y="62" width="3" height="5" rx="0.5" fill="#1a0a1a"/>
  <rect x="55" y="62" width="3" height="4" rx="0.5" fill="#1a0a1a"/>
  <!-- Dark energy drip from bottom -->
  <path d="M46,66 Q48,72 47,78" stroke="#9933ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M54,66 Q52,72 53,78" stroke="#6600aa" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="47" cy="79" r="2" fill="#9933ff" opacity="0.4"/>
  <circle cx="53" cy="79" r="2" fill="#9933ff" opacity="0.4"/>
</svg>
