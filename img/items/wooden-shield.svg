<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield body - round -->
  <circle cx="50" cy="50" r="38" fill="#8b5e2c"/>
  <!-- Wood grain lines -->
  <line x1="16" y1="38" x2="84" y2="38" stroke="#6b3a10" stroke-width="1.2" opacity="0.4"/>
  <line x1="12" y1="50" x2="88" y2="50" stroke="#6b3a10" stroke-width="1.2" opacity="0.4"/>
  <line x1="16" y1="62" x2="84" y2="62" stroke="#6b3a10" stroke-width="1.2" opacity="0.4"/>
  <!-- Plank splits -->
  <line x1="34" y1="14" x2="32" y2="86" stroke="#5c3311" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="12" x2="50" y2="88" stroke="#5c3311" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="14" x2="68" y2="86" stroke="#5c3311" stroke-width="1.5" opacity="0.5"/>
  <!-- Iron rim -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#6a7a84" stroke-width="4"/>
  <!-- Iron boss center -->
  <circle cx="50" cy="50" r="10" fill="#6a7a84"/>
  <circle cx="50" cy="50" r="7" fill="#8a9ba8"/>
  <circle cx="47" cy="47" r="3" fill="#aabbc8" opacity="0.4"/>
  <!-- Rivets on rim -->
  <circle cx="50" cy="14" r="3" fill="#5a6a74"/>
  <circle cx="50" cy="86" r="3" fill="#5a6a74"/>
  <circle cx="14" cy="50" r="3" fill="#5a6a74"/>
  <circle cx="86" cy="50" r="3" fill="#5a6a74"/>
</svg>
