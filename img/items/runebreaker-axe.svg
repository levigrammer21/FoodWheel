<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="runeblade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a7a84"/>
      <stop offset="100%" stop-color="#4a5a64"/>
    </linearGradient>
  </defs>
  <!-- Handle -->
  <rect x="46" y="10" width="8" height="82" rx="3" fill="#3d2510"/>
  <line x1="50" y1="12" x2="50" y2="90" stroke="#5c3a1a" stroke-width="1.5" opacity="0.4"/>
  <!-- Iron bands on handle -->
  <rect x="44" y="30" width="12" height="4" rx="1" fill="#6a7a84"/>
  <rect x="44" y="60" width="12" height="4" rx="1" fill="#6a7a84"/>
  <!-- Large single-bit axe head -->
  <path d="M46,18 Q16,28 14,50 Q16,72 46,78 L46,18Z" fill="url(#runeblade)"/>
  <!-- Axe edge - sweeping curve -->
  <path d="M14,50 Q16,28 46,18" stroke="#aabbc8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M14,50 Q16,72 46,78" stroke="#aabbc8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Rune symbols etched glowing blue -->
  <text x="24" y="40" font-size="8" fill="#4a9eff" opacity="0.8" font-family="serif">ᚱ</text>
  <text x="22" y="54" font-size="8" fill="#4a9eff" opacity="0.8" font-family="serif">ᚢ</text>
  <text x="24" y="66" font-size="8" fill="#4a9eff" opacity="0.7" font-family="serif">ᚾ</text>
  <!-- Rune glow -->
  <ellipse cx="28" cy="50" rx="14" ry="20" fill="#4a9eff" opacity="0.08"/>
  <!-- Axe eye (hole for handle) collar -->
  <ellipse cx="46" cy="48" rx="5" ry="8" fill="#5a6a74" opacity="0.5"/>
</svg>
