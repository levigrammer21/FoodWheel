<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="immovgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="40%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="immovglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Ground crack (it doesn't move - the ground cracks instead) -->
  <path d="M26,92 L50,84 L74,92" stroke="#4a3a20" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M38,92 L50,88 L62,92" stroke="#3a2a10" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M44,92 Q50,96 56,92" stroke="#2a1a08" stroke-width="2.5" fill="none" opacity="0.4"/>
  <!-- The spike planted in ground -->
  <polygon points="46,84 54,84 52,96 48,96" fill="#1a1a1a"/>
  <!-- Massive shield body - takes up whole frame -->
  <rect x="6" y="8" width="88" height="76" rx="5" fill="url(#immovgrad)"/>
  <!-- Steel plate texture lines -->
  <rect x="6" y="28" width="88" height="4" rx="0" fill="#1a1a1a" opacity="0.6"/>
  <rect x="6" y="52" width="88" height="4" rx="0" fill="#1a1a1a" opacity="0.6"/>
  <!-- Vertical divide -->
  <rect x="48" y="8" width="4" height="76" rx="0" fill="#1a1a1a" opacity="0.5"/>
  <!-- Massive boss - diamond shape -->
  <polygon points="50,22 64,44 50,66 36,44" fill="#2a2a2a"/>
  <polygon points="50,26 60,44 50,62 40,44" fill="#3a3a3a"/>
  <polygon points="50,32 56,44 50,56 44,44" fill="#ffffff" opacity="0.1"/>
  <!-- Iron rim - thick -->
  <rect x="6" y="8" width="88" height="76" rx="5" fill="none" stroke="#3a3a3a" stroke-width="6"/>
  <!-- Rim rivets -->
  <circle cx="14" cy="16" r="3" fill="#2a2a2a"/>
  <circle cx="86" cy="16" r="3" fill="#2a2a2a"/>
  <circle cx="14" cy="76" r="3" fill="#2a2a2a"/>
  <circle cx="86" cy="76" r="3" fill="#2a2a2a"/>
  <circle cx="14" cy="44" r="3" fill="#2a2a2a"/>
  <circle cx="86" cy="44" r="3" fill="#2a2a2a"/>
  <circle cx="50" cy="10" r="3" fill="#2a2a2a"/>
  <circle cx="50" cy="82" r="3" fill="#2a2a2a"/>
  <!-- Scratches and battle damage showing it's been hit many times but never moved -->
  <line x1="20" y1="18" x2="38" y2="36" stroke="#3a3a3a" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="22" x2="82" y2="50" stroke="#3a3a3a" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="56" x2="34" y2="70" stroke="#3a3a3a" stroke-width="1.5" opacity="0.4"/>
</svg>
