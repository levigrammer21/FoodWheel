<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
      <linearGradient id="sh" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#90caf9"/>
        <stop offset="100%" stop-color="#1565c0"/>
      </linearGradient>
    </defs>
    <g filter="url(#glow)">
      <path d="M12,16 L52,16 L52,40 Q52,56 32,60 Q12,56 12,40 Z" fill="url(#sh)"/>
      <path d="M12,16 L52,16 L52,40 Q52,56 32,60 Q12,56 12,40 Z" fill="none" stroke="#1565c0" stroke-width="2"/>
      <path d="M14,18 L50,18 L50,40 Q50,54 32,58" stroke="#90caf9" stroke-width="0.8" fill="none" opacity="0.4"/>
      <circle cx="32" cy="34" r="7" fill="#1565c0"/><circle cx="32" cy="34" r="4" fill="#42a5f5" opacity="0.6"/>
      <line x1="32" y1="16" x2="32" y2="60" stroke="#1565c0" stroke-width="1.5" opacity="0.3"/>
      <line x1="12" y1="32" x2="52" y2="32" stroke="#1565c0" stroke-width="1" opacity="0.2"/>
    </g>
</svg>