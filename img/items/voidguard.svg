<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="voidwindow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="30%" stop-color="#1a0030"/>
      <stop offset="70%" stop-color="#4400aa"/>
      <stop offset="100%" stop-color="#6600cc" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <!-- Shield body - angular hexagonal -->
  <polygon points="50,8 82,26 82,74 50,92 18,74 18,26" fill="#1a0a2e"/>
  <!-- Frame panels -->
  <polygon points="50,8 82,26 82,74 50,92 18,74 18,26" fill="none" stroke="#6600cc" stroke-width="3"/>
  <!-- Inner frame -->
  <polygon points="50,18 74,32 74,68 50,82 26,68 26,32" fill="none" stroke="#4400aa" stroke-width="1.5" opacity="0.6"/>
  <!-- Void window center -->
  <circle cx="50" cy="50" r="22" fill="url(#voidwindow)"/>
  <!-- Stars sucked into void -->
  <circle cx="44" cy="44" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="58" cy="40" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="40" cy="56" r="0.8" fill="#cc88ff" opacity="0.7"/>
  <circle cx="60" cy="58" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- Void rim glow -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#8800ff" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#cc88ff" stroke-width="1" opacity="0.3"/>
  <!-- Corner reinforcements -->
  <circle cx="50" cy="8" r="3" fill="#4400aa"/>
  <circle cx="82" cy="26" r="3" fill="#4400aa"/>
  <circle cx="82" cy="74" r="3" fill="#4400aa"/>
  <circle cx="50" cy="92" r="3" fill="#4400aa"/>
  <circle cx="18" cy="74" r="3" fill="#4400aa"/>
  <circle cx="18" cy="26" r="3" fill="#4400aa"/>
</svg>
