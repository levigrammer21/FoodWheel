<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ffd54f" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd54f"/>
            <stop offset="100%" stop-color="#f57f17"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <path d="M20,14 C20,14 14,18 12,32 L14,58 L50,58 L52,32 C50,18 44,14 44,14 Z" fill="url(#robe)"/>
          <ellipse cx="32" cy="14" rx="12" ry="7" fill="#ffd54f"/>
          <path d="M22,16 L20,14 L14,20" stroke="#f57f17" stroke-width="2" fill="none"/>
          <path d="M42,16 L44,14 L50,20" stroke="#f57f17" stroke-width="2" fill="none"/>
          <line x1="32" y1="18" x2="32" y2="54" stroke="#f57f17" stroke-width="1.5" opacity="0.5"/>
          <circle cx='32' cy='28' r='4' fill='#ffffff' opacity='0.7'/>
          <path d="M20,34 Q32,38 44,34" stroke="#fff9c4" stroke-width="0.8" fill="none" opacity="0.4"/>
        </g>
</svg>