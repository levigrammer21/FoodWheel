<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blade - angled hunting style -->
  <polygon points="50,12 44,62 56,58" fill="#b0b8b0"/>
  <!-- Blade fuller (groove) -->
  <line x1="50" y1="16" x2="48" y2="56" stroke="#d0d8d0" stroke-width="1.2" opacity="0.6"/>
  <!-- Sharp edge -->
  <line x1="50" y1="12" x2="56" y2="58" stroke="#e8e8e8" stroke-width="0.7" opacity="0.7"/>
  <!-- Bolster -->
  <rect x="42" y="60" width="16" height="5" rx="1.5" fill="#888"/>
  <rect x="42" y="60" width="16" height="2" rx="1" fill="#bbb" opacity="0.4"/>
  <!-- Leather wrapped handle -->
  <rect x="44" y="65" width="12" height="22" rx="3" fill="#6b3a1a"/>
  <!-- Wrap segments -->
  <rect x="44" y="67" width="12" height="3" rx="1" fill="#4a2510" opacity="0.5"/>
  <rect x="44" y="72" width="12" height="3" rx="1" fill="#4a2510" opacity="0.5"/>
  <rect x="44" y="77" width="12" height="3" rx="1" fill="#4a2510" opacity="0.5"/>
  <rect x="44" y="82" width="12" height="3" rx="1" fill="#4a2510" opacity="0.5"/>
  <!-- Pommel cap -->
  <rect x="43" y="87" width="14" height="5" rx="2.5" fill="#888"/>
</svg>
