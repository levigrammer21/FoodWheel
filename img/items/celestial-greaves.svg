<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
      <linearGradient id="leg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ce93d8"/>
        <stop offset="100%" stop-color="#6a1b9a"/>
      </linearGradient>
    </defs>
    <g filter="url(#glow)">
      <rect x="18" y="8" width="12" height="28" rx="4" fill="url(#leg)"/>
      <rect x="34" y="8" width="12" height="28" rx="4" fill="url(#leg)"/>
      <rect x="17" y="34" width="14" height="8" rx="3" fill="#6a1b9a"/>
      <rect x="33" y="34" width="14" height="8" rx="3" fill="#6a1b9a"/>
      <rect x="18" y="40" width="12" height="16" rx="3" fill="#ab47bc"/>
      <rect x="34" y="40" width="12" height="16" rx="3" fill="#ab47bc"/>
      <rect x="18" y="8" width="12" height="4" rx="2" fill="#ce93d8" opacity="0.5"/>
      <rect x="34" y="8" width="12" height="4" rx="2" fill="#ce93d8" opacity="0.5"/>
      <line x1='24' y1='12' x2='24' y2='40' stroke='#ce93d8' stroke-width='0.8' opacity='0.4'/><line x1='40' y1='12' x2='40' y2='40' stroke='#ce93d8' stroke-width='0.8' opacity='0.4'/>
    </g>
</svg>