<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow trails behind boots -->
  <path d="M6,78 Q12,72 20,76" stroke="#1a0030" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M80,78 Q86,72 94,78" stroke="#1a0030" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M4,84 Q10,80 18,84" stroke="#1a0030" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Left shadow boot -->
  <path d="M14,22 L14,68 Q14,74 20,76 L40,76 Q48,72 50,66 L36,64 Q26,62 24,56 L22,22Z" fill="#0d0d1e"/>
  <!-- Void where sole should be - no shadow cast -->
  <path d="M12,74 Q12,80 22,82 L40,82 Q50,78 50,74 L36,76 Q22,76 12,74Z" fill="#1a1a2e" opacity="0.6"/>
  <!-- Darkness wisps left -->
  <path d="M14,36 Q6,30 8,24" stroke="#6633cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M14,52 Q4,48 6,40" stroke="#4422aa" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M20,72 Q12,70 10,62" stroke="#4422aa" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Right shadow boot -->
  <path d="M50,66 Q52,72 58,76 L80,76 Q86,74 86,68 L86,22 L78,22 L76,56 Q74,62 64,64 Q56,64 50,66Z" fill="#0d0d1e"/>
  <!-- Right sole -->
  <path d="M50,74 Q50,80 58,82 L80,82 Q88,78 88,74 L84,76 Q64,76 50,74Z" fill="#1a1a2e" opacity="0.6"/>
  <!-- Darkness wisps right -->
  <path d="M86,36 Q94,30 92,24" stroke="#6633cc" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M86,52 Q96,48 94,40" stroke="#4422aa" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Glowing purple eye on each boot ankle -->
  <ellipse cx="18" cy="26" rx="5" ry="3" fill="#6633cc" opacity="0.7"/>
  <ellipse cx="18" cy="26" rx="3" ry="2" fill="#cc88ff" opacity="0.5"/>
  <ellipse cx="82" cy="26" rx="5" ry="3" fill="#6633cc" opacity="0.7"/>
  <ellipse cx="82" cy="26" rx="3" ry="2" fill="#cc88ff" opacity="0.5"/>
  <!-- Boot rims -->
  <path d="M14,22 L14,68 Q14,74 20,76 L40,76 Q48,72 50,66 L36,64 Q26,62 24,56 L22,22Z" fill="none" stroke="#4422aa" stroke-width="1.2" opacity="0.5"/>
  <path d="M50,66 Q52,72 58,76 L80,76 Q86,74 86,68 L86,22 L78,22 L76,56 Q74,62 64,64 Q56,64 50,66Z" fill="none" stroke="#4422aa" stroke-width="1.2" opacity="0.5"/>
</svg>
