  <path d="M14,14 L50,14 L50,42 L14,42Z" fill="#3a4a8a"/>
  <path d="M32,22 Q32,18 36,20 Q32,22 34,26 Q32,24 28,26 Q30,22 26,20 Q30,18 32,22Z" fill="#ffd700" opacity="0.7"/>
  <!-- Top-right quarter - red -->
