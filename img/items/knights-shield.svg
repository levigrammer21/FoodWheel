  <circle cx="68" cy="28" r="6" fill="#ffd700" opacity="0.6"/>
  <!-- Bottom-left quarter - red -->
  <path d="M14,42 L50,42 L50,74 Q32,88 14,74Z" fill="#8a2a2a"/>
  <!-- Bottom-right quarter - blue -->
