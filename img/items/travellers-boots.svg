<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left boot - tall travel boot -->
  <path d="M14,10 L14,66 Q14,74 22,76 L40,76 Q44,74 44,64 L38,62 L26,62 Q22,62 22,56 L22,10Z" fill="#7a6040"/>
  <!-- Road dust scuff at toe -->
  <ellipse cx="38" cy="66" rx="6" ry="3" fill="#5a4030" opacity="0.5"/>
  <!-- Left sole -->
  <path d="M12,74 Q12,82 22,84 L40,84 Q48,80 48,74 L40,76 Q22,76 12,74Z" fill="#3a2010"/>
  <rect x="12" y="66" width="8" height="18" rx="2" fill="#2a1008"/>
  <!-- Lace up left -->
  <line x1="20" y1="18" x2="14" y2="18" stroke="#5a4030" stroke-width="1"/>
  <line x1="20" y1="26" x2="14" y2="26" stroke="#5a4030" stroke-width="1"/>
  <line x1="20" y1="34" x2="14" y2="34" stroke="#5a4030" stroke-width="1"/>
  <line x1="20" y1="42" x2="14" y2="42" stroke="#5a4030" stroke-width="1"/>
  <!-- Worn patch left knee area -->
  <ellipse cx="18" cy="50" rx="5" ry="6" fill="#6a5030" opacity="0.4"/>
  <!-- Right boot -->
  <path d="M56,10 L56,56 Q56,62 62,62 L74,62 L68,66 Q68,74 72,76 L86,76 Q88,74 86,64 L86,10Z" fill="#7a6040"/>
  <!-- Right sole -->
  <path d="M52,74 Q52,80 60,84 L84,84 Q90,80 88,74 L86,76 Q72,76 52,74Z" fill="#3a2010"/>
  <rect x="78" y="66" width="8" height="18" rx="2" fill="#2a1008"/>
  <!-- Lace right -->
  <line x1="80" y1="18" x2="86" y2="18" stroke="#5a4030" stroke-width="1"/>
  <line x1="80" y1="26" x2="86" y2="26" stroke="#5a4030" stroke-width="1"/>
  <line x1="80" y1="34" x2="86" y2="34" stroke="#5a4030" stroke-width="1"/>
  <line x1="80" y1="42" x2="86" y2="42" stroke="#5a4030" stroke-width="1"/>
  <!-- Map/compass tool tucked in left boot top -->
  <rect x="14" y="10" width="6" height="8" rx="1" fill="#c8a860" opacity="0.6"/>
</svg>
