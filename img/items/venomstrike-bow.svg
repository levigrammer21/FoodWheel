<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="venombow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a27"/>
      <stop offset="50%" stop-color="#1a3a18"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </linearGradient>
  </defs>
  <!-- Bow limbs - dark wood -->
  <path d="M36,10 Q14,34 18,50 Q14,66 36,90" stroke="url(#venombow)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Venom glow along limb -->
  <path d="M36,10 Q16,34 20,50 Q16,66 36,90" stroke="#55ee55" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Venom drips from tips -->
  <circle cx="36" cy="10" r="4" fill="#2d5a27"/>
  <ellipse cx="36" cy="7" rx="2" ry="3" fill="#22cc22" opacity="0.7"/>
  <circle cx="36" cy="4" r="1.5" fill="#44ff44" opacity="0.5"/>
  <circle cx="36" cy="90" r="4" fill="#2d5a27"/>
  <ellipse cx="36" cy="93" rx="2" ry="3" fill="#22cc22" opacity="0.7"/>
  <!-- Bowstring - glowing green -->
  <line x1="36" y1="10" x2="36" y2="90" stroke="#88ff88" stroke-width="1.3" opacity="0.8"/>
  <!-- Grip -->
  <rect x="32" y="43" width="8" height="14" rx="3" fill="#1a3a18"/>
  <!-- Poisoned arrow -->
  <line x1="36" y1="50" x2="80" y2="50" stroke="#5a8a30" stroke-width="2"/>
  <!-- Dripping venom on shaft -->
  <ellipse cx="55" cy="51" rx="1" ry="2" fill="#44ff44" opacity="0.5"/>
  <ellipse cx="65" cy="52" rx="1" ry="2" fill="#44ff44" opacity="0.4"/>
  <!-- Arrowhead - barbed venomous -->
  <polygon points="36,50 44,44 42,50 44,56" fill="#55ee55"/>
  <polygon points="44,44 40,48 42,50" fill="#88ff88" opacity="0.5"/>
  <!-- Fletching -->
  <polygon points="80,50 70,45 72,50 70,55" fill="#2d5a27"/>
</svg>
