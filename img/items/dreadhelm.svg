<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dreadgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="dreadglow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Horns - curved demonic -->
  <path d="M28,30 Q18,16 20,4 Q24,12 22,4 Q28,14 26,6 Q32,16 30,8 Q36,20 30,28" stroke="#1a0a0a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M72,30 Q82,16 80,4 Q76,12 78,4 Q72,14 74,6 Q68,16 70,8 Q64,20 70,28" stroke="#1a0a0a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Horn highlights -->
  <path d="M28,30 Q18,16 20,4" stroke="#3a2a2a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M72,30 Q82,16 80,4" stroke="#3a2a2a" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Full face helmet body -->
  <path d="M14,72 Q14,24 50,14 Q86,24 86,72Z" fill="url(#dreadgrad)"/>
  <!-- Face mask - angled fearsome -->
  <path d="M22,46 Q22,36 50,32 Q78,36 78,46 L76,72 Q50,78 24,72Z" fill="#0a0a0a"/>
  <!-- Burning eye slits - angled menacing -->
  <path d="M28,48 Q36,44 44,46 Q36,50 28,48Z" fill="#ff3300" opacity="0.9"/>
  <path d="M56,46 Q64,44 72,48 Q64,50 56,46Z" fill="#ff3300" opacity="0.9"/>
  <!-- Eye glow -->
  <path d="M28,48 Q36,44 44,46 Q36,50 28,48Z" fill="#ff6600" opacity="0.5" filter="url(#dreadglow)"/>
  <path d="M56,46 Q64,44 72,48 Q64,50 56,46Z" fill="#ff6600" opacity="0.5" filter="url(#dreadglow)"/>
  <!-- Teeth grille at mouth -->
  <rect x="38" y="60" width="3" height="8" rx="1" fill="#ff2200" opacity="0.3"/>
  <rect x="43" y="60" width="3" height="9" rx="1" fill="#ff2200" opacity="0.3"/>
  <rect x="48" y="60" width="3" height="9" rx="1" fill="#ff2200" opacity="0.3"/>
  <rect x="53" y="60" width="3" height="9" rx="1" fill="#ff2200" opacity="0.3"/>
  <rect x="58" y="60" width="3" height="8" rx="1" fill="#ff2200" opacity="0.3"/>
  <!-- Neck guard -->
  <rect x="16" y="70" width="68" height="8" rx="3" fill="#0a0a0a"/>
</svg>
