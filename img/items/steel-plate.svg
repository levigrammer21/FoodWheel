<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#66bb6a" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a5d6a7"/>
            <stop offset="100%" stop-color="#388e3c"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <path d="M18,14 C18,14 10,20 10,36 L12,58 L52,58 L54,36 C54,20 46,14 46,14 Z" fill="url(#plate)"/>
          <ellipse cx="32" cy="14" rx="14" ry="8" fill="#a5d6a7" opacity="0.8"/>
          <path d="M10,36 L54,36" stroke="#388e3c" stroke-width="1.5" opacity="0.4"/>
          <path d="M12,46 L52,46" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
          <path d="M22,16 L18,22 L14,20" stroke="#388e3c" stroke-width="2.5" fill="none"/>
          <path d="M42,16 L46,22 L50,20" stroke="#388e3c" stroke-width="2.5" fill="none"/>
          
          <path d="M20,22 Q32,18 44,22" stroke="#a5d6a7" stroke-width="1" fill="none" opacity="0.5"/>
        </g>
</svg>