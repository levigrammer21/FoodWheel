<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="abyssalheart" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#006688"/>
      <stop offset="100%" stop-color="#001a2e"/>
    </radialGradient>
    <filter id="ahglow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Glow behind heart -->
  <path d="M50,72 Q28,58 28,42 Q28,28 38,26 Q44,24 50,30 Q56,24 62,26 Q72,28 72,42 Q72,58 50,72Z" fill="#00ffcc" opacity="0.2" filter="url(#ahglow)"/>
  <!-- Chain -->
