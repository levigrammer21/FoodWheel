<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
    <g filter="url(#glow)">
      <path d="M32,10 Q20,10 16,22" stroke="#ab47bc" stroke-width="2" fill="none"/>
      <path d="M32,10 Q44,10 48,22" stroke="#ab47bc" stroke-width="2" fill="none"/>
      <path d="M16,22 Q14,30 22,36" stroke="#ab47bc" stroke-width="1.5" fill="none"/>
      <path d="M48,22 Q50,30 42,36" stroke="#ab47bc" stroke-width="1.5" fill="none"/>
      <circle cx="32" cy="38" r="10" fill="#ab47bc"/>
          <circle cx="32" cy="38" r="10" stroke="#6a1b9a" stroke-width="1.5" fill="none"/>
          <circle cx="29" cy="35" r="4" fill="#ce93d8" opacity="0.4"/>
    </g>
</svg>