<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="eternalblade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ffee88"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="80%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="flamehot"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Heat distortion glow -->
  <polygon points="50,5 43,58 57,58" fill="#ff6600" opacity="0.3" filter="url(#flamehot)"/>
  <!-- Blade - sculpted from solidified flame, wavy -->
  <path d="M50,5 Q54,15 52,25 Q56,35 50,45 Q54,52 52,58 L48,58 Q46,52 50,45 Q44,35 48,25 Q46,15 50,5Z" fill="url(#eternalblade)"/>
  <!-- Flame wisps constantly burning off top -->
  <path d="M50,5 Q44,0 46,5" fill="#ffff88" opacity="0.8"/>
  <path d="M50,5 Q56,0 54,6" fill="#ffffff" opacity="0.7"/>
  <path d="M48,10 Q42,4 44,9" fill="#ffee44" opacity="0.6"/>
  <path d="M52,8 Q58,2 56,8" fill="#ffee44" opacity="0.6"/>
  <path d="M46,16 Q38,10 40,16" fill="#ffcc00" opacity="0.5"/>
  <path d="M54,14 Q62,8 60,14" fill="#ffcc00" opacity="0.5"/>
  <!-- Bright core line -->
  <line x1="50" y1="5" x2="50" y2="56" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Guard - black iron, glowing hot at contact point -->
  <rect x="34" y="57" width="32" height="6" rx="2.5" fill="#1a0a00"/>
  <rect x="34" y="57" width="32" height="2" rx="1" fill="#ff6600" opacity="0.5"/>
  <!-- Guard end glow -->
  <circle cx="34" cy="60" r="3" fill="#ff4400" opacity="0.4"/>
  <circle cx="66" cy="60" r="3" fill="#ff4400" opacity="0.4"/>
  <!-- Grip - heat-resistant black wrap -->
  <rect x="46" y="63" width="8" height="20" rx="3" fill="#0a0500"/>
  <line x1="45" y1="67" x2="55" y2="67" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="72" x2="55" y2="72" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="77" x2="55" y2="77" stroke="#ff4400" stroke-width="1" opacity="0.4"/>
  <!-- Pommel - eternal ember -->
  <circle cx="50" cy="86" r="8" fill="#1a0a00"/>
  <circle cx="50" cy="86" r="5" fill="#ff6600" opacity="0.7"/>
  <circle cx="50" cy="86" r="3" fill="#ffcc00" opacity="0.8"/>
  <circle cx="50" cy="86" r="1.5" fill="#ffffff" opacity="0.7"/>
</svg>
