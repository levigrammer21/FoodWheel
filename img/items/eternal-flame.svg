<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ffd54f" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff176"/>
            <stop offset="40%" stop-color="#ff7043"/>
            <stop offset="100%" stop-color="#b71c1c"/>
          </linearGradient>
          <linearGradient id="guard" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#5d4037"/>
            <stop offset="100%" stop-color="#8d6e63"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <polygon points="32,6 29,46 32,50 35,46" fill="url(#blade)"/>
          <ellipse cx="32" cy="47" rx="5" ry="2.5" fill="#4e342e"/>
          <rect x="18" y="45" width="28" height="5" rx="2" fill="url(#guard)"/>
          <rect x="30" y="50" width="4" height="10" rx="2" fill="#3e2723"/>
          <ellipse cx="32" cy="60" rx="3" ry="2" fill="#6d4c41"/>
          <polygon points="32,8 30,18 32,14 34,18" fill="#fff9c4" opacity="0.7"/>
          <ellipse cx="32" cy="20" rx="3" ry="5" fill="#ff5722" opacity="0.4"/>
        </g>
</svg>