  <circle cx="50" cy="76" r="10" fill="none" stroke="#4a9eff" stroke-width="0.8" opacity="0.4"/>
  <!-- Runes around outer circle -->
  <text x="47" y="62" font-size="7" fill="#4a9eff" opacity="0.9" font-family="serif">ᚠ</text>
  <text x="60" y="67" font-size="7" fill="#4a9eff" opacity="0.85" font-family="serif">ᚢ</text>
  <text x="64" y="80" font-size="7" fill="#4a9eff" opacity="0.8" font-family="serif">ᚦ</text>
  <text x="57" y="92" font-size="7" fill="#4a9eff" opacity="0.8" font-family="serif">ᚱ</text>
  <text x="42" y="94" font-size="7" fill="#4a9eff" opacity="0.8" font-family="serif">ᚲ</text>
  <text x="32" y="87" font-size="7" fill="#4a9eff" opacity="0.8" font-family="serif">ᚷ</text>
  <text x="30" y="74" font-size="7" fill="#4a9eff" opacity="0.85" font-family="serif">ᚹ</text>
  <text x="36" y="63" font-size="7" fill="#4a9eff" opacity="0.9" font-family="serif">ᚾ</text>
