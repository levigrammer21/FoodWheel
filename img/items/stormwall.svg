<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="stormwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="50%" stop-color="#2a4a7a"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>
    <filter id="swglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Storm energy aura around shield -->
  <rect x="8" y="10" width="84" height="80" rx="8" fill="#4a9eff" opacity="0.1" filter="url(#swglow)"/>
  <!-- Shield body - large rectangular storm shield -->
  <rect x="14" y="10" width="72" height="80" rx="6" fill="url(#stormwall)"/>
  <!-- Storm cloud texture bands -->
  <path d="M14,26 Q30,22 50,24 Q70,22 86,26" stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M14,40 Q30,36 50,38 Q70,36 86,40" stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M14,54 Q30,50 50,52 Q70,50 86,54" stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M14,68 Q30,64 50,66 Q70,64 86,68" stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Central lightning bolt emblem -->
  <path d="M50,22 L44,48 L52,48 L46,78" stroke="#ffffff" stroke-width="3" fill="none"/>
  <path d="M50,22 L44,48 L52,48 L46,78" stroke="#4a9eff" stroke-width="5" fill="none" opacity="0.3"/>
  <!-- Side lightning arcs -->
  <path d="M16,34 L22,42 L18,42 L26,54" stroke="#74b9ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M84,38 L78,46 L82,46 L74,58" stroke="#74b9ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Rim - glowing blue -->
  <rect x="14" y="10" width="72" height="80" rx="6" fill="none" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <!-- Corner bolts -->
  <circle cx="20" cy="16" r="3" fill="#4a9eff" opacity="0.8"/>
  <circle cx="80" cy="16" r="3" fill="#4a9eff" opacity="0.8"/>
  <circle cx="20" cy="84" r="3" fill="#4a9eff" opacity="0.8"/>
  <circle cx="80" cy="84" r="3" fill="#4a9eff" opacity="0.8"/>
</svg>
