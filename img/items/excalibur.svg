<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="excalblade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0d8f0"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffe08a"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="excalguard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="divinelight" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="excalblur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Divine radiance rays -->
  <line x1="50" y1="30" x2="20" y2="10" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="30" x2="80" y2="10" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="30" x2="10" y2="35" stroke="#ffd700" stroke-width="1" opacity="0.25"/>
  <line x1="50" y1="30" x2="90" y2="35" stroke="#ffd700" stroke-width="1" opacity="0.25"/>
  <line x1="50" y1="30" x2="15" y2="55" stroke="#ffd700" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="30" x2="85" y2="55" stroke="#ffd700" stroke-width="1" opacity="0.2"/>
  <!-- Soft glow behind blade -->
  <ellipse cx="50" cy="32" rx="20" ry="30" fill="url(#divinelight)" filter="url(#excalblur)"/>
  <!-- Blade - broad, noble, shimmering -->
  <polygon points="50,5 44,56 56,56" fill="url(#excalblade)"/>
  <!-- Blade center bright stripe -->
  <rect x="49" y="7" width="2" height="46" rx="1" fill="#ffffff" opacity="0.7"/>
  <!-- Blade etched cross on flats -->
  <line x1="46" y1="20" x2="54" y2="20" stroke="#ffd700" stroke-width="0.8" opacity="0.5"/>
  <line x1="45" y1="35" x2="55" y2="35" stroke="#ffd700" stroke-width="0.8" opacity="0.4"/>
  <!-- Gold crossguard - ornate -->
  <rect x="32" y="55" width="36" height="7" rx="3" fill="url(#excalguard)"/>
  <!-- Guard gems -->
  <circle cx="36" cy="58" r="2.5" fill="#4fc3f7"/>
  <circle cx="64" cy="58" r="2.5" fill="#4fc3f7"/>
  <circle cx="50" cy="58" r="2" fill="#ffffff" opacity="0.8"/>
  <!-- Guard detail -->
  <rect x="32" y="55" width="36" height="2.5" rx="1" fill="#ffd700" opacity="0.5"/>
  <!-- Grip - white/silver royal wrap -->
  <rect x="46" y="62" width="8" height="20" rx="3" fill="#dce8f0"/>
  <line x1="45" y1="65" x2="55" y2="65" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="45" y1="69" x2="55" y2="69" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="45" y1="73" x2="55" y2="73" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="45" y1="77" x2="55" y2="77" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <!-- Pommel - large golden orb -->
  <circle cx="50" cy="86" r="8" fill="url(#excalguard)"/>
  <circle cx="50" cy="86" r="5" fill="#ffd700" opacity="0.6"/>
  <circle cx="47" cy="83" r="2" fill="#ffffff" opacity="0.5"/>
  <!-- Star sparkle at tip -->
  <line x1="50" y1="2" x2="50" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <line x1="47" y1="5" x2="53" y2="5" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <line x1="48" y1="3" x2="52" y2="7" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="52" y1="3" x2="48" y2="7" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
</svg>
