<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ffd54f" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="40%" stop-color="#ffd54f"/>
            <stop offset="100%" stop-color="#f57f17"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <polygon points="32,4 28,44 32,50 36,44" fill="url(#blade)"/>
          <polygon points="32,4 32,24 33,24" fill="white" opacity="0.9"/>
          <rect x="16" y="43" width="32" height="6" rx="2" fill="#f57f17"/>
          <rect x="16" y="43" width="32" height="2" rx="1" fill="#ffd54f" opacity="0.6"/>
          <rect x="30" y="49" width="4" height="12" rx="2" fill="#e65100"/>
          <circle cx="32" cy="61" r="2.5" fill="#ffd54f"/>
          <polygon points="32,5 31,14 32,11 33,14" fill="white" opacity="0.9"/>
        </g>
</svg>