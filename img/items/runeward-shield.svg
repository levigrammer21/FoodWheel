<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield body - oval/almond shape -->
  <path d="M50,8 Q82,22 82,50 Q82,78 50,92 Q18,78 18,50 Q18,22 50,8Z" fill="#3a4a54"/>
  <!-- Rune grid inscribed -->
  <text x="32" y="30" font-size="9" fill="#4a9eff" opacity="0.8" font-family="serif">ᚠᚢᚦ</text>
  <text x="30" y="44" font-size="9" fill="#4a9eff" opacity="0.75" font-family="serif">ᚱᚲᚷ</text>
  <text x="32" y="58" font-size="9" fill="#4a9eff" opacity="0.7" font-family="serif">ᚹᚾᛁ</text>
  <text x="34" y="72" font-size="9" fill="#4a9eff" opacity="0.65" font-family="serif">ᛃᛇᛈ</text>
  <!-- Rune glow aura -->
  <path d="M50,8 Q82,22 82,50 Q82,78 50,92 Q18,78 18,50 Q18,22 50,8Z" fill="#4a9eff" opacity="0.05"/>
  <!-- Rim with rune border -->
  <path d="M50,8 Q82,22 82,50 Q82,78 50,92 Q18,78 18,50 Q18,22 50,8Z" fill="none" stroke="#4a9eff" stroke-width="3" opacity="0.5"/>
  <!-- Center ward circle -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="6" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="50" r="3" fill="#4a9eff" opacity="0.5"/>
  <!-- Secondary rune ring -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#4a9eff" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
</svg>
