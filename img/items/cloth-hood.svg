  <path d="M30,62 Q36,44 50,36 Q64,44 70,62" stroke="#6666aa" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Hood opening rim -->
  <path d="M28,65 Q50,72 72,65" stroke="#5555aa" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Drawstring -->
