<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blade with fuller -->
  <polygon points="50,7 45,57 55,57" fill="#8a9ba8"/>
  <!-- Fuller groove -->
  <rect x="49" y="11" width="2" height="42" rx="1" fill="#b8ccd8" opacity="0.6"/>
  <!-- Edge highlight -->
  <line x1="50" y1="7" x2="45" y2="57" stroke="#d0dde6" stroke-width="0.8" opacity="0.5"/>
  <!-- Crossguard -->
  <rect x="36" y="56" width="28" height="6" rx="2.5" fill="#6a7a84"/>
  <!-- Crossguard detail line -->
  <rect x="36" y="57" width="28" height="2" rx="1" fill="#9ab0bc" opacity="0.5"/>
  <!-- Guard quillons (slight curve) -->
  <ellipse cx="36" cy="59" rx="3" ry="4" fill="#5a6a74"/>
  <ellipse cx="64" cy="59" rx="3" ry="4" fill="#5a6a74"/>
  <!-- Grip -->
  <rect x="46" y="62" width="8" height="20" rx="3" fill="#3d2510"/>
  <!-- Grip wrap -->
  <line x1="45" y1="65" x2="55" y2="65" stroke="#5c3a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="45" y1="69" x2="55" y2="69" stroke="#5c3a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="45" y1="73" x2="55" y2="73" stroke="#5c3a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="45" y1="77" x2="55" y2="77" stroke="#5c3a1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Pommel - round iron -->
  <circle cx="50" cy="85" r="6" fill="#6a7a84"/>
  <circle cx="48" cy="83" r="2.5" fill="#9ab0bc" opacity="0.4"/>
</svg>
