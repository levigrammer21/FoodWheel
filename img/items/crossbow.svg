<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#66bb6a" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
    <g filter="url(#glow)">
      <path d="M20,8 C10,20 10,44 20,56" stroke="#66bb6a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M20,8 C30,20 30,44 20,56" stroke="#388e3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <line x1="20" y1="8" x2="20" y2="56" stroke="#a5d6a7" stroke-width="1" opacity="0.6"/>
      <line x1="32" y1="10" x2="20" y2="32" stroke="#a5d6a7" stroke-width="0.8" stroke-dasharray="2,2"/>
      <polygon points="44,32 38,28 38,36" fill="#66bb6a"/>
      
    </g>
</svg>