<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#66bb6a" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="helm" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a5d6a7"/>
            <stop offset="100%" stop-color="#388e3c"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <path d="M16,46 C16,46 14,26 32,18 C50,26 48,46 48,46 Z" fill="url(#helm)"/>
          <rect x="14" y="44" width="36" height="8" rx="3" fill="#388e3c"/>
          <path d="M22,44 L22,36" stroke="#a5d6a7" stroke-width="1" opacity="0.4"/>
          <path d="M42,44 L42,36" stroke="#a5d6a7" stroke-width="1" opacity="0.4"/>
          
          <path d="M20,44 C20,44 18,30 32,22 C46,30 44,44 44,44" stroke="#a5d6a7" stroke-width="0.8" fill="none" opacity="0.3"/>
        </g>
</svg>