<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ironhelm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a6a74"/>
      <stop offset="40%" stop-color="#8a9ba8"/>
      <stop offset="100%" stop-color="#4a5a64"/>
    </linearGradient>
  </defs>
  <!-- Dome -->
  <path d="M20,64 Q20,28 50,20 Q80,28 80,64Z" fill="url(#ironhelm)"/>
  <!-- Dome highlight -->
  <ellipse cx="40" cy="35" rx="10" ry="8" fill="#aabbc8" opacity="0.25"/>
  <!-- Center ridge/comb -->
  <path d="M50,20 L50,64" stroke="#6a7a84" stroke-width="3" fill="none"/>
  <!-- Nasal guard -->
  <rect x="47" y="55" width="6" height="20" rx="2" fill="#5a6a74"/>
  <rect x="48" y="55" width="4" height="1" rx="0.5" fill="#9ab0bc" opacity="0.5"/>
  <!-- Brow band -->
  <rect x="18" y="60" width="64" height="6" rx="2" fill="#5a6a74"/>
  <rect x="18" y="60" width="64" height="2" rx="1" fill="#8a9ba8" opacity="0.4"/>
  <!-- Cheek guards -->
  <path d="M20,64 Q16,72 18,80 Q22,78 24,70Z" fill="#5a6a74"/>
  <path d="M80,64 Q84,72 82,80 Q78,78 76,70Z" fill="#5a6a74"/>
  <!-- Rivets on brow -->
  <circle cx="28" cy="63" r="2" fill="#4a5a64"/>
  <circle cx="50" cy="63" r="2" fill="#4a5a64"/>
  <circle cx="72" cy="63" r="2" fill="#4a5a64"/>
</svg>
