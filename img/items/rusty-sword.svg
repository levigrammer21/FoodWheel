<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blade -->
  <polygon points="50,8 46,55 54,55" fill="#9e9e9e"/>
  <!-- Rust patches -->
  <ellipse cx="50" cy="22" rx="2.5" ry="1.5" fill="#a0522d" opacity="0.7"/>
  <ellipse cx="48" cy="35" rx="1.5" ry="1" fill="#8b3a1a" opacity="0.6"/>
  <ellipse cx="52" cy="45" rx="2" ry="1.2" fill="#a0522d" opacity="0.65"/>
  <!-- Blade edge highlight -->
  <line x1="50" y1="8" x2="46" y2="55" stroke="#c0c0c0" stroke-width="0.8" opacity="0.5"/>
  <!-- Guard -->
  <rect x="38" y="54" width="24" height="5" rx="2" fill="#7a7a7a"/>
  <rect x="38" y="54" width="24" height="2" rx="1" fill="#aaaaaa" opacity="0.4"/>
  <!-- Grip -->
  <rect x="47" y="59" width="6" height="18" rx="2" fill="#5c3d1e"/>
  <!-- Grip wrap lines -->
  <line x1="46" y1="63" x2="54" y2="63" stroke="#3b2510" stroke-width="1" opacity="0.6"/>
  <line x1="46" y1="67" x2="54" y2="67" stroke="#3b2510" stroke-width="1" opacity="0.6"/>
  <line x1="46" y1="71" x2="54" y2="71" stroke="#3b2510" stroke-width="1" opacity="0.6"/>
  <!-- Pommel -->
  <ellipse cx="50" cy="79" rx="5" ry="4" fill="#7a7a7a"/>
  <ellipse cx="50" cy="78" rx="3" ry="2" fill="#aaaaaa" opacity="0.4"/>
</svg>
