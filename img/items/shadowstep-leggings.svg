<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadowstepblur"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Shadow ghost offset (mid-step effect) -->
  <path d="M20,12 Q30,8 38,12 L42,76 Q30,82 20,76Z" fill="#4422aa" opacity="0.2" transform="translate(4,4)" filter="url(#shadowstepblur)"/>
  <path d="M62,12 Q72,8 82,12 L82,76 Q70,82 60,76Z" fill="#4422aa" opacity="0.2" transform="translate(-4,4)" filter="url(#shadowstepblur)"/>
  <!-- Left leg -->
  <path d="M20,12 Q30,8 38,12 L42,76 Q30,82 20,76Z" fill="#1a1a2e"/>
  <!-- Right leg -->
  <path d="M62,12 Q72,8 82,12 L82,76 Q70,82 60,76Z" fill="#1a1a2e"/>
  <!-- Shadow binding wraps left -->
  <line x1="20" y1="22" x2="40" y2="22" stroke="#6633cc" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="34" x2="40" y2="34" stroke="#6633cc" stroke-width="1.5" opacity="0.5"/>
  <line x1="21" y1="50" x2="40" y2="50" stroke="#6633cc" stroke-width="1.5" opacity="0.4"/>
  <line x1="22" y1="64" x2="40" y2="64" stroke="#6633cc" stroke-width="1.5" opacity="0.4"/>
  <!-- Shadow binding wraps right -->
  <line x1="62" y1="22" x2="82" y2="22" stroke="#6633cc" stroke-width="1.5" opacity="0.5"/>
  <line x1="62" y1="34" x2="82" y2="34" stroke="#6633cc" stroke-width="1.5" opacity="0.5"/>
  <line x1="62" y1="50" x2="82" y2="50" stroke="#6633cc" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="64" x2="82" y2="64" stroke="#6633cc" stroke-width="1.5" opacity="0.4"/>
  <!-- Knee void pads -->
  <ellipse cx="30" cy="46" rx="10" ry="8" fill="#0d0d1e"/>
  <ellipse cx="72" cy="46" rx="10" ry="8" fill="#0d0d1e"/>
  <circle cx="30" cy="46" r="5" fill="#4422aa" opacity="0.5"/>
  <circle cx="72" cy="46" r="5" fill="#4422aa" opacity="0.5"/>
  <!-- Waistband -->
  <rect x="18" y="8" width="64" height="6" rx="2" fill="#0d0d1e"/>
  <rect x="18" y="8" width="64" height="2" rx="1" fill="#6633cc" opacity="0.5"/>
</svg>
