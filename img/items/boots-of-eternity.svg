<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="eternboot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3a10"/>
      <stop offset="40%" stop-color="#c8a820"/>
      <stop offset="100%" stop-color="#3a2a08"/>
    </linearGradient>
    <filter id="etglow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Time echoes - ghost boots from other eras behind -->
  <path d="M14,20 L14,68 Q14,76 22,78 L40,78 Q48,74 50,68 L36,66 Q26,64 24,58 L22,20Z" fill="#ffd700" opacity="0.06" transform="rotate(-2,32,50)"/>
  <path d="M50,68 Q52,74 60,78 L80,78 Q86,76 86,68 L86,20 L78,20 L76,58 Q74,64 64,66 Q56,66 50,68Z" fill="#ffd700" opacity="0.06" transform="rotate(2,70,50)"/>
  <!-- Left boot -->
  <path d="M14,20 L14,68 Q14,76 22,78 L40,78 Q48,74 50,68 L36,66 Q26,64 24,58 L22,20Z" fill="#3a2a08"/>
  <!-- Ancient engravings - timekeeping -->
  <circle cx="28" cy="36" r="8" fill="none" stroke="url(#eternboot)" stroke-width="1.2" opacity="0.6"/>
  <line x1="28" y1="28" x2="28" y2="36" stroke="#c8a820" stroke-width="1" opacity="0.7"/>
  <line x1="28" y1="36" x2="34" y2="40" stroke="#c8a820" stroke-width="0.8" opacity="0.6"/>
  <!-- Hourglass on boot -->
  <path d="M24,54 L32,54 L28,60 L32,66 L24,66 L28,60Z" fill="none" stroke="#c8a820" stroke-width="1" opacity="0.5"/>
  <!-- Sole - worn by time but golden still -->
  <path d="M12,76 Q12,82 22,84 L40,84 Q50,80 50,76 L36,78 Q22,78 12,76Z" fill="url(#eternboot)"/>
  <rect x="12" y="68" width="6" height="16" rx="2" fill="#4a3a10"/>
  <!-- Right boot -->
  <path d="M50,68 Q52,74 60,78 L80,78 Q86,76 86,68 L86,20 L78,20 L76,58 Q74,64 64,66 Q56,66 50,68Z" fill="#3a2a08"/>
  <!-- Sundial/clock face on right boot -->
  <circle cx="72" cy="36" r="8" fill="none" stroke="url(#eternboot)" stroke-width="1.2" opacity="0.6"/>
  <line x1="72" y1="28" x2="72" y2="36" stroke="#c8a820" stroke-width="1" opacity="0.7"/>
  <line x1="72" y1="36" x2="78" y2="38" stroke="#c8a820" stroke-width="0.8" opacity="0.6"/>
  <!-- Hourglass right -->
  <path d="M68,54 L76,54 L72,60 L76,66 L68,66 L72,60Z" fill="none" stroke="#c8a820" stroke-width="1" opacity="0.5"/>
  <!-- Right sole -->
  <path d="M50,76 Q50,82 60,84 L80,84 Q88,80 88,76 L84,78 Q64,78 50,76Z" fill="url(#eternboot)"/>
  <rect x="82" y="68" width="6" height="16" rx="2" fill="#4a3a10"/>
  <!-- Rim glow -->
  <path d="M14,20 L14,68 Q14,76 22,78 L40,78 Q48,74 50,68 L36,66 Q26,64 24,58 L22,20Z" fill="none" stroke="#c8a820" stroke-width="1.5" opacity="0.5"/>
  <path d="M50,68 Q52,74 60,78 L80,78 Q86,76 86,68 L86,20 L78,20 L76,58 Q74,64 64,66 Q56,66 50,68Z" fill="none" stroke="#c8a820" stroke-width="1.5" opacity="0.5"/>
  <!-- Golden mote particles from being ancient -->
  <circle cx="18" cy="22" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="82" cy="24" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="14" cy="50" r="0.8" fill="#c8a820" opacity="0.5"/>
  <circle cx="86" cy="48" r="0.8" fill="#c8a820" opacity="0.5"/>
</svg>
