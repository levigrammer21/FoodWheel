<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
      <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#1565c0"/>
        <stop offset="50%" stop-color="#90caf9"/>
        <stop offset="100%" stop-color="#42a5f5"/>
      </linearGradient>
    </defs>
    <g filter="url(#glow)">
      <polygon points="32,10 30,40 32,44 34,40" fill="url(#blade)"/>
      <line x1="31" y1="12" x2="31" y2="40" stroke="#90caf9" stroke-width="0.7" opacity="0.5"/>
      <rect x="24" y="39" width="16" height="4" rx="2" fill="#1565c0"/>
      <rect x="29" y="43" width="6" height="12" rx="3" fill="#1565c0"/>
      <ellipse cx="32" cy="55" rx="3" ry="2" fill="#42a5f5"/>
    </g>
</svg>