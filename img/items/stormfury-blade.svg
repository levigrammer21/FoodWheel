<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
          <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e3f2fd"/>
            <stop offset="50%" stop-color="#42a5f5"/>
            <stop offset="100%" stop-color="#0d47a1"/>
          </linearGradient>
        </defs>
        <g filter="url(#glow)">
          <polygon points="32,5 28,45 32,50 36,45" fill="url(#blade)"/>
          <polygon points="32,5 32,25 33.5,25" fill="white" opacity="0.6"/>
          <rect x="18" y="44" width="28" height="5" rx="2" fill="#1565c0"/>
          <rect x="30" y="49" width="4" height="11" rx="2" fill="#0d47a1"/>
          <ellipse cx="32" cy="60" rx="3.5" ry="2" fill="#42a5f5"/>
          <line x1="32" y1="10" x2="28" y2="22" stroke="white" stroke-width="1" opacity="0.7"/>
          <line x1="28" y1="22" x2="34" y2="28" stroke="white" stroke-width="1" opacity="0.7"/>
        </g>
</svg>