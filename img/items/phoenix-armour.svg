  <circle cx="50" cy="18" r="3" fill="#ff8800"/>
  <circle cx="50" cy="18" r="1.5" fill="#ffee00"/>
  <!-- Flame feather rows on chest -->
  <path d="M26,36 Q32,30 38,34 Q32,38 26,36Z" fill="#ff8800" opacity="0.7"/>
  <path d="M38,34 Q44,28 50,32 Q44,36 38,34Z" fill="#ffaa00" opacity="0.7"/>
  <path d="M50,32 Q56,28 62,34 Q56,36 50,32Z" fill="#ff8800" opacity="0.7"/>
  <path d="M62,34 Q68,30 74,36 Q68,38 62,34Z" fill="#ffaa00" opacity="0.7"/>
  <path d="M28,50 Q34,44 40,48 Q34,52 28,50Z" fill="#ff6600" opacity="0.6"/>
  <path d="M40,48 Q48,42 54,46 Q48,50 40,48Z" fill="#ff8800" opacity="0.6"/>
  <path d="M54,46 Q60,42 68,48 Q62,52 54,46Z" fill="#ff6600" opacity="0.6"/>
