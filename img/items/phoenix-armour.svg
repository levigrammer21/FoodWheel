  <path d="M8,10 Q6,6 8,4" stroke="#ffaa00" stroke-width="1.5" fill="none"/>
  <path d="M94,12 Q96,8 94,6" stroke="#ffcc00" stroke-width="1.5" fill="none"/>
  <path d="M92,10 Q94,6 92,4" stroke="#ffaa00" stroke-width="1.5" fill="none"/>
  <!-- Phoenix head crest on chest -->
  <path d="M42,16 Q50,8 58,16 Q54,22 50,20 Q46,22 42,16Z" fill="#ffcc00"/>
