<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="phoenixgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="40%" stop-color="#ff3300"/>
      <stop offset="70%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#8a1100"/>
    </linearGradient>
    <filter id="phoenixglow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <!-- Flame aura -->
  <ellipse cx="50" cy="50" rx="36" ry="42" fill="#ff4400" opacity="0.1" filter="url(#phoenixglow)"/>
  <!-- Armour body - shaped like phoenix chest -->
  <path d="M20,28 Q20,10 50,6 Q80,10 80,28 L76,82 Q50,90 24,82Z" fill="url(#phoenixgrad)"/>
