<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="dawnshield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffee88"/>
      <stop offset="65%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <filter id="dawnglow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Dawn glow behind -->
  <circle cx="50" cy="50" r="44" fill="#ff8800" opacity="0.15" filter="url(#dawnglow)"/>
  <!-- Sunray spikes from shield -->
  <line x1="50" y1="6" x2="50" y2="2" stroke="#ffee44" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="94" x2="50" y2="98" stroke="#ffee44" stroke-width="2" opacity="0.6"/>
  <line x1="6" y1="50" x2="2" y2="50" stroke="#ffee44" stroke-width="2" opacity="0.6"/>
  <line x1="94" y1="50" x2="98" y2="50" stroke="#ffee44" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="20" x2="16" y2="16" stroke="#ffee44" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="20" x2="84" y2="16" stroke="#ffee44" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="80" x2="16" y2="84" stroke="#ffee44" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="80" x2="84" y2="84" stroke="#ffee44" stroke-width="1.5" opacity="0.5"/>
  <!-- Round shield body -->
  <circle cx="50" cy="50" r="40" fill="url(#dawnshield)"/>
  <!-- Dawn horizon line -->
  <line x1="10" y1="56" x2="90" y2="56" stroke="#cc4400" stroke-width="2" opacity="0.4"/>
  <!-- Sunburst lines from center -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="21" y1="21" x2="79" y2="79" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <line x1="79" y1="21" x2="21" y2="79" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <!-- Sun disc boss -->
  <circle cx="50" cy="50" r="14" fill="#ffee44"/>
  <circle cx="50" cy="50" r="10" fill="#ffffff"/>
  <circle cx="50" cy="50" r="6" fill="#ffee44"/>
  <circle cx="50" cy="50" r="3" fill="#ffffff"/>
  <!-- Rim -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#cc4400" stroke-width="4"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ffee44" stroke-width="1.5" opacity="0.5"/>
</svg>
