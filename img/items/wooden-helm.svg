<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Main dome - wood planks bent -->
  <path d="M22,62 Q22,32 50,24 Q78,32 78,62Z" fill="#8b5e2c"/>
  <!-- Wood grain lines -->
  <path d="M30,55 Q38,36 50,32 Q62,36 70,55" stroke="#6b3a10" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M26,60 Q34,40 50,34 Q66,40 74,60" stroke="#6b3a10" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M50,24 L50,62" stroke="#7a4a1a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Iron band holding planks -->
  <path d="M24,50 Q50,46 76,50" stroke="#6a7a84" stroke-width="3" fill="none"/>
  <!-- Cheek guards - flat wood pieces -->
  <rect x="18" y="54" width="12" height="16" rx="2" fill="#7a5020"/>
  <rect x="70" y="54" width="12" height="16" rx="2" fill="#7a5020"/>
  <!-- Brim -->
  <rect x="18" y="60" width="64" height="5" rx="2" fill="#5c3a10"/>
  <!-- Leather chin strap -->
  <path d="M20,68 Q50,76 80,68" stroke="#6b4020" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
