<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="celwalk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a4e" stop-opacity="0.8"/>
