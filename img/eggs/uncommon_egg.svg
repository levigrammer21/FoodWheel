<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="eg" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a8f0b0"/>
      <stop offset="60%" stop-color="#2eaa4a"/>
      <stop offset="100%" stop-color="#145c28"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="54%" r="50%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,180,60,0.22)"/>
    </radialGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="50" cy="54" rx="32" ry="38" fill="rgba(46,180,80,0.18)" filter="url(#f)"/>
  <!-- Egg body -->
  <ellipse cx="50" cy="54" rx="28" ry="34" fill="url(#eg)"/>
  <ellipse cx="50" cy="54" rx="28" ry="34" fill="url(#glow)"/>
  <!-- Vein lines -->
  <path d="M44 38 Q48 50 44 64" stroke="rgba(0,255,80,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M56 42 Q52 55 57 68" stroke="rgba(0,255,80,0.2)" stroke-width="1.2" fill="none"/>
  <!-- Speckles -->
  <circle cx="42" cy="46" r="2" fill="#00c840" opacity="0.5"/>
  <circle cx="58" cy="52" r="1.6" fill="#00c840" opacity="0.45"/>
  <circle cx="46" cy="64" r="1.8" fill="#005a1a" opacity="0.4"/>
  <circle cx="55" cy="38" r="1.4" fill="#00c840" opacity="0.4"/>
  <!-- Shine -->
  <ellipse cx="40" cy="40" rx="8" ry="5" fill="white" opacity="0.28" transform="rotate(-20 40 40)"/>
</svg>
