<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Ears -->
  <rect x="8" y="14" width="8" height="12" fill="#5a8c2a"/>
  <rect x="48" y="14" width="8" height="12" fill="#5a8c2a"/>
  <rect x="10" y="16" width="4" height="6" fill="#c06060"/>
  <rect x="50" y="16" width="4" height="6" fill="#c06060"/>
  <!-- Head -->
  <rect x="16" y="10" width="32" height="28" fill="#6aaa30"/>
  <rect x="14" y="14" width="4" height="20" fill="#6aaa30"/>
  <rect x="46" y="14" width="4" height="20" fill="#6aaa30"/>
  <!-- Head top bump -->
  <rect x="20" y="8" width="24" height="4" fill="#6aaa30"/>
  <!-- Eyes - yellow and mean -->
  <rect x="18" y="18" width="8" height="8" fill="#f0d000"/>
  <rect x="38" y="18" width="8" height="8" fill="#f0d000"/>
  <rect x="21" y="20" width="4" height="5" fill="#1a1a1a"/>
  <rect x="41" y="20" width="4" height="5" fill="#1a1a1a"/>
  <rect x="21" y="20" width="2" height="2" fill="#fff"/>
  <rect x="41" y="20" width="2" height="2" fill="#fff"/>
  <!-- Eyebrow angry -->
  <rect x="18" y="16" width="10" height="2" fill="#3a6010" transform="rotate(-5 18 16)"/>
  <rect x="38" y="16" width="10" height="2" fill="#3a6010" transform="rotate(5 48 16)"/>
  <!-- Nose -->
  <rect x="28" y="26" width="8" height="4" fill="#4a8020"/>
  <rect x="28" y="27" width="3" height="2" fill="#2a4010"/>
  <rect x="33" y="27" width="3" height="2" fill="#2a4010"/>
  <!-- Mouth/teeth -->
  <rect x="22" y="30" width="20" height="6" fill="#2a1a00"/>
  <rect x="24" y="30" width="4" height="4" fill="#ffffff"/>
  <rect x="36" y="30" width="4" height="4" fill="#ffffff"/>
  <!-- Body/tunic -->
  <rect x="18" y="38" width="28" height="18" fill="#8b4513"/>
  <rect x="22" y="36" width="20" height="4" fill="#6aaa30"/>
  <!-- Belt -->
  <rect x="18" y="48" width="28" height="4" fill="#3a2008"/>
  <rect x="28" y="47" width="8" height="6" fill="#c8a000"/>
  <!-- Arms -->
  <rect x="8" y="38" width="10" height="16" fill="#6aaa30"/>
  <rect x="46" y="38" width="10" height="16" fill="#6aaa30"/>
  <!-- Dagger in right hand -->
  <rect x="54" y="44" width="4" height="14" fill="#c0c0c0"/>
  <rect x="52" y="44" width="8" height="4" fill="#8b6914"/>
  <!-- Legs -->
  <rect x="20" y="56" width="10" height="8" fill="#5a3008"/>
  <rect x="34" y="56" width="10" height="8" fill="#5a3008"/>
  <!-- Boots -->
  <rect x="18" y="60" width="12" height="4" fill="#2a1000"/>
  <rect x="34" y="60" width="12" height="4" fill="#2a1000"/>
</svg>
