<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Body - massive and blocky -->
  <rect x="12" y="24" width="40" height="32" fill="#787878"/>
  <rect x="8" y="28" width="8" height="24" fill="#787878"/>
  <rect x="48" y="28" width="8" height="24" fill="#787878"/>
  <!-- Body cracks/texture -->
  <rect x="18" y="28" width="2" height="12" fill="#505050"/>
  <rect x="30" y="32" width="2" height="16" fill="#505050"/>
  <rect x="44" y="36" width="2" height="8" fill="#505050"/>
  <rect x="14" y="40" width="16" height="2" fill="#505050"/>
  <rect x="36" y="44" width="10" height="2" fill="#505050"/>
  <!-- Head -->
  <rect x="16" y="6" width="32" height="22" fill="#6e6e6e"/>
  <rect x="12" y="10" width="8" height="14" fill="#6e6e6e"/>
  <rect x="44" y="10" width="8" height="14" fill="#6e6e6e"/>
  <!-- Head brow -->
  <rect x="14" y="6" width="36" height="4" fill="#888888"/>
  <!-- Glowing eyes -->
  <rect x="18" y="14" width="10" height="8" fill="#e05000"/>
  <rect x="36" y="14" width="10" height="8" fill="#e05000"/>
  <rect x="20" y="15" width="6" height="5" fill="#ff8800"/>
