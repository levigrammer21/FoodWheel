  <rect x="22" y="16" width="3" height="3" fill="#ffcc00"/>
  <rect x="40" y="16" width="3" height="3" fill="#ffcc00"/>
  <!-- Stone mouth -->
  <rect x="22" y="22" width="20" height="4" fill="#404040"/>
  <rect x="24" y="22" width="3" height="2" fill="#888"/>
  <rect x="29" y="22" width="3" height="2" fill="#888"/>
  <rect x="34" y="22" width="3" height="2" fill="#888"/>
  <rect x="39" y="22" width="2" height="2" fill="#888"/>
  <!-- Fists -->
  <rect x="0" y="30" width="12" height="14" fill="#6a6a6a"/>
