<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Helmet -->
  <rect x="18" y="4" width="28" height="6" fill="#888"/>
  <rect x="14" y="8" width="36" height="4" fill="#888"/>
  <rect x="16" y="12" width="32" height="16" fill="#999"/>
  <!-- Skull face in helmet -->
  <rect x="18" y="14" width="28" height="12" fill="#ccccaa"/>
  <!-- Eye sockets -->
  <rect x="20" y="16" width="10" height="8" fill="#000"/>
  <rect x="34" y="16" width="10" height="8" fill="#000"/>
  <!-- Eye glow blue -->
  <rect x="22" y="17" width="6" height="5" fill="#0044ff"/>
  <rect x="36" y="17" width="6" height="5" fill="#0044ff"/>
  <rect x="24" y="18" width="3" height="3" fill="#4488ff"/>
  <rect x="38" y="18" width="3" height="3" fill="#4488ff"/>
  <!-- Nose void -->
  <rect x="28" y="22" width="8" height="4" fill="#000"/>
  <!-- Teeth -->
  <rect x="20" y="26" width="24" height="2" fill="#000"/>
  <rect x="22" y="24" width="3" height="4" fill="#ccccaa"/>
  <rect x="27" y="24" width="3" height="3" fill="#ccccaa"/>
  <rect x="32" y="24" width="3" height="3" fill="#ccccaa"/>
  <rect x="37" y="24" width="3" height="4" fill="#ccccaa"/>
  <!-- Neck bones -->
  <rect x="26" y="28" width="12" height="4" fill="#ccccaa"/>
  <!-- Chest armor -->
  <rect x="14" y="32" width="36" height="22" fill="#777"/>
  <rect x="10" y="36" width="44" height="14" fill="#777"/>
  <!-- Ribcage showing through gaps -->
  <rect x="22" y="34" width="20" height="18" fill="#555"/>
  <rect x="24" y="34" width="3" height="16" fill="#ccccaa"/>
  <rect x="29" y="34" width="3" height="16" fill="#ccccaa"/>
  <rect x="34" y="34" width="3" height="16" fill="#ccccaa"/>
  <rect x="39" y="34" width="3" height="16" fill="#ccccaa"/>
  <!-- Spine center -->
  <rect x="30" y="34" width="4" height="18" fill="#aaa890"/>
  <!-- Sword arm bone -->
  <rect x="54" y="4" width="4" height="52" fill="#aaa"/>
  <rect x="48" y="26" width="16" height="4" fill="#888"/>
  <rect x="52" y="2" width="8" height="6" fill="#888"/>
  <!-- Shield arm -->
  <rect x="2" y="32" width="12" height="20" fill="#777"/>
  <rect x="2" y="30" width="12" height="4" fill="#888"/>
  <rect x="2" y="50" width="12" height="4" fill="#666"/>
  <!-- Shield emblem skull -->
  <rect x="4" y="34" width="8" height="10" fill="#555"/>
  <rect x="5" y="35" width="6" height="8" fill="#ccccaa" opacity="0.3"/>
  <!-- Bone legs -->
  <rect x="18" y="54" width="10" height="10" fill="#ccccaa"/>
  <rect x="36" y="54" width="10" height="10" fill="#ccccaa"/>
  <!-- Boot armor -->
  <rect x="16" y="60" width="14" height="4" fill="#777"/>
  <rect x="34" y="60" width="14" height="4" fill="#777"/>
  <!-- Shoulder pauldrons -->
  <rect x="8" y="30" width="8" height="8" fill="#888"/>
  <rect x="48" y="30" width="8" height="8" fill="#888"/>
</svg>
