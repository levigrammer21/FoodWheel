<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Shadow aura -->
  <rect x="0" y="0" width="64" height="64" fill="#050005" opacity="0.3"/>
  <!-- Wings of shadow -->
  <rect x="0" y="14" width="18" height="4" fill="#1a001a"/>
  <rect x="0" y="8" width="12" height="8" fill="#1a001a"/>
  <rect x="0" y="4" width="8" height="6" fill="#220022"/>
  <rect x="46" y="14" width="18" height="4" fill="#1a001a"/>
  <rect x="52" y="8" width="12" height="8" fill="#1a001a"/>
  <rect x="56" y="4" width="8" height="6" fill="#220022"/>
  <!-- Wing membrane -->
  <rect x="2" y="10" width="14" height="2" fill="#330033" opacity="0.6"/>
  <rect x="2" y="14" width="16" height="2" fill="#330033" opacity="0.6"/>
  <rect x="48" y="10" width="14" height="2" fill="#330033" opacity="0.6"/>
  <rect x="46" y="14" width="16" height="2" fill="#330033" opacity="0.6"/>
  <!-- Body dark mass -->
  <rect x="14" y="18" width="36" height="36" fill="#1a001a"/>
  <rect x="10" y="24" width="44" height="26" fill="#1a001a"/>
  <rect x="16" y="12" width="32" height="10" fill="#1a001a"/>
  <!-- Body markings -->
  <rect x="16" y="26" width="6" height="10" fill="#330033"/>
  <rect x="28" y="22" width="6" height="14" fill="#330033"/>
  <rect x="42" y="28" width="6" height="8" fill="#330033"/>
  <!-- Horns -->
  <rect x="18" y="4" width="6" height="12" fill="#2a002a"/>
  <rect x="22" y="2" width="5" height="12" fill="#330033"/>
  <rect x="38" y="4" width="6" height="12" fill="#2a002a"/>
  <rect x="37" y="2" width="5" height="12" fill="#330033"/>
  <!-- Eyes burning red -->
  <rect x="16" y="18" width="12" height="10" fill="#880000"/>
  <rect x="36" y="18" width="12" height="10" fill="#880000"/>
  <rect x="18" y="19" width="8" height="7" fill="#cc0000"/>
  <rect x="38" y="19" width="8" height="7" fill="#cc0000"/>
  <rect x="20" y="20" width="4" height="4" fill="#ff2200"/>
  <rect x="40" y="20" width="4" height="4" fill="#ff2200"/>
  <rect x="20" y="20" width="2" height="2" fill="#ffaa00"/>
  <rect x="40" y="20" width="2" height="2" fill="#ffaa00"/>
  <!-- Fanged mouth -->
  <rect x="18" y="30" width="28" height="6" fill="#000000"/>
  <rect x="20" y="28" width="4" height="6" fill="#cc0000"/>
  <rect x="26" y="28" width="4" height="5" fill="#cc0000"/>
  <rect x="34" y="28" width="4" height="5" fill="#cc0000"/>
  <rect x="40" y="28" width="4" height="6" fill="#cc0000"/>
  <!-- Clawed arms -->
  <rect x="0" y="28" width="14" height="18" fill="#110011"/>
  <rect x="50" y="28" width="14" height="18" fill="#110011"/>
  <!-- Claws -->
  <rect x="0" y="44" width="3" height="8" fill="#550055"/>
  <rect x="4" y="46" width="3" height="6" fill="#550055"/>
  <rect x="8" y="44" width="3" height="8" fill="#550055"/>
  <rect x="53" y="44" width="3" height="8" fill="#550055"/>
  <rect x="57" y="46" width="3" height="6" fill="#550055"/>
  <rect x="61" y="44" width="3" height="8" fill="#550055"/>
  <!-- Legs -->
  <rect x="18" y="52" width="10" height="12" fill="#110011"/>
  <rect x="36" y="52" width="10" height="12" fill="#110011"/>
  <!-- Shadow base -->
  <rect x="8" y="62" width="48" height="2" fill="#880000" opacity="0.2"/>
</svg>
