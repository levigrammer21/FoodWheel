<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Void distortion effect around edges -->
  <rect x="0" y="20" width="6" height="24" fill="#000011" opacity="0.8"/>
  <rect x="58" y="20" width="6" height="24" fill="#000011" opacity="0.8"/>
  <rect x="10" y="2" width="44" height="6" fill="#000011" opacity="0.6"/>
  <rect x="10" y="56" width="44" height="6" fill="#000011" opacity="0.6"/>
  <!-- Body - dark with starfield void texture -->
  <rect x="14" y="18" width="36" height="36" fill="#000022"/>
  <rect x="10" y="22" width="44" height="28" fill="#000022"/>
  <rect x="16" y="14" width="32" height="8" fill="#000022"/>
  <!-- Void spots (stars visible through body) -->
  <rect x="18" y="24" width="2" height="2" fill="#4444ff"/>
  <rect x="26" y="20" width="2" height="2" fill="#8888ff"/>
  <rect x="38" y="28" width="2" height="2" fill="#4444ff"/>
  <rect x="44" y="22" width="2" height="2" fill="#aaaaff"/>
  <rect x="22" y="38" width="2" height="2" fill="#6666ff"/>
  <rect x="34" y="34" width="2" height="2" fill="#4444ff"/>
  <rect x="46" y="40" width="2" height="2" fill="#8888ff"/>
  <rect x="14" y="42" width="2" height="2" fill="#6666ff"/>
  <!-- Multiple eyes (predator) -->
  <rect x="16" y="20" width="10" height="8" fill="#0000aa"/>
  <rect x="38" y="20" width="10" height="8" fill="#0000aa"/>
  <rect x="16" y="21" width="8" height="5" fill="#0044ff"/>
  <rect x="39" y="21" width="8" height="5" fill="#0044ff"/>
  <rect x="18" y="22" width="4" height="3" fill="#00aaff"/>
  <rect x="41" y="22" width="4" height="3" fill="#00aaff"/>
  <rect x="18" y="22" width="2" height="2" fill="#ffffff"/>
  <rect x="41" y="22" width="2" height="2" fill="#ffffff"/>
  <!-- Extra eyes (creepy) -->
  <rect x="26" y="16" width="6" height="5" fill="#0000aa"/>
  <rect x="32" y="16" width="6" height="5" fill="#0000aa"/>
  <rect x="27" y="17" width="4" height="3" fill="#0044ff"/>
  <rect x="33" y="17" width="4" height="3" fill="#0044ff"/>
  <!-- Void maw -->
  <rect x="18" y="32" width="28" height="8" fill="#000000"/>
  <rect x="16" y="34" width="32" height="4" fill="#0000aa" opacity="0.4"/>
  <!-- Teeth like stars -->
  <rect x="20" y="32" width="3" height="3" fill="#4444ff"/>
  <rect x="25" y="32" width="3" height="3" fill="#4444ff"/>
  <rect x="30" y="32" width="3" height="3" fill="#6666ff"/>
  <rect x="35" y="32" width="3" height="3" fill="#4444ff"/>
  <rect x="40" y="32" width="3" height="3" fill="#4444ff"/>
  <!-- Limbs - dimensional tears -->
  <rect x="0" y="28" width="14" height="4" fill="#000022"/>
  <rect x="0" y="24" width="8" height="6" fill="#000022"/>
  <rect x="0" y="32" width="10" height="6" fill="#000022"/>
  <rect x="50" y="28" width="14" height="4" fill="#000022"/>
  <rect x="56" y="24" width="8" height="6" fill="#000022"/>
  <rect x="54" y="32" width="10" height="6" fill="#000022"/>
  <!-- Claw edges glow -->
  <rect x="0" y="22" width="4" height="4" fill="#0044ff" opacity="0.5"/>
  <rect x="0" y="32" width="4" height="4" fill="#0044ff" opacity="0.5"/>
  <rect x="60" y="22" width="4" height="4" fill="#0044ff" opacity="0.5"/>
  <rect x="60" y="32" width="4" height="4" fill="#0044ff" opacity="0.5"/>
  <!-- Legs -->
  <rect x="18" y="52" width="10" height="12" fill="#000022"/>
  <rect x="36" y="52" width="10" height="12" fill="#000022"/>
  <!-- Phase shift distortion at base -->
  <rect x="12" y="62" width="40" height="2" fill="#0044ff" opacity="0.3"/>
  <rect x="8" y="62" width="48" height="2" fill="#000044" opacity="0.5"/>
</svg>
