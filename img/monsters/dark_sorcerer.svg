<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Tall pointed hat -->
  <rect x="28" y="0" width="8" height="4" fill="#0a0020"/>
  <rect x="26" y="4" width="12" height="4" fill="#0a0020"/>
  <rect x="24" y="8" width="16" height="4" fill="#110030"/>
  <rect x="22" y="12" width="20" height="4" fill="#110030"/>
  <!-- Hat brim -->
  <rect x="12" y="14" width="40" height="4" fill="#0a0020"/>
  <!-- Stars on hat -->
  <rect x="26" y="6" width="2" height="2" fill="#8800ff"/>
  <rect x="32" y="2" width="2" height="2" fill="#aa00ff"/>
  <rect x="30" y="10" width="2" height="2" fill="#6600cc"/>
  <!-- Head pale -->
  <rect x="16" y="18" width="32" height="22" fill="#d4c4b0"/>
  <rect x="14" y="22" width="4" height="14" fill="#d4c4b0"/>
  <rect x="46" y="22" width="4" height="14" fill="#d4c4b0"/>
  <!-- Eyes glowing purple power -->
  <rect x="18" y="22" width="10" height="8" fill="#4400aa"/>
  <rect x="36" y="22" width="10" height="8" fill="#4400aa"/>
  <rect x="20" y="23" width="6" height="5" fill="#8800ff"/>
  <rect x="38" y="23" width="6" height="5" fill="#8800ff"/>
  <rect x="21" y="24" width="3" height="3" fill="#cc66ff"/>
  <rect x="39" y="24" width="3" height="3" fill="#cc66ff"/>
  <rect x="21" y="24" width="1" height="1" fill="#fff"/>
  <rect x="39" y="24" width="1" height="1" fill="#fff"/>
  <!-- Furrowed brow -->
  <rect x="18" y="20" width="12" height="3" fill="#b0a090"/>
  <rect x="34" y="20" width="12" height="3" fill="#b0a090"/>
  <!-- Nose sharp -->
  <rect x="28" y="28" width="8" height="6" fill="#c0b0a0"/>
  <rect x="30" y="32" width="4" height="4" fill="#b0a090"/>
  <!-- Cruel smile -->
  <rect x="20" y="34" width="24" height="4" fill="#6a1a1a"/>
  <rect x="22" y="34" width="4" height="3" fill="#e8e8d0"/>
  <rect x="38" y="34" width="4" height="3" fill="#e8e8d0"/>
  <!-- Beard/goatee -->
  <rect x="26" y="38" width="12" height="4" fill="#1a0030"/>
  <rect x="28" y="42" width="8" height="4" fill="#1a0030"/>
  <!-- Dark robe -->
  <rect x="12" y="40" width="40" height="22" fill="#0a0020"/>
  <rect x="8" y="44" width="48" height="14" fill="#0a0020"/>
  <!-- Robe purple trim -->
  <rect x="12" y="40" width="40" height="3" fill="#4400aa"/>
  <rect x="8" y="56" width="48" height="3" fill="#4400aa"/>
  <!-- Magic runes on robe -->
  <rect x="18" y="46" width="6" height="8" fill="#220044" opacity="0.8"/>
  <rect x="14" y="50" width="14" height="4" fill="#220044" opacity="0.8"/>
  <rect x="40" y="46" width="6" height="8" fill="#220044" opacity="0.8"/>
  <rect x="36" y="50" width="14" height="4" fill="#220044" opacity="0.8"/>
  <!-- Glowing orb in hand -->
  <rect x="0" y="42" width="12" height="12" fill="#0a0020"/>
  <rect x="0" y="40" width="12" height="8" fill="#220044"/>
  <rect x="2" y="42" width="8" height="6" fill="#8800ff" opacity="0.8"/>
  <rect x="4" y="44" width="4" height="4" fill="#cc66ff"/>
  <!-- Other hand casting -->
  <rect x="52" y="40" width="12" height="14" fill="#0a0020"/>
  <!-- Lightning from hand -->
  <rect x="60" y="30" width="4" height="12" fill="#8800ff" opacity="0.6"/>
  <rect x="58" y="28" width="6" height="4" fill="#cc66ff" opacity="0.8"/>
  <rect x="56" y="24" width="8" height="6" fill="#aa44ff" opacity="0.5"/>
  <!-- Magic particles -->
  <rect x="4" y="32" width="4" height="4" fill="#8800ff" opacity="0.4"/>
  <rect x="56" y="18" width="4" height="4" fill="#8800ff" opacity="0.4"/>
  <rect x="10" y="16" width="3" height="3" fill="#cc66ff" opacity="0.3"/>
</svg>
