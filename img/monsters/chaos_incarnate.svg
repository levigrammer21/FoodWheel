<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Chaos fills everything -->
  <rect x="0" y="0" width="64" height="64" fill="#0a0000"/>
  <!-- Swirling chaos limbs -->
  <rect x="0" y="6" width="10" height="52" fill="#1f0505"/>
  <rect x="54" y="6" width="10" height="52" fill="#1f0505"/>
  <rect x="0" y="4" width="14" height="6" fill="#ff2200" opacity="0.4"/>
  <rect x="50" y="4" width="14" height="6" fill="#ff2200" opacity="0.4"/>
  <!-- Chaos tendrils -->
  <rect x="0" y="10" width="6" height="4" fill="#ff4400" opacity="0.6"/>
  <rect x="0" y="20" width="8" height="4" fill="#ff6600" opacity="0.5"/>
  <rect x="0" y="32" width="6" height="4" fill="#ff2200" opacity="0.6"/>
  <rect x="0" y="44" width="8" height="4" fill="#ff4400" opacity="0.5"/>
  <rect x="58" y="10" width="6" height="4" fill="#ff4400" opacity="0.6"/>
  <rect x="56" y="20" width="8" height="4" fill="#ff6600" opacity="0.5"/>
  <rect x="58" y="32" width="6" height="4" fill="#ff2200" opacity="0.6"/>
  <rect x="56" y="44" width="8" height="4" fill="#ff4400" opacity="0.5"/>
  <!-- Main chaotic body -->
  <rect x="10" y="14" width="44" height="42" fill="#1f0505"/>
  <rect x="6" y="20" width="52" height="30" fill="#1f0505"/>
  <rect x="12" y="8" width="40" height="10" fill="#1f0505"/>
  <!-- Chaos energy cracks -->
  <rect x="14" y="16" width="2" height="30" fill="#ff4400" opacity="0.5"/>
  <rect x="26" y="12" width="2" height="36" fill="#ff6600" opacity="0.4"/>
  <rect x="38" y="16" width="2" height="30" fill="#ff4400" opacity="0.5"/>
  <rect x="50" y="20" width="2" height="22" fill="#ff2200" opacity="0.4"/>
  <rect x="8" y="26" width="24" height="2" fill="#ff4400" opacity="0.4"/>
  <rect x="34" y="36" width="22" height="2" fill="#ff6600" opacity="0.4"/>
  <rect x="8" y="46" width="16" height="2" fill="#ff2200" opacity="0.4"/>
  <!-- Multiple sets of eyes - chaos has many -->
  <rect x="12" y="16" width="10" height="8" fill="#660000"/>
  <rect x="14" y="17" width="6" height="5" fill="#ff2200"/>
  <rect x="15" y="18" width="3" height="3" fill="#ffff00"/>
  <rect x="15" y="18" width="1" height="1" fill="#fff"/>
  <rect x="42" y="16" width="10" height="8" fill="#660000"/>
  <rect x="44" y="17" width="6" height="5" fill="#ff2200"/>
  <rect x="45" y="18" width="3" height="3" fill="#ffff00"/>
  <rect x="45" y="18" width="1" height="1" fill="#fff"/>
  <!-- Second pair eyes -->
  <rect x="20" y="26" width="8" height="6" fill="#440000"/>
  <rect x="22" y="27" width="4" height="4" fill="#ff0000"/>
  <rect x="36" y="26" width="8" height="6" fill="#440000"/>
  <rect x="38" y="27" width="4" height="4" fill="#ff0000"/>
  <!-- Third eye center -->
  <rect x="28" y="14" width="8" height="6" fill="#880000"/>
  <rect x="30" y="15" width="4" height="4" fill="#ff4400"/>
  <rect x="31" y="16" width="2" height="2" fill="#ffcc00"/>
  <!-- Chaos maw -->
  <rect x="12" y="34" width="40" height="12" fill="#000000"/>
  <rect x="10" y="36" width="44" height="8" fill="#050000"/>
  <!-- Rows of teeth -->
  <rect x="14" y="34" width="4" height="6" fill="#ddccaa"/>
  <rect x="20" y="34" width="4" height="5" fill="#ddccaa"/>
  <rect x="26" y="34" width="4" height="6" fill="#ddccaa"/>
  <rect x="32" y="34" width="4" height="5" fill="#ddccaa"/>
  <rect x="38" y="34" width="4" height="6" fill="#ddccaa"/>
  <rect x="44" y="34" width="4" height="5" fill="#ddccaa"/>
  <rect x="14" y="44" width="4" height="4" fill="#ddccaa"/>
  <rect x="22" y="45" width="4" height="3" fill="#ddccaa"/>
  <rect x="34" y="45" width="4" height="3" fill="#ddccaa"/>
  <rect x="44" y="44" width="4" height="4" fill="#ddccaa"/>
  <!-- Chaos comet tail top -->
  <rect x="22" y="0" width="20" height="4" fill="#ff6600" opacity="0.5"/>
  <rect x="26" y="0" width="12" height="2" fill="#ffcc00" opacity="0.6"/>
  <!-- Legs of chaos -->
  <rect x="14" y="54" width="12" height="10" fill="#1f0505"/>
  <rect x="38" y="54" width="12" height="10" fill="#1f0505"/>
  <!-- Chaos ground burn -->
  <rect x="0" y="62" width="64" height="2" fill="#ff4400" opacity="0.3"/>
</svg>
