<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Ice tail -->
  <rect x="46" y="34" width="18" height="5" fill="#4488cc"/>
  <rect x="50" y="26" width="14" height="10" fill="#4488cc"/>
  <rect x="54" y="18" width="10" height="10" fill="#4488cc"/>
  <rect x="58" y="12" width="6" height="8" fill="#66aaee"/>
  <!-- Ice spikes on tail -->
  <rect x="50" y="24" width="4" height="5" fill="#aaddff"/>
  <rect x="56" y="16" width="4" height="5" fill="#aaddff"/>
  <rect x="60" y="10" width="3" height="5" fill="#aaddff"/>
  <!-- Wings ice membrane -->
  <rect x="22" y="4" width="5" height="22" fill="#2266aa"/>
  <rect x="24" y="4" width="18" height="4" fill="#2266aa"/>
  <rect x="36" y="6" width="16" height="4" fill="#2266aa"/>
  <rect x="46" y="8" width="14" height="4" fill="#2266aa"/>
  <rect x="54" y="10" width="8" height="6" fill="#2266aa"/>
  <!-- Wing ice pattern -->
  <rect x="26" y="8" width="4" height="18" fill="#88ccff" opacity="0.4"/>
  <rect x="36" y="10" width="4" height="14" fill="#88ccff" opacity="0.4"/>
  <!-- Body icy blue-white -->
  <rect x="12" y="26" width="36" height="22" fill="#5599cc"/>
  <rect x="8" y="30" width="42" height="14" fill="#5599cc"/>
  <!-- Ice scale pattern -->
  <rect x="8" y="30" width="8" height="5" fill="#3377aa"/>
  <rect x="20" y="26" width="8" height="5" fill="#3377aa"/>
  <rect x="32" y="28" width="8" height="5" fill="#3377aa"/>
  <rect x="42" y="30" width="8" height="5" fill="#3377aa"/>
  <rect x="12" y="38" width="8" height="5" fill="#3377aa"/>
  <rect x="26" y="40" width="8" height="5" fill="#3377aa"/>
  <!-- Underbelly white-silver -->
  <rect x="14" y="32" width="22" height="14" fill="#ddeeff"/>
  <!-- Head -->
  <rect x="2" y="16" width="26" height="18" fill="#5599cc"/>
  <rect x="0" y="20" width="6" height="12" fill="#5599cc"/>
  <!-- Snout -->
  <rect x="0" y="22" width="14" height="12" fill="#3377aa"/>
  <!-- Frost breath -->
  <rect x="0" y="22" width="8" height="4" fill="#aaddff"/>
  <rect x="0" y="20" width="6" height="4" fill="#ddeeff"/>
  <!-- Ice crystals from mouth -->
  <rect x="0" y="18" width="4" height="4" fill="#ffffff" opacity="0.8"/>
  <rect x="2" y="16" width="3" height="3" fill="#aaddff" opacity="0.6"/>
  <!-- Ice horns -->
  <rect x="16" y="8" width="5" height="10" fill="#aaddff"/>
  <rect x="22" y="6" width="5" height="12" fill="#aaddff"/>
  <rect x="12" y="12" width="4" height="8" fill="#88bbdd"/>
  <!-- Icicle spikes on head -->
  <rect x="17" y="6" width="2" height="4" fill="#ffffff"/>
  <rect x="23" y="4" width="2" height="4" fill="#ffffff"/>
  <!-- Eyes cold blue -->
  <rect x="8" y="18" width="10" height="8" fill="#001144"/>
  <rect x="10" y="19" width="6" height="5" fill="#0033aa"/>
  <rect x="11" y="20" width="3" height="3" fill="#66aaff"/>
  <rect x="11" y="20" width="1" height="1" fill="#ffffff"/>
  <!-- Frozen fangs -->
  <rect x="2" y="30" width="5" height="6" fill="#ddeeff"/>
  <rect x="9" y="30" width="4" height="5" fill="#ddeeff"/>
  <!-- Legs -->
  <rect x="10" y="46" width="10" height="16" fill="#3377aa"/>
  <rect x="22" y="46" width="10" height="16" fill="#3377aa"/>
  <rect x="34" y="48" width="10" height="14" fill="#3377aa"/>
  <!-- Ice claws -->
  <rect x="8" y="58" width="5" height="6" fill="#aaddff"/>
  <rect x="14" y="58" width="5" height="6" fill="#aaddff"/>
  <rect x="20" y="58" width="5" height="6" fill="#aaddff"/>
  <rect x="26" y="58" width="5" height="6" fill="#aaddff"/>
  <!-- Freeze aura -->
  <rect x="0" y="60" width="64" height="2" fill="#aaddff" opacity="0.2"/>
  <rect x="4" y="2" width="4" height="4" fill="#aaddff" opacity="0.3"/>
  <rect x="54" y="4" width="4" height="4" fill="#aaddff" opacity="0.3"/>
</svg>
