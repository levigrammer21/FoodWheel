<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Left wing -->
  <rect x="0" y="20" width="22" height="4" fill="#2a0a3a"/>
  <rect x="2" y="16" width="18" height="6" fill="#2a0a3a"/>
  <rect x="4" y="12" width="14" height="6" fill="#2a0a3a"/>
  <rect x="6" y="24" width="16" height="8" fill="#2a0a3a"/>
  <rect x="8" y="30" width="12" height="6" fill="#2a0a3a"/>
  <!-- Wing membrane left -->
  <rect x="2" y="18" width="20" height="2" fill="#3d1550" opacity="0.7"/>
  <rect x="4" y="22" width="18" height="2" fill="#3d1550" opacity="0.7"/>
  <rect x="6" y="26" width="14" height="2" fill="#3d1550" opacity="0.7"/>
  <!-- Right wing -->
  <rect x="42" y="20" width="22" height="4" fill="#2a0a3a"/>
  <rect x="44" y="16" width="18" height="6" fill="#2a0a3a"/>
  <rect x="46" y="12" width="14" height="6" fill="#2a0a3a"/>
  <rect x="40" y="24" width="16" height="8" fill="#2a0a3a"/>
  <rect x="44" y="30" width="12" height="6" fill="#2a0a3a"/>
  <!-- Wing membrane right -->
  <rect x="42" y="18" width="20" height="2" fill="#3d1550" opacity="0.7"/>
  <rect x="40" y="22" width="18" height="2" fill="#3d1550" opacity="0.7"/>
  <rect x="44" y="26" width="14" height="2" fill="#3d1550" opacity="0.7"/>
  <!-- Body -->
  <rect x="20" y="22" width="24" height="26" fill="#1a0828"/>
  <rect x="18" y="26" width="28" height="18" fill="#1a0828"/>
  <!-- Belly -->
  <rect x="22" y="30" width="20" height="14" fill="#2d1040"/>
  <!-- Head -->
  <rect x="22" y="14" width="20" height="14" fill="#1a0828"/>
  <rect x="20" y="18" width="4" height="8" fill="#1a0828"/>
  <rect x="40" y="18" width="4" height="8" fill="#1a0828"/>
  <!-- Ears -->
  <rect x="22" y="6" width="6" height="10" fill="#2a0a3a"/>
  <rect x="36" y="6" width="6" height="10" fill="#2a0a3a"/>
  <rect x="23" y="8" width="4" height="6" fill="#8b0050"/>
  <rect x="37" y="8" width="4" height="6" fill="#8b0050"/>
  <!-- Eyes red -->
  <rect x="22" y="18" width="8" height="6" fill="#cc0000"/>
  <rect x="34" y="18" width="8" height="6" fill="#cc0000"/>
  <rect x="24" y="19" width="4" height="4" fill="#ff3030"/>
  <rect x="36" y="19" width="4" height="4" fill="#ff3030"/>
  <rect x="24" y="19" width="2" height="2" fill="#fff"/>
  <rect x="36" y="19" width="2" height="2" fill="#fff"/>
  <!-- Snout/fangs -->
  <rect x="26" y="24" width="12" height="4" fill="#0d0016"/>
  <rect x="28" y="22" width="3" height="6" fill="#e8e8d0"/>
  <rect x="33" y="22" width="3" height="6" fill="#e8e8d0"/>
  <!-- Feet/claws hanging -->
  <rect x="26" y="48" width="4" height="8" fill="#1a0828"/>
  <rect x="34" y="48" width="4" height="8" fill="#1a0828"/>
  <rect x="24" y="54" width="3" height="4" fill="#555"/>
  <rect x="28" y="55" width="3" height="3" fill="#555"/>
  <rect x="32" y="54" width="3" height="4" fill="#555"/>
  <rect x="36" y="55" width="3" height="3" fill="#555"/>
</svg>
