<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Divine halo cracked -->
  <rect x="16" y="0" width="32" height="4" fill="#d4a000" opacity="0.8"/>
  <rect x="12" y="2" width="8" height="4" fill="#d4a000" opacity="0.6"/>
  <rect x="44" y="2" width="8" height="4" fill="#d4a000" opacity="0.6"/>
  <rect x="14" y="0" width="4" height="6" fill="#888" opacity="0.5"/>
  <rect x="46" y="0" width="4" height="6" fill="#888" opacity="0.5"/>
  <!-- Cracks in halo -->
  <rect x="28" y="0" width="2" height="4" fill="#555" opacity="0.7"/>
  <rect x="38" y="0" width="2" height="4" fill="#555" opacity="0.7"/>
  <!-- Massive body - divine marble cracked -->
  <rect x="8" y="22" width="48" height="34" fill="#c8c0d8"/>
  <rect x="4" y="28" width="56" height="24" fill="#c8c0d8"/>
  <!-- Cracks in divine body -->
  <rect x="16" y="22" width="2" height="28" fill="#6644aa" opacity="0.5"/>
  <rect x="34" y="26" width="2" height="24" fill="#6644aa" opacity="0.5"/>
  <rect x="48" y="28" width="2" height="20" fill="#6644aa" opacity="0.5"/>
  <rect x="8" y="36" width="20" height="2" fill="#6644aa" opacity="0.4"/>
  <rect x="38" y="42" width="16" height="2" fill="#6644aa" opacity="0.4"/>
  <!-- Divine light from cracks -->
  <rect x="17" y="24" width="2" height="24" fill="#ffcc00" opacity="0.3"/>
  <rect x="35" y="28" width="2" height="20" fill="#ffcc00" opacity="0.3"/>
  <!-- Head godlike -->
  <rect x="14" y="4" width="36" height="22" fill="#d4cce4"/>
  <rect x="10" y="8" width="8" height="14" fill="#d4cce4"/>
  <rect x="46" y="8" width="8" height="14" fill="#d4cce4"/>
  <!-- Divine crown broken -->
  <rect x="14" y="2" width="36" height="4" fill="#d4a000"/>
  <rect x="16" y="0" width="6" height="4" fill="#d4a000"/>
  <rect x="26" y="0" width="6" height="6" fill="#d4a000"/>
  <rect x="36" y="0" width="6" height="4" fill="#d4a000"/>
  <rect x="44" y="0" width="4" height="4" fill="#d4a000"/>
  <!-- Crown gems -->
  <rect x="17" y="0" width="3" height="2" fill="#ff0000"/>
  <rect x="27" y="0" width="3" height="3" fill="#0044ff"/>
  <rect x="37" y="0" width="3" height="2" fill="#00aa00"/>
  <!-- Eyes divine but corrupted -->
  <rect x="14" y="10" width="14" height="10" fill="#aa8800"/>
  <rect x="36" y="10" width="14" height="10" fill="#aa8800"/>
  <rect x="16" y="11" width="10" height="7" fill="#ffcc00"/>
  <rect x="38" y="11" width="10" height="7" fill="#ffcc00"/>
  <rect x="18" y="12" width="5" height="4" fill="#fff8cc"/>
  <rect x="40" y="12" width="5" height="4" fill="#fff8cc"/>
  <rect x="19" y="13" width="2" height="2" fill="#330000"/>
  <rect x="41" y="13" width="2" height="2" fill="#330000"/>
  <!-- Stern divine mouth -->
  <rect x="20" y="22" width="24" height="4" fill="#998888"/>
  <rect x="22" y="22" width="4" height="3" fill="#e0d8f0"/>
  <rect x="38" y="22" width="4" height="3" fill="#e0d8f0"/>
  <!-- Massive arms -->
  <rect x="0" y="26" width="10" height="28" fill="#b8b0c8"/>
  <rect x="54" y="26" width="10" height="28" fill="#b8b0c8"/>
  <!-- Divine fists -->
  <rect x="0" y="48" width="14" height="14" fill="#a8a0b8"/>
  <rect x="50" y="48" width="14" height="14" fill="#a8a0b8"/>
  <!-- Light from fists -->
  <rect x="2" y="46" width="10" height="4" fill="#ffcc00" opacity="0.3"/>
  <rect x="52" y="46" width="10" height="4" fill="#ffcc00" opacity="0.3"/>
  <!-- Legs -->
  <rect x="14" y="56" width="14" height="8" fill="#b8b0c8"/>
  <rect x="36" y="56" width="14" height="8" fill="#b8b0c8"/>
  <!-- Divine light base -->
  <rect x="4" y="62" width="56" height="2" fill="#ffcc00" opacity="0.2"/>
  <!-- Stars around body -->
  <rect x="2" y="14" width="3" height="3" fill="#ffcc00" opacity="0.5"/>
  <rect x="58" y="10" width="3" height="3" fill="#ffcc00" opacity="0.5"/>
  <rect x="0" y="44" width="3" height="3" fill="#ffcc00" opacity="0.4"/>
  <rect x="61" y="40" width="3" height="3" fill="#ffcc00" opacity="0.4"/>
</svg>
