<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MicroMMO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#0f1218;--bg3:#151a22;--surface:#1a2030;--surface2:#1f2838;
  --border:#2a3448;--border2:#3d4f6e;
  --gold:#c9943a;--gold2:#e8b84d;--gold3:#fff0b3;
  --steel:#4a9eda;--steel2:#6ab8f0;
  --crimson:#b03030;--crimson2:#e04040;
  --green:#2ecc71;--green2:#27ae60;
  --text:#dce8f5;--text2:#8fa8c8;--text3:#4a6080;
  --common:#9ca3af;--uncommon:#34d399;--rare:#60a5fa;--epic:#c084fc;--legendary:#fbbf24;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--text);display:flex;justify-content:center}

/* ── APP SHELL ── */
#app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;background:var(--bg2);position:relative;overflow:hidden}
#app::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 0%,rgba(74,158,218,0.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(201,148,58,0.05) 0%,transparent 50%);
  pointer-events:none;z-index:0}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;position:relative;z-index:1}
.screen.active{display:flex}

/* ── AUTH ── */
#auth-screen{align-items:center;justify-content:center;padding:1.5rem;
  background:linear-gradient(160deg,#080c14 0%,#0f1a2e 50%,#080e14 100%);gap:1.5rem}
#auth-screen::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 30%,rgba(74,158,218,0.12) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 70%,rgba(201,148,58,0.08) 0%,transparent 60%);
  pointer-events:none}

.auth-logo{text-align:center;position:relative;z-index:1}
.auth-logo-text{font-family:'Cinzel',serif;font-size:3rem;font-weight:900;
  background:linear-gradient(135deg,var(--steel),var(--gold2),var(--steel2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:0.08em;line-height:1;margin-bottom:0.3rem}
.auth-logo-sub{color:var(--text3);font-style:italic;font-size:0.95rem;letter-spacing:0.15em;text-transform:uppercase}

.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:1.5rem;width:100%;max-width:340px;position:relative;z-index:1;
  box-shadow:0 30px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05)}

.tab-row{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:1.25rem;gap:3px}
.tab-btn{flex:1;padding:0.5rem;border:none;border-radius:6px;background:transparent;
  color:var(--text3);font-family:'Cinzel',serif;font-size:0.75rem;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.05em}
.tab-btn.active{background:var(--steel);color:white;box-shadow:0 2px 10px rgba(74,158,218,0.4)}

.form-group{margin-bottom:0.85rem}
.form-label{display:block;font-size:0.72rem;color:var(--text3);margin-bottom:0.3rem;
  font-family:'Cinzel',serif;letter-spacing:0.08em;text-transform:uppercase}
.form-input{width:100%;padding:0.7rem 0.9rem;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Crimson Pro',serif;font-size:1rem;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--steel)}

.btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;
  width:100%;padding:0.8rem;border:none;border-radius:10px;
  font-family:'Cinzel',serif;font-size:0.82rem;font-weight:600;
  cursor:pointer;transition:all 0.18s;letter-spacing:0.06em}
.btn:active{transform:scale(0.96)}
.btn:disabled{opacity:0.45;cursor:not-allowed;transform:none!important}

.btn-steel{background:linear-gradient(135deg,#2a6090,var(--steel));color:white;
  box-shadow:0 4px 16px rgba(74,158,218,0.3);margin-bottom:0.6rem}
.btn-steel:hover:not(:disabled){box-shadow:0 6px 22px rgba(74,158,218,0.5);transform:translateY(-1px)}

.btn-gold{background:linear-gradient(135deg,#6b4a10,var(--gold));color:#1a0f00;
  box-shadow:0 4px 16px rgba(201,148,58,0.3);margin-bottom:0.6rem}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 22px rgba(201,148,58,0.5);transform:translateY(-1px)}

.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);margin-bottom:0.6rem}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:linear-gradient(135deg,#5a1010,var(--crimson));color:white;margin-bottom:0.6rem}

.divider{display:flex;align-items:center;gap:0.75rem;margin:0.75rem 0;color:var(--text3);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.error-box{background:rgba(176,48,48,0.2);border:1px solid var(--crimson);
  border-radius:8px;padding:0.6rem;font-size:0.82rem;color:var(--crimson2);
  text-align:center;margin-bottom:0.75rem}

/* ── HEADER ── */
#header{background:var(--bg3);border-bottom:1px solid var(--border);
  padding:0.6rem 1rem;display:flex;align-items:center;gap:0.75rem;
  flex-shrink:0;position:relative;z-index:10}
.hdr-logo{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;
  background:linear-gradient(135deg,var(--steel),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.hdr-level{font-family:'Cinzel',serif;font-size:0.78rem;color:var(--gold2);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;padding:0.2rem 0.5rem}
.hdr-avatar{width:34px;height:34px;background:var(--surface2);
  border:2px solid var(--border2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}

/* ── CONTENT AREA ── */
#content{flex:1;overflow-y:auto;padding:0.85rem;padding-bottom:0.5rem;position:relative;z-index:1}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── BOTTOM NAV ── */
#nav{background:var(--bg3);border-top:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;position:relative;z-index:10;
  padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:0.55rem 0.25rem;border:none;background:transparent;
  color:var(--text3);font-family:'Cinzel',serif;font-size:0.55rem;
  cursor:pointer;gap:0.15rem;transition:color 0.2s;letter-spacing:0.05em}
.nav-btn.active{color:var(--gold2)}
.nav-btn-icon{font-size:1.2rem;line-height:1}
.nav-center{display:flex;flex-direction:column;align-items:center;flex:1}
.nav-walk{width:54px;height:54px;background:linear-gradient(135deg,#1a4a70,var(--steel));
  border-radius:50%;border:3px solid var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  cursor:pointer;margin-top:-18px;
  box-shadow:0 4px 20px rgba(74,158,218,0.5);transition:all 0.18s;color:white}
.nav-walk:active{transform:scale(0.9)}
.nav-walk.no-energy{background:linear-gradient(135deg,#1a1a2e,#2a2a40);
  box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:not-allowed}
@keyframes walkPulse{0%,100%{box-shadow:0 4px 20px rgba(74,158,218,0.5)}
  50%{box-shadow:0 4px 30px rgba(74,158,218,0.9),0 0 50px rgba(74,158,218,0.2)}}
.nav-walk:not(.no-energy){animation:walkPulse 2.5s ease-in-out infinite}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:0.9rem;margin-bottom:0.7rem}
.card-title{font-family:'Cinzel',serif;font-size:0.68rem;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:0.7rem;
  display:flex;align-items:center;gap:0.4rem}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── PLAYER BANNER ── */
.player-banner{background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:12px;padding:0.9rem;
  margin-bottom:0.7rem;display:flex;gap:0.9rem;align-items:center;
  position:relative;overflow:hidden}
.player-banner::before{content:'';position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;background:radial-gradient(circle,rgba(74,158,218,0.1),transparent);
  pointer-events:none}
.p-avatar{width:58px;height:58px;background:var(--bg3);border:2px solid var(--border2);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:2rem;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;
  color:var(--gold2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-class{font-size:0.78rem;color:var(--text3);margin-bottom:0.4rem}

/* ── BARS ── */
.bar-wrap{margin-bottom:0.35rem}
.bar-labels{display:flex;justify-content:space-between;font-size:0.72rem;
  color:var(--text3);margin-bottom:0.18rem}
.bar{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.bar-hp .bar-fill{background:linear-gradient(90deg,#7a1515,var(--crimson2))}
.bar-exp .bar-fill{background:linear-gradient(90deg,#1a5a90,var(--steel2))}
.bar-energy .bar-fill{background:linear-gradient(90deg,#7a4a10,var(--gold))}

/* ── STAT BADGES ── */
.stat-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem}
.stat-badge{background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;padding:0.35rem 0.6rem;font-size:0.78rem;
  display:flex;align-items:center;gap:0.25rem}
.stat-badge em{color:var(--text3);font-style:normal}
.stat-badge strong{color:var(--gold2)}

/* ── CURRENCY ── */
.curr-row{display:flex;gap:0.5rem}
.curr-item{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:0.55rem;text-align:center}
.curr-amount{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold2);font-weight:600}
.curr-label{font-size:0.65rem;color:var(--text3);margin-top:0.1rem}

/* ── FEED ── */
.feed-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-style:italic;font-size:0.9rem}
.feed-item{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:0.7rem 0.9rem;display:flex;
  align-items:center;gap:0.75rem;margin-bottom:0.5rem}
@keyframes feedIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.feed-item{animation:feedIn 0.25s ease}
.feed-icon{font-size:1.4rem;flex-shrink:0}
.feed-text{flex:1;font-size:0.88rem;color:var(--text2);line-height:1.3}
.feed-text strong{color:var(--text)}
.feed-badge{font-size:0.75rem;font-family:'Cinzel',serif;padding:0.2rem 0.5rem;
  border-radius:5px;background:var(--surface2);white-space:nowrap}

/* ── ENERGY TIMER ── */
.energy-timer{font-size:0.75rem;color:var(--text3);text-align:right;margin-top:0.2rem}

/* ── INVENTORY ── */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:0.7rem}
.equip-slot{background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:0.6rem;display:flex;align-items:center;gap:0.5rem;
  cursor:pointer;transition:border-color 0.2s;min-height:52px}
.equip-slot:hover{border-color:var(--border2)}
.equip-slot.filled{border-color:var(--border2)}
.es-icon{font-size:1.2rem;flex-shrink:0;width:24px;text-align:center}
.es-info{flex:1;min-width:0}
.es-name{font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.es-stat{font-size:0.65rem;color:var(--text3)}
.es-empty{font-size:0.72rem;color:var(--text3);font-style:italic}
.es-type{font-size:0.6rem;color:var(--text3);flex-shrink:0}

.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.45rem}
.inv-item{background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:0.6rem;text-align:center;cursor:pointer;
  transition:all 0.18s;position:relative}
.inv-item:hover{border-color:var(--border2);transform:translateY(-1px)}
.inv-item-icon{font-size:1.6rem;display:block;margin-bottom:0.2rem}
.inv-item-name{font-size:0.68rem;font-weight:600;line-height:1.2;margin-bottom:0.1rem}
.inv-item-stat{font-size:0.62rem;color:var(--text3)}
.inv-empty{text-align:center;padding:2rem;color:var(--text3);font-style:italic;font-size:0.88rem}

.section-hdr{font-family:'Cinzel',serif;font-size:0.65rem;text-transform:uppercase;
  letter-spacing:0.15em;color:var(--text3);margin:0.85rem 0 0.5rem;
  display:flex;align-items:center;gap:0.5rem}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0;
  border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Cinzel',serif;font-size:0.82rem;font-weight:700;
  width:22px;text-align:center;color:var(--text3)}
.lb-rank.r1{color:#f59e0b}.lb-rank.r2{color:#94a3b8}.lb-rank.r3{color:#cd7f32}
.lb-ava{font-size:1.2rem}
.lb-name{flex:1;font-size:0.88rem}
.lb-val{font-family:'Cinzel',serif;font-size:0.82rem;color:var(--gold2)}
.lb-you{font-size:0.65rem;color:var(--text3)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;z-index:200;
  padding:1rem;backdrop-filter:blur(6px)}
.modal{background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:1.4rem;width:100%;max-width:340px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.05)}
@keyframes modalIn{from{opacity:0;transform:scale(0.88) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}}
.modal{animation:modalIn 0.22s ease}
.modal-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;
  color:var(--gold2);text-align:center;margin-bottom:1rem}
.modal-icon{font-size:3rem;text-align:center;display:block;margin-bottom:0.4rem}
.modal-rarity{font-family:'Cinzel',serif;font-size:0.72rem;text-transform:uppercase;
  letter-spacing:0.1em;text-align:center;margin-bottom:1rem}
.modal-row{display:flex;justify-content:space-between;padding:0.4rem 0;
  border-bottom:1px solid var(--border);font-size:0.88rem}
.modal-row:last-of-type{border-bottom:none}
.modal-row em{color:var(--text3);font-style:normal}
.modal-actions{margin-top:1rem;display:flex;flex-direction:column;gap:0.4rem}

/* ── COMBAT ── */
.combat-scene{background:linear-gradient(180deg,#0a1a2e 0%,#0f2040 40%,var(--bg3) 100%);
  border:1px solid var(--border2);border-radius:12px;padding:1.1rem;
  margin-bottom:0.7rem;text-align:center;position:relative;overflow:hidden}
.combat-scene::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30%;
  background:linear-gradient(0deg,rgba(255,255,255,0.02),transparent);pointer-events:none}
.fighters{display:flex;align-items:flex-end;justify-content:space-around;margin-bottom:0.75rem}
.fighter{display:flex;flex-direction:column;align-items:center;gap:0.2rem;min-width:85px}
.f-emoji{font-size:2.8rem;line-height:1}
.f-name{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--text2);text-align:center}
.f-hp{font-size:0.82rem;color:var(--text);font-weight:600}
.f-bar{width:70px;height:5px;background:rgba(0,0,0,0.4);border-radius:3px;overflow:hidden}
.f-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--crimson),var(--crimson2));transition:width 0.4s}
.vs{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;
  color:var(--crimson2);text-shadow:0 0 20px rgba(224,64,64,0.6);margin-bottom:1rem}
.combat-log{background:rgba(0,0,0,0.4);border:1px solid var(--border);
  border-radius:8px;padding:0.7rem;font-size:0.8rem;color:var(--text2);
  min-height:70px;max-height:110px;overflow-y:auto;line-height:1.7;margin-bottom:0.7rem;text-align:left}
.combat-log::-webkit-scrollbar{width:2px}
.log-hit{color:var(--crimson2)}.log-crit{color:var(--gold2);font-weight:600}
.log-you{color:var(--steel2)}.log-win{color:var(--green);font-weight:600}
.log-lose{color:var(--crimson2);font-weight:600}.log-sys{color:var(--text3)}

/* ── MONSTER MODAL ── */
.monster-card{text-align:center;margin-bottom:1rem}
.monster-emoji{font-size:3.5rem;display:block;margin-bottom:0.3rem}
.monster-desc{font-style:italic;color:var(--text3);font-size:0.85rem;margin-bottom:0.75rem}
.monster-stats{display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap}
.m-stat{background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:0.3rem 0.65rem;font-size:0.8rem}

/* ── TOAST ── */
#toast-container{position:fixed;top:65px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;flex-direction:column;gap:0.4rem;
  pointer-events:none;width:90%;max-width:400px}
.toast{background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:0.65rem 1rem;font-size:0.88rem;
  text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.toast{animation:toastIn 0.25s ease}
.toast.dying{animation:toastOut 0.25s ease forwards}

/* ── PROFILE (YOU TAB) ── */
.profile-hero{background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:12px;padding:1.2rem;
  text-align:center;margin-bottom:0.7rem}
.profile-ava{font-size:4rem;display:block;margin-bottom:0.5rem}
.profile-name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold2);font-weight:700}
.profile-level{color:var(--text3);font-size:0.88rem;margin-bottom:0.75rem}
.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem}
.ps-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.5rem;text-align:center}
.ps-val{font-family:'Cinzel',serif;font-size:1rem;color:var(--steel2);font-weight:600}
.ps-key{font-size:0.65rem;color:var(--text3);margin-top:0.1rem}
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">

  <!-- ── AUTH SCREEN ── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-logo">
      <div class="auth-logo-text">⚔ MicroMMO</div>
      <div class="auth-logo-sub">Battle · Explore · Conquer</div>
    </div>
    <div class="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
        <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Register</button>
      </div>
      <div id="auth-error" class="error-box" style="display:none"></div>
      <div id="reg-username-group" class="form-group" style="display:none">
        <label class="form-label">Hero Name</label>
        <input class="form-input" id="reg-username" placeholder="Your legend name" maxlength="20"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="auth-email" type="email" placeholder="hero@realm.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="auth-password" type="password" placeholder="••••••••"/>
      </div>

// ── FIREBASE CONFIG ──────────────────────────────────────────

// ── STATE ────────────────────────────────────────────────────
let currentUser = null;
let player = null;
let currentTab = "home";
let feed = [];
let combatState = null;
let combatInterval = null;
let energyInterval = null;

// ── HELPERS ─────────────────────────────────────────────────
const rand = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+"M":n>=1000?(n/1000).toFixed(1)+"K":String(Math.floor(n||0));
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

function expForLevel(lv){ return Math.floor(100*Math.pow(1.5,lv-1)); }
function calcMaxHp(lv,def){ return 100+lv*10+def*2; }
function equipStats(eq){
  let str=0,def=0;
  Object.values(eq||{}).forEach(it=>{ if(!it)return; if(it.stat==="str")str+=it.val; else def+=it.val; });
  return {str,def};
}

function newPlayer(username){
  return {username,level:1,exp:0,gold:100,bank:0,diamonds:10,
    hp:110,maxHp:110,baseStr:10,baseDef:5,
    energy:5,lastEnergyTime:Date.now(),
    steps:0,npcKills:0,pvpKills:0,
    inventory:[],equipped:{},createdAt:Date.now()};
}

// ── FIREBASE HELPERS ─────────────────────────────────────────
async function loadPlayer(uid){
  const snap = await getDoc(doc(db,"players",uid));
  return snap.exists() ? snap.data() : null;
}
async function savePlayer(){
  if(!currentUser||!player) return;
  await setDoc(doc(db,"players",currentUser.uid),player);
}
async function loadLeaderboard(){
  const snap = await getDocs(collection(db,"players"));
  return snap.docs.map(d=>d.data()).filter(p=>p&&p.username);
}

// ── AUTH STATE ───────────────────────────────────────────────
onAuthStateChanged(auth, async u => {
  currentUser = u;
  if(u){
    player = await loadPlayer(u.uid);
    if(!player){ showScreen("username-screen"); }
    else { startGame(); }
  } else {
    showScreen("auth-screen");
  }
});

// ── AUTH HANDLERS ────────────────────────────────────────────
window.switchAuthTab = function(t){
  document.getElementById("tab-login").classList.toggle("active",t==="login");
  document.getElementById("tab-register").classList.toggle("active",t==="register");
  document.getElementById("reg-username-group").style.display = t==="register"?"block":"none";
  document.getElementById("auth-submit-btn").textContent = t==="login"?"Enter the Realm":"Begin Journey";
  hideAuthError();
};

window.handleEmailAuth = async function(){
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const isLogin = document.getElementById("tab-login").classList.contains("active");
  hideAuthError();
  if(!email||!password){ showAuthError("Please fill all fields"); return; }
  try{
    if(isLogin){
      await signInWithEmailAndPassword(auth,email,password);
    } else {
      const username = document.getElementById("reg-username").value.trim();
      if(!username){ showAuthError("Hero name required"); return; }
      const cred = await createUserWithEmailAndPassword(auth,email,password);
      player = newPlayer(username);
      await setDoc(doc(db,"players",cred.user.uid),player);
      startGame();
    }
  } catch(e){ showAuthError(e.message||"Authentication failed"); }
};

window.handleGoogleAuth = async function(){
  try{
    const cred = await signInWithPopup(auth,googleProvider);
    const existing = await loadPlayer(cred.user.uid);
    if(!existing){ showScreen("username-screen"); }
    else { player = existing; startGame(); }
  } catch(e){ showAuthError("Google sign-in failed"); }
};

window.handleSetUsername = async function(){
  const name = document.getElementById("new-username").value.trim();
  if(!name||!currentUser) return;
  player = newPlayer(name);
  await setDoc(doc(db,"players",currentUser.uid),player);
  startGame();
};

function showAuthError(msg){
  const el = document.getElementById("auth-error");
  el.textContent=msg; el.style.display="block";
}
function hideAuthError(){ document.getElementById("auth-error").style.display="none"; }

// ── GAME START ───────────────────────────────────────────────
function startGame(){
  showScreen("game-screen");
  regenCheck();
  energyInterval = setInterval(regenCheck, 15000);
  showTab("home");
}

function regenCheck(){
  if(!player) return;
  if(player.energy >= MAX_ENERGY) return;
  const elapsed = Date.now() - (player.lastEnergyTime||Date.now());
  const pts = Math.floor(elapsed/ENERGY_REGEN_MS);
  if(pts > 0){
    player.energy = clamp(player.energy+pts, 0, MAX_ENERGY);
    player.lastEnergyTime = Date.now();
    savePlayer();
    if(currentTab==="home") renderHome();
    updateWalkBtn();
  }
}

function updateWalkBtn(){
  const btn = document.getElementById("nav-walk");
  if(!btn) return;
  btn.classList.toggle("no-energy", !player || player.energy < 1);
}

// ── SCREENS ─────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── TABS ─────────────────────────────────────────────────────
window.showTab = function(tab){
  currentTab = tab;
  ["home","gear","walk","social","you"].forEach(t=>{
    const btn = document.getElementById("nav-"+t)||document.getElementById("nav-"+t+"-tab");
    if(btn) btn.classList.remove("active");
  });
  const active = document.getElementById("nav-"+tab)||document.getElementById("nav-"+tab+"-tab");
  if(active) active.classList.add("active");

  const c = document.getElementById("content");
  if(tab==="home") renderHome();
  else if(tab==="gear") renderGear();
  else if(tab==="walk") renderWalk();
  else if(tab==="social") renderSocial();
  else if(tab==="you") renderYou();
};

// ── RENDER HOME ──────────────────────────────────────────────
function renderHome(){
  if(!player) return;
  const {str:eStr,def:eDef} = equipStats(player.equipped);
  const tStr = (player.baseStr||10)+eStr, tDef = (player.baseDef||5)+eDef;

  const expPct = clamp(Math.round((player.exp/expNeed)*100),0,100);
  const hpPct = clamp(Math.round((player.hp/player.maxHp)*100),0,100);
  const enPct = Math.round((player.energy/MAX_ENERGY)*100);

  // energy timer
  const elapsed = Date.now()-(player.lastEnergyTime||Date.now());
  const timeLeft = Math.max(0, ENERGY_REGEN_MS-(elapsed%ENERGY_REGEN_MS));
  const m=Math.floor(timeLeft/60000), s=Math.floor((timeLeft%60000)/1000);
  const timerStr = player.energy>=MAX_ENERGY ? "Full" : `${m}:${s.toString().padStart(2,"0")}`;

  document.getElementById("hdr-level").textContent = `Lv.${player.level}`;
  updateWalkBtn();

  document.getElementById("content").innerHTML = `
    <div class="player-banner">
      <div class="p-avatar">🧙</div>
      <div class="p-info">
        <div class="p-name">${player.username}</div>
        <div class="p-class">Level ${player.level} Adventurer</div>
        <div class="bar-wrap">
          <div class="bar-labels"><span>❤️ HP</span><span>${player.hp}/${player.maxHp}</span></div>
          <div class="bar bar-hp"><div class="bar-fill" style="width:${hpPct}%"></div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-labels"><span>✨ EXP</span><span>${fmt(player.exp)}/${fmt(expNeed)}</span></div>
          <div class="bar bar-exp"><div class="bar-fill" style="width:${expPct}%"></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ Energy</div>
      <div class="bar-wrap">
        <div class="bar-labels"><span>${player.energy}/${MAX_ENERGY} EP</span><span>${timerStr}</span></div>
        <div class="bar bar-energy"><div class="bar-fill" style="width:${enPct}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💰 Currencies</div>
      <div class="curr-row">
        <div class="curr-item"><div class="curr-amount">🪙 ${fmt(player.gold)}</div><div class="curr-label">Gold</div></div>
        <div class="curr-item"><div class="curr-amount">🏦 ${fmt(player.bank)}</div><div class="curr-label">Bank</div></div>
        <div class="curr-item"><div class="curr-amount">💎 ${player.diamonds}</div><div class="curr-label">Gems</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 Combat Stats</div>
      <div class="stat-row">
        <div class="stat-badge"><em>⚔️ STR</em> <strong>${tStr}</strong></div>
        <div class="stat-badge"><em>🛡️ DEF</em> <strong>${tDef}</strong></div>
        <div class="stat-badge"><em>💀 Kills</em> <strong>${player.npcKills||0}</strong></div>
        <div class="stat-badge"><em>👣 Steps</em> <strong>${fmt(player.steps||0)}</strong></div>
      </div>
    </div>
  `;
}

// ── RENDER WALK ──────────────────────────────────────────────
function renderWalk(){
  const enPct = Math.round((player.energy/MAX_ENERGY)*100);
  let feedHtml = feed.length===0
    ? `<div class="feed-empty">Tap ⚔️ to begin your adventure...</div>`
    : feed.map(f=>`
        <div class="feed-item">
          <div class="feed-icon">${f.icon}</div>
          <div class="feed-text">${f.text}</div>
          <div class="feed-badge" style="color:${f.color}">${f.badge}</div>

  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="card-title">⚡ Energy ${player.energy}/${MAX_ENERGY}</div>

}

// ── RENDER GEAR ──────────────────────────────────────────────
function renderGear(){
  const inv = player.inventory||[];
  const eq = player.equipped||{};

  const slotsHtml = EQUIP_SLOTS.map(slot=>{
    const item = eq[slot];
    return `<div class="equip-slot ${item?'filled':''}" onclick="${item?`openItemModal('equipped','${slot}')`:''}">
      <div class="es-icon">${item?item.emoji:SLOT_EMOJI[slot]}</div>
      <div class="es-info">
        ${item
          ? `<div class="es-name" style="color:${RARITY_COLOR[item.rarity]}">${item.name}</div>
             <div class="es-stat">+${item.val} ${item.stat==="str"?"STR":"DEF"}</div>`
          : `<div class="es-empty">Empty</div>`}

  const invHtml = inv.length===0
    ? `<div class="inv-empty">No items yet — go explore!</div>`

        <div class="inv-item" onclick="openItemModal('inv',${i})">

// ── RENDER SOCIAL ────────────────────────────────────────────
async function renderSocial(){
  document.getElementById("content").innerHTML = `<div class="card"><div style="text-align:center;color:var(--text3);padding:1rem">Loading heroes...</div></div>`;
  const all = await loadLeaderboard();
  const byLevel = [...all].sort((a,b)=>b.level-a.level||(b.exp||0)-(a.exp||0)).slice(0,10);
  const byKills = [...all].sort((a,b)=>(b.npcKills||0)-(a.npcKills||0)).slice(0,10);

  const lbRow = (p,i,val) => {
    const rc = i===0?"r1":i===1?"r2":i===2?"r3":"";
    const tag = i===0?"👑":i+1;
    const you = p.username===player.username?`<span class="lb-you">(you)</span>`:"";
    return `<div class="lb-row">
      <div class="lb-rank ${rc}">${tag}</div>
      <div class="lb-ava">🧙</div>
      <div class="lb-name">${p.username} ${you}</div>
      <div class="lb-val">${val}</div>

  };

  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="card-title">🏆 Level Rankings</div>
      ${byLevel.length===0?"<div style='text-align:center;color:var(--text3);font-style:italic;padding:0.5rem'>No other heroes yet!</div>":byLevel.map((p,i)=>lbRow(p,i,`Lv.${p.level}`)).join("")}

      <div class="card-title">💀 Kill Rankings</div>
      ${byKills.length===0?"<div style='text-align:center;color:var(--text3);font-style:italic;padding:0.5rem'>No kills recorded yet!</div>":byKills.map((p,i)=>lbRow(p,i,`${p.npcKills||0} kills`)).join("")}

    <div class="card">

      <button class="btn btn-ghost" onclick="handleSignOut()">Sign Out</button>

}

// ── RENDER YOU ───────────────────────────────────────────────
function renderYou(){

    <div class="profile-hero">

window.handleSignOut = async function(){
  clearInterval(energyInterval);
  await signOut(auth);
};

// ── WALK / STEP ──────────────────────────────────────────────
window.takeStep = function(){
  if(!player || player.energy < 1){ toast("⚡ No energy! Wait for regen."); return; }
  if(combatState){ toast("⚔️ Finish your current battle first!"); return; }

  player.energy--;
  player.steps = (player.steps||0)+1;
  player.lastEnergyTime = player.energy < MAX_ENERGY ? (player.lastEnergyTime||Date.now()) : Date.now();
  updateWalkBtn();

  const roll = Math.random();
  if(roll < 0.38){
    // Monster encounter
    const monster = spawnMonster();
    addFeed("⚔️",`Encountered <strong>${monster.name}</strong>!`,"Fight!","var(--crimson2)");
    savePlayer();
    showTab("walk");
    setTimeout(()=>openCombatModal(monster), 300);
  } else if(roll < 0.65){
    // Gold
    const g = rand(5, 25+player.level*2);
    player.gold = (player.gold||0)+g;
    addFeed("🪙","Found gold on the path!",`+${g} gold`,"var(--gold2)");
    savePlayer();
    showTab("walk");
  } else if(roll < 0.80){
    // Item
    const item = spawnItem();
    player.inventory = [...(player.inventory||[]), item];
    addFeed(item.emoji,`Found a <strong>${item.name}</strong>!`,item.rarity,RARITY_COLOR[item.rarity]);
    toast(`${item.emoji} Found ${item.name}! (${item.rarity})`);
    savePlayer();
    showTab("walk");
  } else {
    addFeed("🌿","You walk through the quiet forest.","Nothing","var(--text3)");
    savePlayer();
    showTab("walk");
  }
};

function addFeed(icon,text,badge,color){
  feed.unshift({icon,text,badge,color,id:Date.now()});
  if(feed.length>20) feed.pop();
}

function spawnMonster(){
  const maxIdx = Math.min(Math.floor(player.level/3)+2, MONSTERS.length-1);
  const base = MONSTERS[rand(0,maxIdx)];
  return {
    ...base,
    str:rand(...base.str), def:rand(...base.def),
    hp:rand(...base.hp), maxHp:base.hp[1],
    expReward:rand(...base.exp), goldReward:rand(...base.gold),
    id:Date.now()
  };
}

function spawnItem(){
  // Weight toward lower rarities
  const r = Math.random();
  let eligible;
  if(r<0.45) eligible = ITEMS.filter(i=>i.rarity==="common");
  else if(r<0.75) eligible = ITEMS.filter(i=>i.rarity==="uncommon");
  else if(r<0.92) eligible = ITEMS.filter(i=>i.rarity==="rare");
  else if(r<0.99) eligible = ITEMS.filter(i=>i.rarity==="epic");
  else eligible = ITEMS.filter(i=>i.rarity==="legendary");
  if(!eligible.length) eligible = ITEMS;
  return {...pick(eligible), id:`item_${Date.now()}_${rand(0,9999)}`};
}

// ── COMBAT ───────────────────────────────────────────────────
function openCombatModal(monster){
  const {str:eStr,def:eDef}=equipStats(player.equipped);
  const pStr=(player.baseStr||10)+eStr, pDef=(player.baseDef||5)+eDef;

  combatState = {
    monster,
    playerHp: player.hp,
    playerMaxHp: player.maxHp,
    monsterHp: monster.hp,
    pStr, pDef,
    log:[],
    done:false
  };

  renderCombatModal();
  openModal();

  // Start auto-combat loop
  combatInterval = setInterval(combatTick, 950);
}

function renderCombatModal(){
  if(!combatState) return;
  const cs = combatState;
  const m = cs.monster;
  const pPct = clamp((cs.playerHp/cs.playerMaxHp)*100,0,100);
  const mPct = clamp((cs.monsterHp/m.maxHp)*100,0,100);

  document.getElementById("modal-content").innerHTML = `
    <div class="combat-scene">
      <div class="fighters">
        <div class="fighter">
          <div class="f-emoji">🧙</div>
          <div class="f-name">${player.username}</div>
          <div class="f-hp">${cs.playerHp}/${cs.playerMaxHp}</div>
          <div class="f-bar"><div class="f-bar-fill" style="width:${pPct}%"></div></div>
        </div>
        <div class="vs">VS</div>
        <div class="fighter">
          <div class="f-emoji">${m.emoji}</div>
          <div class="f-name">${m.name}</div>
          <div class="f-hp">${cs.monsterHp}/${m.maxHp}</div>
          <div class="f-bar"><div class="f-bar-fill" style="width:${mPct}%"></div></div>
        </div>
      </div>
    </div>
    <div class="combat-log" id="combat-log">${cs.log.join("<br>")||"<span class='log-sys'>Battle commences...</span>"}</div>
    ${cs.done?`<div style="display:flex;flex-direction:column;gap:0.4rem">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>`:`<div style="text-align:center;color:var(--text3);font-size:0.8rem;font-style:italic">⚔️ Auto-battling...</div>`}
  `;
  const log = document.getElementById("combat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

function combatTick(){
  if(!combatState || combatState.done) { clearInterval(combatInterval); return; }
  const cs = combatState;
  const m = cs.monster;

  // Player hits monster
  let pDmg = Math.max(1, cs.pStr - m.def + rand(-3,5));
  const pCrit = Math.random()<0.12;
  if(pCrit) pDmg = Math.floor(pDmg*1.75);
  cs.monsterHp = Math.max(0, cs.monsterHp - pDmg);
  if(pCrit) cs.log.push(`<span class="log-crit">⚡ CRIT! You smash ${m.name} for ${pDmg}!</span>`);
  else cs.log.push(`<span class="log-you">You hit ${m.name} for ${pDmg}</span>`);

  if(cs.monsterHp<=0){
    cs.done=true;
    clearInterval(combatInterval);
    cs.log.push(`<span class="log-win">🏆 ${m.name} defeated! +${m.expReward} EXP +${m.goldReward}🪙</span>`);
    handleVictory(cs);
    renderCombatModal();
    return;
  }

  // Monster hits player
  let mDmg = Math.max(1, m.str - cs.pDef + rand(-3,5));
  const mCrit = Math.random()<0.08;
  if(mCrit) mDmg = Math.floor(mDmg*1.75);
  cs.playerHp = Math.max(0, cs.playerHp - mDmg);
  if(mCrit) cs.log.push(`<span class="log-crit">💥 ${m.name} CRITS you for ${mDmg}!</span>`);
  else cs.log.push(`<span class="log-hit">${m.name} hits you for ${mDmg}</span>`);

  if(cs.playerHp<=0){
    cs.done=true;
    clearInterval(combatInterval);
    cs.log.push(`<span class="log-lose">💀 You were defeated by ${m.name}...</span>`);
    handleDefeat(cs);
    renderCombatModal();
    return;
  }

  renderCombatModal();
}

function handleVictory(cs){
  const m = cs.monster;
  player.npcKills = (player.npcKills||0)+1;
  player.gold = (player.gold||0)+m.goldReward;
  player.exp = (player.exp||0)+m.expReward;
  player.hp = cs.playerHp;

  // Level up check
  let leveled=false;
  while(player.exp >= expForLevel(player.level)){
    player.exp -= expForLevel(player.level);
    player.level++;
    const {def:eDef}=equipStats(player.equipped);
    player.maxHp = calcMaxHp(player.level,(player.baseDef||5)+eDef);
    leveled=true;
  }
  if(leveled){ toast(`🎉 LEVEL UP! You are now Level ${player.level}!`); }
  else { toast(`⚔️ Victory! +${m.expReward} EXP  +${m.goldReward}🪙`); }

  player.hp = clamp(player.hp, 1, player.maxHp);
  combatState = null;
  savePlayer();
}

function handleDefeat(cs){
  player.hp = Math.max(1, Math.floor(player.maxHp*0.25));
  toast("💀 Defeated! You rest and recover some HP.");
  combatState = null;
  savePlayer();
}

// ── ITEM MODALS ──────────────────────────────────────────────
window.openItemModal = function(source, idx){
  let item, isEquipped=false, slot=null;
  if(source==="equipped"){
    slot=idx;
    item=player.equipped[slot];
    isEquipped=true;
  } else {
    item=(player.inventory||[])[idx];
  }
  if(!item) return;
  const color = RARITY_COLOR[item.rarity]||"#9ca3af";

  document.getElementById("modal-content").innerHTML = `
    <span class="modal-icon">${item.emoji}</span>
    <div class="modal-title" style="color:${color}">${item.name}</div>
    <div class="modal-rarity" style="color:${color}">${item.rarity}</div>
    <div class="modal-row"><em>Type</em><span>${item.type}</span></div>
    <div class="modal-row"><em>Bonus</em><span style="color:${item.stat==="str"?"var(--crimson2)":"var(--steel2)"}">+${item.val} ${item.stat==="str"?"STR":"DEF"}</span></div>
    <div class="modal-actions">
      ${isEquipped
        ? `<button class="btn btn-ghost" onclick="unequipItem('${slot}')">Unequip</button>`
        : `<button class="btn btn-gold" onclick="equipItem(${idx})">Equip</button>`}
      <button class="btn btn-danger" onclick="${isEquipped?`dropEquipped('${slot}')`:`dropInventory(${idx})`}">Drop Item</button>
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>
  `;
  openModal();
};

window.equipItem = function(idx){
  const item = (player.inventory||[])[idx];
  if(!item) return;
  const eq = {...(player.equipped||{})};
  // Return old item to inventory if any
  const inv = [...(player.inventory||[])];
  if(eq[item.type]) inv.push(eq[item.type]);
  inv.splice(inv.findIndex(i=>i.id===item.id),1);
  eq[item.type]=item;
  player.equipped=eq;
  player.inventory=inv;
  // Recalc maxHp
  const {def:eDef}=equipStats(eq);
  player.maxHp=calcMaxHp(player.level,(player.baseDef||5)+eDef);
  player.hp=clamp(player.hp,1,player.maxHp);
  savePlayer();
  closeModal();
  toast(`✅ Equipped ${item.name}!`);
  renderGear();
};

window.unequipItem = function(slot){
  const item = player.equipped[slot];
  if(!item) return;
  player.inventory=[...(player.inventory||[]),item];
  delete player.equipped[slot];
  const {def:eDef}=equipStats(player.equipped);
  player.maxHp=calcMaxHp(player.level,(player.baseDef||5)+eDef);
  player.hp=clamp(player.hp,1,player.maxHp);
  savePlayer();
  closeModal();
  toast(`📦 Unequipped ${item.name}`);
  renderGear();
};

window.dropInventory = function(idx){
  const item=(player.inventory||[])[idx];
  if(!item) return;
  player.inventory=player.inventory.filter((_,i)=>i!==idx);
  savePlayer(); closeModal();
  toast(`🗑️ Dropped ${item.name}`);
  renderGear();
};

window.dropEquipped = function(slot){
  const item=player.equipped[slot];
  if(!item) return;
  delete player.equipped[slot];
  const {def:eDef}=equipStats(player.equipped);
  player.maxHp=calcMaxHp(player.level,(player.baseDef||5)+eDef);
  player.hp=clamp(player.hp,1,player.maxHp);
  savePlayer(); closeModal();
  toast(`🗑️ Dropped ${item.name}`);
  renderGear();
};

// ── MODAL HELPERS ────────────────────────────────────────────
function openModal(){ document.getElementById("modal-overlay").style.display="flex"; }
window.closeModal = function(){
  document.getElementById("modal-overlay").style.display="none";
  if(combatState && combatState.done){ combatState=null; }
};

// ── TOAST ────────────────────────────────────────────────────
function toast(msg){
  const el = document.createElement("div");
  el.className="toast"; el.textContent=msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>{ el.classList.add("dying"); setTimeout(()=>el.remove(),300); },2800);
}
window.toast = toast;

</script>
